front:
  text: 道德真經取善集卷之二墨七
  hash: sha256:9decce3ff2f5cb2cdb27f0aa9e4c7a5b89559b29b012c8353f04c9d5e7c85297
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0107_HFL_002-001a, image: hfl/0425/0425-004.png}
body:
  text: 宋饒陽居士李霖集上善若水章第八上善若水蘇子由曰天一生水蓋道運而為善猶氣運而生水也故曰上善若水水藴三能之近道七善之利物上善之人如之上善者道之所謂善也非天下皆知善之為善也善者道之繼水為五行首離道未遠其性最近道蓋離道則善名立矣上善若水物理自然水善利萬物又不爭處衆人之所惡故幾於道纂微曰此三能之近道也水性滋潤利澤萬物故曰善利此一能也方圓任器壅決隨人故曰不爭此二能也衆人惡卑水性趍下此三能也夫水利物則其仁廣大不爭則其德謙光處惡則其量忍垢舉水性之三能唯至人之一貫德行如斯去道不遠故曰近爾居善地馬巨濟曰善以處下為居水以就下為地在善得水之地故曰居善地水之所居善為地利善人所居化及鄉黨心善淵御注測之而益深窮之而益遠馬巨濟曰善以安靜為心水以深靜為淵在善則得水之淵故曰心善淵曹道沖曰淵者水之止雖有風波莫能動其深靜至人之心亦猶此也王元澤曰深靜而平內明外晦用心深靜反流全一與善仁御注兼愛無私施而無擇蘇子由曰利澤萬物施而不求其報善仁也馬巨濟曰善以濟物為與水以利物為仁在善則得水之仁故曰與善仁水之所與無有不潤利萬物以生成者也上善之人亦如水之所與博施於民惠及羣生利益有情不求其報故曰與善仁言善信御注避礙而通諸海行險而不失其信陸佃曰履千險而不失其信遇萬折而不失其東是謂言善信政善治御注汙者潔之險者夷之順物之理無容心焉故無不治唐明皇曰從政善治亦如水之洗滌穢物王弼曰為政之善無穢無偏如水之治至清至平劉仲平曰然水之為物未嘗有言政也而曰言善信政善治何也方此因論善人若水故以言政及於善人也事善能御注因地而為曲直隨器而為方圓趣變無常而常可以為平無能者若是乎蘇子由曰遇物賦形而不留於一善能也水之所事趣變無常唯變所適方圓隨器而不逆物故事無不能也上善之人亦如水之因人任物隨順世間而無逆物之心故曰事善能動善時御注陽釋之而泮陰凝之而冰決諸東方則東流決諸西方則西流動而不括宜在隨時而已纂微曰至人所居善執謙下順物自然化及鄉黨如水在地善就卑下滋潤羣物故曰居善地此一善也至人之心善保虛靜洞鑒幽微湛然通徹如水淵澄波流九變不失明時故曰心善淵此二善也至人施與善行仁慈惠及天下不懷親愛如水膏潤善能升降無不霑濟故曰與善仁此三善也至人之言善守誠信不與物期自然符契如水影物妍醜無差流滿輒移行險不失故曰言善信此四善也至人從政善治於民正容悟物物自順從如水清平善定高下滌蕩羣物使無塵穢故曰政善治此五善也至人臨事善能任物隨器授職不失其材如水柔性善事方圓能隨形器無用不成故曰事善能此六善也至人動靜善觀其時出處應機能全其道如水之動善隨一變冬凝夏液不差其節故曰動善時此七善也慮善以動動惟厥時亦如水之春泮冬凝矣夫惟不爭故無尤蘇子由曰有善而不免於人非者以其爭也水唯不爭故兼七善而無尤此章言水之為物利益羣品柔弱不爭常處卑下故兼三能總七善而無尤非上善之人其敦能似之持而盈之章第九持而盈之不如其已吕吉甫曰力持而滿之未必富者也持所以防溢而盈之則重溢也如欲勿溢則如勿盈持執持也盈滿也已止也執持所以防溢而又盈之勢必傾危故不如早上揣而鋭之不可長保溫公曰揣知物情鋭求進入必將失之吕吉甫曰情度而入之求必貴者也揣所以慮失而鋭之則重失也如欲勿失則如勿鋭揣者巧於度情鋭者利於入物揣度鋭利進取榮名雖得之必失之故不可長保金玉滿堂莫之能守舒王曰堂者虛而受物者也金玉滿之則是盈矣故不能守馬巨濟曰堂奧足以藏金玉而守之者也其害在滿苟非天殃必有人禍此明盈難久持也滿而不溢所以長守富也持而盈之則金玉滿堂莫之能守矣富貴而驕自遺其咎御注金玉富貴非性命之理也外物之不可恃而有者也寶金玉者纍於物纍於物能勿失乎故莫之能守富貴而驕則害於德害於德者能免於患乎故自遺其咎聖人不拘一世之利以為己私分不以王天下為己處顯夫豈金玉以為寶富貴之足纍乎故至富國財并焉至貴國爵并焉其貴無敵其富無倫而道不渝河上公曰富當賑貧貴當憐賤而反自驕恣必被禍患也舒王曰富貴不期驕而驕自至所以遺咎患也此明鋭不可揣也高而不危所以長守貴也揣而鋭之則富貴驕生以咎自與功成名遂身退天之道蘇子由曰日中則移月滿則虧四時之運功成者去天地尚然而況於人乎利人曰功聞譽施身曰名功譬富貴之實也名譬富貴之華也功及於人而成就名施於身而稱遂退身避位永無禍患是乃天之常道也此章戒富不可滿貴不可貪夫持滿不如早止揣鋭勢必挫衄金玉滿而難守富貴驕而遺咎功成而不處名遂而不尸知損為益乃符天道載營魄章第十載營魄王元澤曰魄陰物形之主也神之為物廣大通達而不自了者神常載於魄故神反拘於形體此廣者所以狹通者所以滯也欲學此道者當先廓其志氣勿纍於形體使神常載魄而不載於魄則可以抱一而體神矣馬巨濟曰人之生諸陽為魂諸陰為魄藏於肝肺之間精與神相依以生而並精出入者魄也隨神往來者魂也此篇言載營魄營即魂是也內觀經曰動以營身謂之魂魂主經營動作為一身之運為魂則並精出入主化成變而已今百骸九竅具吾形者魄之屬也使非魂以營之則與行尸何以異乎魄不可以無魂猶月不可以無日魄待魂而成營月待日而生光此言魂之用而曰營言魄之體而曰魄也載謂以形載也舊説皆謂營為魂唯元澤御解説營為止也一説載者形載魂魄也一説神載魄也抱一能無離乎舒王曰一者精也魂魄既具則精生精生則神從之王元澤曰一者精之數而不言精而言一者守一則精不搖矣馬巨濟曰營魄者異事在于抱一而已道生一一生水水生精精者一之物也抱一則與精合脫一則與精離矣精至而氣全氣全而神全神全所以制魂魄為上士矣精者天地萬物所由以生成也營止也魄陰也形之主麗於形而有所止故言營魄載者以神載魄也若無神以載之則滯於幽陰形散神離下與萬物俱化神常載魄而不載於魄則鍊陽神消陰魄身化為仙也其事在乎抱一而不離一者精也抱一則精與神合而不離則以精集神以神使形以形存神三者混而為一則道全欲學此道者當存精為本莊子曰不離於精謂之神人此教人養精也專氣致柔能如嬰兒乎纂微曰言人欲學專氣致柔之術當如嬰兒純和乎若能如嬰兒之純和即是得專氣致柔之術也精全則神王神王則能帥氣神專其氣而喜怒哀樂不為神之所使以致柔和也專者有而擅其權之謂柔者和而不暴之謂氣致柔和當如嬰兒之心也欲慮不萌意專志一終日號而嗌不嗄和之至此教人養氣也滌除玄覽能無疵乎馬巨濟曰此章以全精全氣全神為學道之根故無離以言養精如嬰兒以言養氣無疵以言養神也玄覽者心也滌者洗心也除者刳心也洗之而無不靜刳之而無不虛心之虛靜無一疵之可睹莊子曰純粹而不雜靜一而不變此教人養神也愛民治國能無為乎河上公曰治身者愛氣則身全治國者愛民則國安治身者呼吸精氣無令耳聞治國者布德施惠無令下知此申抱一之義也內丹經云聖人以身為國以心為君以精氣為民民安國霸精者身之本愛嗇精氣則身治也愛精之道抱一為本乃自然之道夫何為哉故曰能無為乎今鍊精之士或以雜術為務以般運為功多有作為故又戒以無為莊子曰唯無為幾存諸解皆説外唯河上公內外兩説之以上文考之就身説者於經以順天門開闔能為雌乎王元澤曰至人無心於作精神出入皆應而不唱此申專氣之義也恐鍊氣之士有使氣之強故又戒以守雌雌者致柔也明白四達能無知乎御注聰明聖智守之以愚此申無疵之義也鍊神之士純素而不雜通徹而無礙當不用知見守之以愚故又戒之以無知也生之畜之生而不有為而不恃長而不宰是謂玄德御注聖人存神知化與道同體則配神明育萬物無不可者生之以遂其性畜之以極其養無愛利之心焉故生而不有無矜伐之行焉故為而不恃無刻制之巧焉故長而不宰若是者其德深矣遠矣與物反矣故曰是謂玄德此章以全精全氣全神為學道之根三者混而為二乃道之全也三十輻章第十一三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿户牖以為室當其無有室之用御注有無一致利用出入是謂至神有無異相在有為體在無為用陰陽之運萬物之理也車之用在運器之用在盛室之用在虛妙用出於至無變化藏於不纍如鑑無象因物顯照至人用心每解乎此故有之以為利無之以為用鍾會曰舉上三事明有無相資俱不可廢故有之以為利利在於體無之以為用用在於空故體為外利資空用以得成空為內用藉體利以得就但利用相藉咸不可亡也無賴有為利有藉無為用二法相假車惠弼曰修身者必須以有資空以空導有有無資導心不偏溺故成人之利用此章明有無一致利用相資舉三事以明大道夫輪轂為車埏埴為器户牖為室此有也人賴以為利轂中空虛輪得轉行器中空虛物得盛受室中空虛人得居處此無也人賴以為用有為實利必以無為用無乃妙用必以有為體有無相待亦猶形神相須而不可偏廢也形以神為主神以形為居形神合同更相生成世之昧者鍊神者蔽於無養形者溺於有是二者胥失也殊不知此章取三物為喻以明有無之相生欲學道者依此修持則形神俱妙與道合真矣五色章第十二五色令人目盲五音令人耳聾御注縱耳目之欲屬於聲色雖具耳目之形而不自見自聞與盲聾也奚異五味令人口爽王元澤曰人生而靜因物有遷耳目本自希夷而聲色在前真從妄喪口之於味亦復如此馳騁田獵令人心發狂吕吉甫曰萬物無足以撓之者心之所以靜而聖也逐乎外則罔念而發狂矣事奚不然馳騁田獵尤為甚太康畋洛表而五子咸怨哀公好田獵而詩人所刺外作禽荒田獵無度迷於正性非狂而何難得之貨令人行妨御注貴難得之貨則至於決性命之情而叨富貴何行之能守故令人行妨仲虺之稱湯曰不殖貨利孔子謂子貢曰賜不受命而貨殖焉貨之妨行如此夫明月之寶夜光之璧適足以賈害孟子曰寶珠玉者殃必及身是以聖人為腹不為目鍾會曰真氣內實故曰為腹嗜欲外除故曰不為目五音令人耳聾故聖人為腹不為目諸相例也為腹者守精神而真氣內實不為目者去六情目不妄視故去彼取此河上公曰去彼目之妄視取此腹之養神目主外視腹主內容聖人實其腹不為耳目所役故去彼外視之目取此能容之腹夫聖人清淨六根於此獨言不為目者蓋言目則其餘可知也此章言五塵之害性當忘物以全真聖人之去取槩可見矣寵辱章第十三寵辱若驚舒王曰寵之所以為辱者以其若驚也馬巨濟曰寵者辱之本以係乎得失故也以見寵於人則其驚彌甚是寵之猶辱之也寵者榮寵也心榮見寵即驚其神此寵之所以為辱也貴大患若身御注寵者在下貴者在上居寵而以為榮則辱矣處貴而以為纍則患莫大焉貴者尊貴也心有所貴其患大矣譬若人身動輒自纍何謂寵辱寵為下御注貪夫名慕夫祿知進而不知退知得而不知喪受寵於人則為下之道問何故寵之為辱受寵於人為下之道既受寵於人則與奪之權在人之手若以得失纍其心豈不惑哉子文三仕三巳無喜愠之色者豈有辱乎得之若驚失之若驚是謂寵辱若驚溫公曰為士者以道德為上爵祿為下上榮也下辱也衆人乃寵其辱操之則栗舍之則悲得之本有失之本無烏能有驚若以得失之際有若驚之心是以辱也柳下惠為士師三黜而不去正考父三命循墻而走則異於此何謂貴大患若身御注據利勢擅賞罰作福威天下畏之如神明尊之如上帝可謂貴矣聖人則不以貴自纍故能長守貴而無患譬如人身墮肢體黜聰明離形去智同於大通則無入而不自得也世之人以物易性故纍物而不能忘勢以形纍心故喪心而不能忘形其患大矣王元澤曰貴者在物之上而有國有家之而不能忘則為患大矣譬人有身珍而纍之則寒暑疾痛萬緒皆何豈非大患乎吾所以有大患者為吾有身河上公曰吾所以有大患者正吾有身有身則憂其勤勞念其飢寒觸情縱欲則遇禍患身為患者以吾執有其身為患大矣及吾無身吾有何患蔡子晃曰無身者謂不以身為身真乎造化物我俱忘患何能及非是滅壞其身唤作無身無身者非謂滅壞其身為無身也蓋雖有身而不執有其身有之以無有耳若孔子之母我子綦之喪我是也故貴以身為天下若可寄天下愛以身為天下若可託天下御注天下大器非道莫運天下神器非道莫守聖人體道故在宥天下天下樂推而不厭其次則知貴其身而不自賤以役於物者若可寄而已知愛其身而不自賊以困於物者若可託而已故曰道之真以治身其緒餘以為國家土苴以治天下世俗之君子乃危身棄生以殉物豈不悲夫王弼曰無物以易其身故曰貴也無物以損其身故曰愛也如此乃可以寄託天下也不以寵辱榮患損易其身然後乃可以天下付之也貴者不辱其身愛者不危其身如此乃可寄託天下也若子州支父王子搜之徒是也二人者豈榮其寵自寵生忘寵則無辱身為患本忘身則無患既忘寵貴之纍則絶驚患之憂然後貴愛其身可以寄託天下道德真經取善集卷之二
