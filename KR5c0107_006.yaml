front:
  text: 道德真經取善集卷之六悲一
  hash: sha256:5fe29a7aa31949570d9afa7afa06c1738b9eb517ddf3dec00ecf4a7561f776b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0107_HFL_006-001a, image: hfl/0426/0426-004.png}
body:
  text: 宋饒陽居士李霖集御注道無方體德有成虧合於道則無德之可名别於德則有名之可辨仁義禮智隨量而受因時而施是德而已體道者異乎此故列于下經王元澤曰德者得也物生乎道而各得於道故謂之性得其性而不失則德之全也德未嘗異道而有其德者嘗至於自私而失道彼真人者不然性命道德之實渾乎而為一而四者之名應世而殊號吾莫知其異亦莫知其同也是德之玄者也雖然德者得也能無失乎哉唯以無得為德而德乎不德則可謂至矣是體道者也非有德者也上德不德章第三十八上德不德是以有德御注物得以生謂之德同焉皆得默與道會過而不悔當而不自得也是謂不德孔子不居其聖而為聖之時乃所以有德王弼曰上德之人唯道是用不德其德無執無用故能有德谷神子曰上德不德與道同也德者得也得道之謂也上德之人與道同而無得心是以有德清靜經曰雖名得道實無所得至禮不人至義不物至智不謀至仁無親所謂不人不物不謀無親者不德也不德則至矣所以為德之上經曰上德若谷下德不失德是以無德御注認而有之自私以失道何德之有成玄英曰未造其極故稱為下執德不忘故稱不失蘇子由曰聖人從心所欲不踰矩非有意於德而德自足其下知德之貴勉強以求不失蓋僅自完爾而何德之有谷神子曰下德不失德德得也下德者散道以為德也故蹩躠為仁踶跂為義摘僻為禮以鑿為智雖名不失德去道也遠是以無德上德無為而無以為御注不思而得不勉而中不行而至上德也唐明皇曰知無為而無為者非至也無以無為而無為者至矣王元澤曰上德無為然亦無所事為而德自足曹道沖曰德之上者本自無為非故造無為之念也吕吉甫曰上德無為非故無為也率得之自然而實無以為也顧歡曰言上德之化處無為之事行不言之教其迹不彰故曰無為為既無迹心亦無欲故曰無以為故上德之無為非徇無為之美但含孕淳朴適自無為故云而無以為此心迹俱無為也下德為之而有以為吕吉甫曰下德不知出此而為之故不能不有以為也夫德無以為足矣而且有仁焉則是為之也下德之人不思則不得不行則不至是以既不至於無為而又勢當有為也上仁為之而無以為御注堯舜性之仁覆天下而非利之也故無以為河上公曰兼濟無偏其仁無上故言上仁也為之者為仁恩也功成不居事遂不宰無以執為舒王曰仁者有所愛有所親也唯其有所親愛則不能無為矣其下者可知也王元澤曰仁乃善之長德之别名既别於德則是為之也然聖人之仁盡性而足不俟於作故無以為上義為之而有以為御注列敵度宜之謂義以立我以制事能無為乎唐明皇曰義者裁非之謂謂為裁非之義故云為之有以裁非斷割令得其宜故云而有以為此則心迹俱有為也雜説曰上德無為而無以為羲皇也上仁為之而無以為堯舜也上義為之而有以為湯武也上義下德也或曰湯武大聖人也謂之下德可乎曰聖人之所同者心也德之所以有上下者時也大聖人者易地則皆然上禮為之而莫之應則攘臂而仍之嚴君平曰虛無無為開道萬物謂之道人清靜因應無所不為謂之德人兼愛萬物博施無窮謂之仁人理名正實處事之宜謂之義人謙退辭遜恭以守和謂之禮人此五者皆可道也陳迹也非至至者也至至者一尚不存安有其五吳筠曰禮智者制亂之大防也道德者撫亂之宏綱也然則道為禮之本禮為道之末執本者易而固持末者難而危故人主以道為心以德為體以仁義為車服以禮智為冠冕則垂拱而天下化矣若尚禮智而忘道德者所謂有容飾而無心靈雖乾乾夕惕而天下弊矣仁者施之而已義則擇所施之宜者也未責所報也禮則施報矣來而不往非禮也往而不來亦非禮也施報之義也行禮於彼而彼不應則攘臂而怒以相仍引攘臂者攘除衣袂以出臂也春秋之時一言之不讎一拜之不中兩國為之暴骨則攘臂而仍之尚其患之小者故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首御注道不可致故失道而後德德不可至故失德而後仁仁可為也為則近乎義故失仁而後義義可虧也虧則飾以禮故失義而後禮至於禮則離道滋遠所失滋衆矣凡物不並盛陰陽是也理相奪豫威德是也實厚者貌薄父子之禮是也由是觀之禮繁者實必衰也實衰則偽繼之而爭亂作故曰夫禮者忠信之薄而亂之首也唐明皇曰失道者失上德也上德合道故云失道夫道德仁義者時俗夷險之名也故道衰而德見德失而仁存仁亡而義立義喪而禮救斯皆適時之用爾故論禮於淳朴之代非狂則悖忘禮於澆漓之日非愚則誣若能解而更張者當退禮而行義退義而行仁退仁而行德忘德而合道人反淳朴則上德之無為也纂微曰忽道德仁義而專以禮教為用者豈非忠信之薄而亂之首乎若乃尊道德仁義而兼用禮教者是禮之上也則何往而不治哉忠則不欺信則不妄莊子曰至德之世實而不知以為忠當而不知以為信雖有忠信而不知至於用禮則玉帛交馳施報相望擎跽曲拳辭讓謙卑徒為貌恭而已其心未必然也中純實而反乎情樂也信行容體而順乎文禮也禮樂遍行天下亂矣太上言禮為缺文處其厚不處其薄居其實不居其華故去彼取此吕吉甫曰忘仁義絶禮學遺智慧而志於道德之大全是之謂去彼取此道德厚實也禮智華薄也是以大丈夫去彼禮智之華薄取此道德之厚實此大丈夫所以備道而全德此章主道之本而言也仁義禮智而道之失也上德者與道同也故不德也以退仁義賔禮智而志於道德之厚實非真大丈夫不能取此昔之得一章第三十九昔之得一者陸佃曰入於一道將得出於一道將失一者有無之界也列子曰一者形變之始自今言古謂之昔昔者指天地之後而言也經曰道生一於物為精古昔得一者天地神人物是也上下幽明雖則不齊得乎一則未始不齊故下文云其致之一也一者本也天得一以清顧歡曰天者純陽之氣得一故輕清於上地得一以寧顧歡曰地者純陰之質得一故安靜處下神得一以靈河上公曰言神得一故能變化無形王元澤曰神謂鬼神之神靈者神之散也谷得一以盈郭象曰谷川谷也谷川得一故能泉源流潤溪壑盈滿王元澤曰一之為一無乎不遍故谷虛而能應者一存乎中也陸佃曰虛者谷之體盈者谷之用萬物得一以生張君相曰有識無情總號萬物同稟一道以得生成侯王得一以為天下正其致之御注莊子曰通於一萬事畢致一則不二抱一則不離守一則不遷能知一則無一之不知不能知一則無一之能知昔之得一者體天下之至精物無得而偶之者故確然乎上者純粹而不雜隤然乎下者靜止而不變至幽而無形者神也得一則不昧至虛而善應者谷也得一則不窮萬物以精化形故得一以生侯王以獨制衆故得一以為天下正自天地以至于侯王雖上下異位幽明散殊而天之所以清地之所以寧侯王之所以為天下正非他求而外鑠也一以致之而已故曰其致之一也王元澤曰一者不二在彼在此其所謂一其體常一無有别一故唯一能致一不可以他致一也一之為義天下之至精唯精故能神神則盡之矣而神之為德常在一也侯王以寡統衆以得一故為天下正易曰天下之動正夫一而止天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貴高將恐蹶御注天職生覆地職形載裂則無以覆發則無以載發泄也神依人而行者也歇則無所示谷受而不藏者也竭則莫之應聚則精氣為物得一以生故也散則遊魂為變失一以滅故也滅者生之息惟正也能御萬變而獨立乎萬物之上無以為正而貴高將不足以自保能無蹶乎蹶者上之仆王元澤曰一之為一無乎不在欲言其理辭不勝窮且以人形言之凡人初生精為之本因精集神體象斯具精之既喪形斃神離或德或形其理無二故貴以賤為本高以下為基御注賤者貴之所恃以為固下者高之所自起世之人睹其末而聖人探其本世之人見其成而聖人察其微故常得一也孫登曰九重之臺起於纍土百仞之高元乎一簣以況尊貴卑下為基王元澤曰水於五行其數為一而趍下不爭陰陽之情也知此道者雖居貴高而不忘基本故居位也安猶體神而存精則神常存也是以侯王自謂孤寡不穀此其以賤為本邪非乎御注孤寡不穀名之賤者也而侯王以為稱知所本而已侯王所以貴高而不蹶其以此乎顧歡曰孤是無父之稱寡者偏喪之名不穀者不善也謂非物宗不能總衆之辭凡此三者皆人之所賤而侯王自以為稱豈非以賤為本乎非者詳問之辭言侯王以孤寡不穀自目明其以賤為本王元澤曰一於數至少而為萬物本故知本在於賤知賤乃真貴也故致數輿無輿御注自高以勝物自貴以賤物強而不知守以柔白而不知守以黑以求譽於世而致數譽則過情之譽暴集無實之毁隨至所以無譽唐明皇曰數字作上聲譽字作輿字説曰數輿則無輿輪轅為輿本數貴則無貴賤下為貴本轅為輿本當存轅以定輿賤為貴本當守賤以安貴將戒侯王以賤為本故致此數輿之談也王元澤曰數字作入聲輿字為譽字説曰知一者以賤為本而內韜至貴故世不得而貴亦不得而賤苟為己而數致稱譽豈真譽乎不欲琭琭如玉落落如石御注玉貴而石賤一定而不變聖人乘時任物無所底滯萬變無常而吾心常一是真得一者也故不可得而貴賤孟子曰所惡執一者為其執一而廢百也不欲琭琭如玉落落如石非知化之聖不能及此是謂上德河上公曰琭琭喻少落落喻多玉少故見貴石多故見賤言不欲如玉為人所貴如石為人所賤當處其中爾王元澤曰玉石體堅而一定不能曲變非謂一也若夫萬變而常一則真一矣故玉琭琭貴而已矣不能賤也石落落賤而已矣不能貴也老氏既明一義恐不悟者執一不變堅如玉石則失一之理矣夫唯體一者一貴一賤其德如水方圓枉直應物無窮而不離於一故不得而貴賤以一無貴賤故也此篇義最奧密難言今粗明綱領而已蓋道生一一則德之全體於物則幾於道者是也此章以一為宗夫一者天下之至精天地神物貴賤動植咸得一以生成太上恐人執一而不知變又終之以不欲如玉石者堅如玉石則失一之理矣竊以太上之道始以鍊精為基本次以全神為妙道若基本不立則道無由生故以一為基本猶精而全神也終之以玉石者恐人執於鍊精不能養神假使壽同龜鶴終無冀於神仙惟精神俱鍊與道合真矣道德真經取善集卷之六
