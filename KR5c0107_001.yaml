body:
  text: 宋饒陽居士李霖集御註道者人之所共由德者心之所自得道者亘萬世而無弊德者充一性而常存老子當周之末道降而德衰故著書九九篇以明道德之常而謂之經其辭簡其㫖遠學者當默識而深造之道可道章第一道可道非常道名可名非常名嚴遵曰可道之道道德彰而非自然也今之行者晝不操燭爲日明也夫日明者不道之道常也操燭者可道之道彰也夫著於竹帛鏤於金石可傳於人者可道之道也若乃可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地者常道之道也五千文之藴發揮自此數言實謂玄之又玄神之又神也王元澤曰名生於實實有形數形數既具衰壞隨之其可常乎惟體此不常乃眞常也首遞道之一字大道之道也下言可道之字言道之道也夫大道虚寂玄理幽深不可言道當以默契故心困焉不能知口辟焉不能議在人靈府之自悟爾雖道之一字亦不可言也若默而不言衆人由之而不知故聖人不得已而强名曰道既云爲道有言有說代廢代興非眞常之道也其可道者莫非道也而非道之常也惟其不可道而後可常耳今夫仁義禮智可道之不可常如此惟其不可道然後在仁爲仁在義爲義在禮爲禮在智爲智彼皆不常而道不變故常不可道之能常如此常道者自然而然隨感應變接物不窮不可以言傳不可以智索但體冥造化含光藏輝無爲而無不爲默通其極爾無名天地之始有名萬物之母温公曰天地有形之大者也其始必因於無故名天地之始曰無萬物以形相生其生必因於有故名萬物之母曰有吕吉甫曰無名者道也而天地所自而始也故曰無名天地之始太初有無無有無名無無則一亦不可得無名則一之所起有一而未形則所謂天地之始是也既已謂之一且得無名乎此物得之以生而謂之德也則所謂有名萬物之母而萬物得一以生者是也無名謂道也道常無名生育天地故爲天地之始乃道之妙也有名謂天地也天覆地載萬物方立故爲萬物之母乃道之徼也天地有形位是有名也萬物母者天地含氣生育萬物長大成熟如母養子常無欲以觀其妙常有欲以觀其徼蘇子由曰自其無名形而爲天地天地位而名始立矣自其有名播而爲萬物萬物育而名不可勝載矣故無名者道之體而有名者道之用也聖人體道以爲天下用入於衆有而常無將以觀其妙也體其至無而常有將以觀其徼也若夫行於其徼而不知其妙則粗而不神矣留於其妙而不知其徼則精而不通矣記曰感物而動性之欲也欲者離靜之動任耳目以視聽勞心慮以思爲無欲則靜於以觀天地之始所謂妙也故曰常無欲可名於小妙則精而小也有欲則動於以觀萬物之母所謂徼也故曰萬物歸焉而不知主可名於大矣徼則麤而大也無欲之人可以見道之精妙也有欲之人但見其道之麤徼而已此兩者同出而異名同謂之玄温公曰玄者非有非無微妙之極也兩者謂有欲無欲也同出者同出人心也而異名者其名各異也其名異其實未嘗異其實未嘗異則有欲之與無欲同謂之玄也玄之爲色黑與赤同乎一也天之色玄陰與陽同乎一也兩者同謂之玄玄能陰能陽故也玄之又玄衆妙之門御註素問曰玄生神易曰神也者妙萬物而爲言者也妙而小之謂玄玄者天之色色之所色者彰矣而色色者未嘗顯玄之又玄所謂色色者也玄妙之理萬物俱有天之所以運地之所以處人之所以靈百物之所以昌皆妙也而皆出於玄故曰衆妙之門易曰一陰一陽之謂道陰陽皆原於一一者道所生也玄者陰與陽同乎一也又玄者道也衆妙者謂萬物之妙也萬物皆有妙理而皆出於道故曰衆妙之門此章言眞常之道悟者自得不可名言同觀徼妙斯可以造眞常之道矣太上以此首章總一經之意明大道之本謂玄之又玄也天下皆知章第二天下皆知美之爲美斯惡已皆知善之爲善斯不善已御註道無異相孰爲美惡性本一致孰爲善否有美也惡爲之對故曰天下皆知美之爲美斯惡已有善也不善爲之對故曰皆知善之爲善斯不善已世之所美者爲神奇所惡者爲臭腐神奇復化爲臭腐臭腐復化爲神奇則美與惡奚辯昔之所是今或非之今之所棄後或用之則善與不善奚擇聖人體眞無而常有即妙用而常無美惡善否蓋將簡之而弗得尚何惡與不善之能累哉王元澤曰惡與不善美善之隨也當其美善之時蓋已惡且不善矣俟其隨而後悟則亦悟之晩也美惡生於妄情善否均於失性美者人情所好也若知美之爲美是心有所美也心有所美於心爲恙斯惡已若河伯欣然自喜以天下之美爲盡在已不免望洋向若而嘆幾是矣善者人之可欲也若知善之爲善是性有所欲也性有所欲是離道以善斯不善已若伯夷見名之可欲餓於首陽之下均爲失性幾是矣蓋道之美者至美也至美無美淡乎無味莊子曰淡然無極衆美從之道之善者上善也上善忘善萬善皆備又曰去善而自善矣此章道通爲一恐人著於美善不悟眞常故以此篇次之與莊子齊物論相似故有無之相生難易之相成長短之相形高下之相傾音聲之相和前後之相隨御註太易未判萬象同體兩儀既生物物爲對此六對者羣變所交百慮所生殊塗所起世之人所以陷溺而不能自出者也無動而生有有復歸無故曰有無之相生有涉險之難則知行地之易故曰難易之相成長短之相形若尺寸是也高下之相傾若山澤是也聲舉而響應故曰音聲之相和形動而影隨故曰前後之相隨陰陽之運四時之行萬物之理俄造而有倏化而無其難也若有爲以經世其易也若無爲而適己性長非所斷性短非所續天之自高地之自下鼓宫而宫動鼔角而角應春先而夏從長先而少從對待之境雖皆道之所寓而去道也遠矣温公曰凡事有形迹者必不可齊不齊則爭爭則亂亂則窮故聖人不貴是以聖人處無爲之事行不言之教顧歡曰聖人因天任物無所造爲心常凝靜於前美善處而無爭故不爲六境之所傾奪爲則有成虧言則有當愆曾未免乎累是以聖人處事以無爲行教以不言而事以之濟教以之行而吾心寂然未始有言爲之累天下亦因得以反常復樸夫唯無累故雖寄形陰陽之間而造化不能移彼六對者烏能擾之哉經曰不言之教無爲之益天下希及之萬物作而不辭御註萬物動作隨感而應若鑑對形妍醜畢現若谷應聲美惡皆赴無所辭也今計物之數不止於萬而曰萬物者以數之多者云也作謂動作也萬物動作聖人各盡其性不辭謝而逆止以吾心空然無所去取故也苟懷去取之慮則物之萬態美惡多矣烏能不辭哉生而不有爲而不恃功成不居纂微曰萬物自生卓然獨化不爲己有羣品營爲各適其性不恃己德功成事遂道洽於物心遊姑射之山不居萬民之上此聖人之全德也萬物自生各極其高大萬物自爲各正其性命聖人歸功於物不以三事爲累故曰功成不居有我則居居則遷矣帝堯成功而自視缺然夫唯不居是以不去蘇子由曰聖人居於貧賤而無貧賤之憂居於富貴而無富貴之累此所謂不居也我且不居彼尚何從去哉此則居之至也鴻烈曰楚將子發攻蔡踰之宣王郊迎列田百頃封之執圭子發辭不受曰治國立政諸侯入賔此君之德也發號施令師未合而敵遁此將軍之威也兵陣戰而勝敵者此庶人之力也夫乘民之功勞而取其爵禄非仁義之道也故弗受故曰功成不居夫惟不居是以不去此章欲體眞常之道忘美惡齊善否不爲六對之所遷唯聖人知其然故處事以無爲行教以不言歸功於物而不居道常在我而不去也不尚賢章第三不尚賢使民不爭温公曰賢之不可不尚人皆知之至其末流之弊則爭名而常亂故老子矯之欲人尚其實不尚其名賢者出衆之稱在上者别而尚之崇以爵位旌以車服故民夸企外慕殉名而不息能無爭乎蓋聖人未嘗不用賢也使賢不肖各當其分因任而已特不崇尚耳莊子曰舉賢則民相軋不貴難得之貨使民不爲盜御註尚賢則多知至於天下大駭儒墨畢起貴貨則多欲至於正晝爲盜日中穴𨸹不尚賢則民各安其性命之分而無所夸跂故曰不爭不貴貨則民各安其性命之情而無所覬覦故不爲盜金玉者難得之貨在上者貴而寳之取金於山求珠於淵則民病於無有求貨而無厭必至於爲盜蓋聖人未嘗棄財貨也使民耕而食織而衣足衣食而已特不貴難得者爾故民各安其性命之情而不爲盜孔子曰苟子之不欲雖賞之不竊不見可欲使心不亂御註人之有欲决性命之情以爭之而攘奪誕謾無所不至伯夷見名之可欲餓於首陽之下盜跖見利之可欲暴於東陵之上其熱焦火其寒凝冰故其心則憒亂僨驕而不可係道至於聖人者不就利不違害不樂壽不哀天不榮通不醜窮則敦爲可欲欲慮不萌吾心湛然有感斯應止而無所礙動而無所逐也孰能亂之君子之所欲者賢也小人之所欲者貨也既無尚賢之迹不求難得之貨是無可見之欲則民心不惑亂也傅奕音義曰古本作使民心不亂是以聖人之治河上公曰聖人治國與治身同也虚其心實其腹曹道沖曰心虚白則神留而道存腹充實則精全而壽長心有所擇虚其心則無賢之可尚腹有所容實其腹則無欲之可貪弱其志强其骨御註志强則或殉名而不息或逐貨而無厭或伐其功或矜其能去道益遠聖人之志每自下也而人高之每自後也而人先之知其雄守其雌知其榮守其辱是之謂弱其志不壞之相若廣成子千二百歲而形未嘗衰是之謂强其骨劉仲平曰虚心弱志所以養神腹實骨强所以嗇精志者心之所之守道則志弱骨者髓之府髓滿則骨强一說虚心則實腹弱志則骨强一說虚心則弱志腹實則骨强常使民無知無欲御註莊子曰同乎無知其德不離同乎無欲是謂素樸素樸而民性得矣聖人之治務使民得其性而已多知以殘性命之分多欲以汨性命之情名曰治之亂敦甚焉故常使民無知無欲王元澤曰知則妄見欲則外求二者既除性情定矣自不尚賢虚心弱志而化之使民無爭尚之知自不貴貨實腹强骨而化之使民無貪求之欲使夫知者不敢爲也吕吉甫曰智者知賢非上之所尚而貨非上之所貴而爲之非所利也故不敢爲也爲無爲則無不治矣舒王曰有爲無所爲無爲無不爲聖人爲無爲則無不治矣此章言聖人體道無爲而治也不尚賢不貴貨虚心實腹弱志强骨是聖人體道治身而無爲也使民不爭而同乎無知使民不盜而同乎無欲則無不治也經曰道常無爲而無不爲侯王若能守萬物將自化無爲而治者虞舜之所以爲帝垂拱而治者周武之所以爲王故曰帝王無爲而天下功三篇統論首篇言道可道夫可道之道非眞常之道也眞常之道離言說超形名悟者自得能悟之者忘美惡齊善否故以天下皆知次之既不爲二境迴换則是非美惡不藏於胸中故以不尚賢次之不尚賢不貴貨則方寸之地虚矣虚則腹實此精神内守道德之極致也學者精此三篇則經之妙㫖斯過半矣道沖章第四道沖而用之或似不盈御註道有情有信故有用無爲無形故不盈沖者中也道之用抑高舉下損有餘補不足無適而不得其中也道之體虚而不盈充塞而無外贍足萬物而未嘗有故曰或似不盈淵兮似萬物之宗温公曰深不可測常爲物主淵反流全一說文曰回水也水回則深靜回而爲淵則止而不流所以爲一者全矣兮者詠言之助莊子曰止水之審爲淵淵深而靜不與物雜道之體也惟深也物莫能測惟靜也物莫能動道體淵兮深靜似爲萬物之宗祖然道本無係物自宗道故似之而已其或言似者言之不敢正也人本足於此道欲體之者不可他求當挫鋭解紛和光同塵則當自存矣挫其鋭解其紛和其光同其塵温公曰鋒角猛露道所惡也事爲煩亂道所鄙也輝華顯赫道所敗也汙辱卑下道所貴也心出而入物爲鋭挫其鋭而勿行物至而交心爲紛解其紛而不亂挫鋭解紛則性情定而自然充實光輝矣既有光輝則要不異於物與之和同而不顯所謂光而不耀也内不失眞外不殊俗同塵而不染所謂與物委蛇而同其波也湛兮似或存郭象曰存在也道湛然安靜古今不變終始常一故曰存存而無物故曰似也人能如上四事則湛然常寂而存矣存而定有之則非道也似或者不可定有之謂吾不知其誰之子王元澤曰即今所稱道之中體蓋有所出矣雖有所出而廓然無象故曰不知誰之子言我不知道之所從生誰得而子之象帝之先御註象者物之始見帝者神之應物物生而後有象帝出而後妙物象帝者羣物之始而道實先之莊子所謂神鬼神帝生天生地是也象有形之兆帝有物之尊象帝至矣而道更在其先此章言道以中爲用其體虚而不盈爲萬有之主居象帝之先天地章第五天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗御註恩生於害害生於恩以仁爲恩害則隨至天地之於萬物聖人之於百姓輔其自然無愛利之心焉仁無得而名之束芻爲狗祭祀所用適則用之過則棄之彼萬物之自生百姓之自治曾何容心焉愛人利物之謂仁不仁者謂無情於仁愛非薄惡之謂也天地生化萬物任其自然無愛利之心焉如芻狗當祭祀之用也盛以篋衍巾以文繡尸祝齋戒然後用之及祭之後行者踐其首脊樵者焚其支體彼物用棄非有憎愛時適然也且天地之於萬物聖人之於百姓亦然故天地無恩而大恩生聖人不仁而大仁成天地之間其猶橐籥乎唐明皇曰槖者韛也籥者笛也槖之鼔風籥之運吹皆以虚而無心故能動而有應王元澤曰橐籥虚以應物物感則應應而不藏天地之於萬物聖人之於百姓應其適然而不係累於當時不留情於既往故比橐籥之無窮也道無方體以沖和之氣鼓動於覆載之間而生養萬物如橐以氣化形籥以氣出聲氣虚而待物凡有形有聲者皆自此出故比於橐籥也以喻天地聖人亦以虚而無心故也虚而不屈動而愈出王弼曰橐籥之中空洞無情無爲故虚而不能窮屈動而不可竭盡也王元澤曰虚其體也動其用也多言數窮不如守中御註慎汝内閉汝外收視反聽復以見天地之心此之謂守中王弼曰若不法天地之虚靜同橐籥之無心動不從感言不㑹機動與事乖故曰數窮不如内懷道德抱一不移故曰守中此章戒人多言不如守内始言天地不仁中以橐籥爲況終之以多言數窮者欲人之出言法天地之無心如橐籥之虚中因感而應則無多言之失與其言多而致禍不如默默而守中谷神章第六谷神不死御註有形則有盛衰有數則有成敗形數具而生死分物之理也谷應羣動而常虚神妙萬物而常寂眞常之中與道爲一不麗於形不墮於數生生而不窮如日月焉終古不息如維斗焉終古不忒故云不死河上公曰谷養也人能養神則不死神謂五臟之神肝藏魂肺藏魄心藏神腎藏精脾藏志五臟盡傷五神去矣温公曰中虚故曰谷不測故曰神天地有窮而道無窮故曰不死王元澤曰谷應而不窮神化而不測萬物受命於我而我未嘗生未嘗死者谷神也言神則極矣而加谷者且言能虚能盈而又能容以應也以其活而不敝故但稱不死是謂玄牝御註萬物受命於無而成形於有谷之用無相神之體無方萬物所受命也玄者天之色牝者地之類萬物所成形也谷神以況至道之常玄牝以明造物之妙王元澤曰谷神受命而玄牝賦形自爲陰陽以成天地然本一物也由其受命故曰谷神由其賦形故曰玄牝曹道沖曰玄者杳冥而藏神牝者沖和而藏氣此陰陽之宗天地之祖也谷養也谷虚而應應而不著谷虚而受受而不積言養神在於虚而已是謂不死之道在於玄牝也玄牝之門是謂天地根御註莊子曰萬物有乎生而莫見其根有乎出而莫見其門而見之者必聖人已故於此明言玄牝之門是謂天地根天地者萬物之上下也物與天地本無先後明大道之序則有天地然後有萬物然天地之所從出者玄牝是已彼先天地生者孰得而見之河上公曰根元也言鼻口之門乃是通天地之元氣所從往來也纂微曰上言谷神不死勸人養神之理此曰玄牝之門者示人鍊形之術也故神形俱妙者方與道同也曹道沖曰玄者天之體牝者地之氣玄天之資始有生是爲精光牝母育萬物是爲形器天地雖大亦本於道德體於陰陽故曰天地根也綿綿若存河上公曰鼻口呼吸喘息常綿綿微妙若可存之復若無有王元澤曰綿綿引而不絶之謂神牝生生不盡而若有若無不可定有用之不勤御註自本自根自古以固存火之傳不知其盡也夫是之謂綿綿若存茫然天造任一氣之自運倏爾地化委衆形之自殖乾以易知坤以簡能非力致也何勤之有河上公曰用氣當寬舒不當急疾勤勞也蘇子由曰綿綿微而不絶也若存存而不可見也能如是雖終日用之而不勞矣心定息微任自然而無使氣之强何勤之有此章之意主虚心養神則不死在於玄牝玄牝者乃天地之宗陰陽之祖藏神藴氣而萬物恃之以生成者也生成之理綿綿而來不絶不盡用之不勞有得有成諸家皆以外說唯河上公纂微内說之以理持之有内必有外二義俱通並皆録之天長地乆章第七天長地久蘇子由曰天地雖大未離於形數則其長久蓋有量矣張君相曰乾剛廣覆歷古今不傾坤柔厚載經終始彌固太上之言長乆極於天地蓋以人所見者言之耳若夫長乆之至則所謂天地始者是矣天地所以能長且乆者以其不自生故能長生王元澤曰自生則有其生有其生則生既喪矣唯無以生爲則生未嘗生未嘗生則所寓之形雖生而無生之累宜其長且乆也天地之不自生非利乎長乆而然道固如此而已張君相曰萬物皆自營其生唯天地但知生育萬物不自營生施生不自生是故得長乆是以聖人後其身而身先外其身而身存御註人皆取先己獨取後曰受天下之垢是謂後其身後其身則不與物爭而天下莫能與之爭故曰後其身而身先在塗不爭險易之利冬夏不爭陰陽之和外死生遺禍福而神未嘗有所困也是謂外其身而身存馬巨濟曰聖人與天地同則後身外身猶之不自生自先身存猶之長生也後身謂屈己也外身謂忘我也屈己則人下之故身先忘我則外身故身存非以其無私耶故能成其私御註天地之大德曰生聖人之大寳曰位道者爲之公天地體道故無私無私故長乆聖人體道故無私無私故常存自營爲私未有能成其私者也吕吉甫曰身者吾之私也後其身外其身則公而無私無私也故能成其私馬巨濟曰天地不自生與聖人之後外其身皆無私也然天地以此長生而聖人以此長存則皆成其私者也然不私之爲私大矣莊子曰無私焉乃私也此章言道者爲之公天地體道故無私無私故長乆聖人體道故無私無私故長存自營爲私未有能成其私者也學者體道之公不私一己亦得其長乆也道德眞經取善集卷之一
