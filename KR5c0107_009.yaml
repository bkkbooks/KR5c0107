body:
  text: 宋饒陽居士李霖集善建者不拔章第五十四善建者不拔御註建中以該上下故不拔節解曰言行人君子善以道德建立身心無德可彰無跡可顯則深根固蔕不爲是非欲惡之所抽拔若建者伐德求名顯功希報美善既彰冥功不著終爲無常業障之所抽拔故淮南子曰善建者相貌金剛火能銷之火熱水能滅之水流土能塞之木强斧能伐之唯是建於無建者不可拔也善抱者不脱纂微曰善以道抱元守一者則精神完全而不脱失也舒王曰抱一也抱一而不離則不脱矣子孫祭祀不輟御註建中而不外乎道抱一而不離於精若是者豈行一國與當年蓋將及天下與來世其傳也遠矣唐明皇曰言善以道德建抱之君功施於後愛其甘棠況其子孫乎而王者祖有功宗有德故周之興也始於后稷成於文武周之祭也郊祀后稷宗祀文王故雖卜代三十卜年七百毁廟之主流溢於外而后稷文王郊宗之祀不輟止也修之身其德乃眞杜弼曰明以近修遠立身以道不拔不脱固蒂深根以此修身眞德在已也修之家其德乃餘河上公曰修道之家父慈子孝兄友弟順夫信婦貞其德如是乃有餘也王弼曰以身及人也修之身則眞修之家則有餘修之不廢所施轉大修之鄉其德乃長修之國其德乃豐修之天下其德乃普御註修之身其德乃眞所謂道之眞以治身也修之家其德乃餘修之鄉其德乃長所謂其緒餘以治人也修之國其德乃豐修之天下其德乃普所謂土苴以治天下國家也其修彌遠其德彌廣在我者皆其眞也在彼者特其末爾故餘而後長豐而後普於道爲外纂微曰此五者近修諸身而遠及天下也故以身觀身以家觀家曹道冲曰察身之損益邪正則知衆人矣察家之逆順盛衰則知他之家矣以鄉觀鄉以國觀國以天下觀天下御註萬物皆備於我矣反身而誠樂莫大焉故以身觀身而身治推此類也天下有常然以之觀天下而天下治矣纂微曰觀者照察也故以先聖治身之道反觀吾身心若吾身心能體於道則其德乃眞矣以先聖治家之道反觀吾家人若吾家人能睦其親則其德有餘矣以先聖治鄉之道反觀吾鄉黨若吾鄉黨能信於友則其德乃長以先聖治國之道反觀吾國民若吾國民能遂其生則其德乃豐矣以先聖治天下之道反觀吾天下之民能無欲無知則其德乃普矣吾何以知天下之然哉以此河上公曰老子言吾何以知天下修道者昌背道者亡以此五事觀而知之王弼曰此上之所云也言吾何以得知天下乎察己以知之不求於外也所謂不出户以知天下者也王元澤曰聖人所守一道更無異說故其所以爲所以知皆由此道也此章首言善建抱終之以知天下者蓋天下之本身也善建抱者所謂修之身也推此以及天下可謂知治之本矣含德之厚章第五十五含德之厚比於赤子御註惟民生厚因物有遷含德之厚不遷於物則氣專而志一孟子曰大人不失其赤子之心唐明皇曰至人含懷道德之厚者其行比於赤子吕吉甫曰人之初生其德性至厚也及其長也耳目交於外心識受於内而益生日多則其厚者薄矣爲道者損其所益生性修反德德至同於初故曰含德之厚比於赤子含抱也赤子性淳而未散氣和而不暴含德之人性本至厚不遷於薄故比於赤子含德之厚者非特有赤子之容也有赤子之心矣毒蟲不螫猛獸不據攫鳥不搏張君相曰毒蟲蜂蠆蛇虺之類以氣害人爲螫猛獸虎兕之類以足踐人爲據攫鳥鵰鶚之類以爪傷人爲搏赤子無害物之心故不爲此等諸物所害且毒蟲喻嗔猛獸喻癡攫鳥喻貪赤子絶此三惡故不爲三毒所傷含德之人慈忍乆就内不生嗔故言毒蟲不螫喜捨既成貪愛亦盡故喻攫鳥不搏常有明智永絶癡惑故言猛獸不據夫赤子特以受冲氣之和無害物之心故物莫能傷況夫充純氣之守通乎物之所造而其和大同於物者孰能害之莊子曰人能虚己遊世其孰能害之骨弱筯柔而握固河上公曰赤子筋骨柔弱而握固以其意專心不移也赤子意專志一心無所知手無所用故自然握拳牢固未知牝牡之合而峻作精之至御註德全者形全故骨弱筋柔而握固形全者神全故未知牝牡之合而峻作精之至者可以入神莊子曰聖人貴精林靈素曰峻小兒陰也作動也牝牡之合即陰陽之運會赤子未知會合之理而動作者至精不散也含德之人雖了諸法空寂寂不廢動而能無心應物動作合德合時此明身業靜王元澤曰非有慕好於外而峻作則是順其氣之自運而不以心者也若自營於外而心佚於内則精喪而死矣安能乆乎舉世之大患莫大於此而學者之至戒也終日號而嗌不嗄和之至御註致一之謂精精則德全而神不虧冲氣以爲和和則氣全而嗌不嗄人之生也精受於天一而爲智之源和得於天五而爲信之本及其至也可以入神可以復命而失其赤子之心者精摇而不守氣暴而不純馳其形性潜之萬物豈不悲夫啼極無聲曰嗄赤子從朝至暮啼號聲不變易者以其心不動而氣和也使赤子心有所憂愠則氣戾而不和其能若是乎含德之人演玄言而不疲流法音而不竭此亦抱冲和之所致也知和曰常舒王曰和之爲用則常而不變故曰知和曰常人能知和氣柔弱則制命在我有常而不變故致道之極則至於復命復命曰常含德之厚則至於知和知和亦曰常則道德雖有間及其會於常則一也知常曰明松靈仙曰和是不二之中夫道一相無相不爲生死所傾動故名曰常能知此常則智慧日明也舒王曰不明則不足以知常益生曰祥舒王曰夫生不可益而人常求益於生則有凶祥孫登曰生生之厚動之妖祥一受其成形而素分定生理至足無欠無餘以直養之則亦至矣從而增焉秪以爲贅非徒無益而又害之是曰凶祥心使氣曰强御註體合於心心合於氣則氣和不暴蹶者趨者是氣也心實使之兹强也以與物敵而非自勝之道舒王曰氣者當專氣致柔今反爲心之所使不能專守於内則爲暴矣故曰心使氣曰强書曰作善降之百祥上章曰守柔曰强此祥者非作善之祥乃灾異之祥此强者非守柔之强乃强梁之强王元澤曰有心以使氣則氣復使心心氣交使則天和凋喪損其眞矣人所受者不可益損故增生損氣俱爲失理孟子有揠苗不芸之戒老子有益生使氣之說凡以全其淳氣而已此强非自勝之强强梁之强也嗟乎流俗有爲之徒不能同其赤子之無心縱無窮之欲喪甚眞之精或補以藥石或行以小術求益眞元反成疾病故老子有益生之戒也不能似赤子之氣和或用意以存想或役心而行氣欲氣盛而體充反神勞而氣耗故老子有使氣之說也物壯則老是謂不道不道早己蘇子由曰益生使氣不能聽其自然日入於剛强而老從之則其非赤子之性矣物不可以壯壯則老矣夫道者先天地而不爲壯長於上古而不爲老若不知道之眞常而益生使氣爲强梁之人是物而已豈道也哉故曰早已此章言赤子之無心含德之厚者似之赤子無心害物而物莫之傷也故精全而不散氣和而不暴知此乃眞常也不能知此則益生使氣而有壯老之異失赤子之心矣非含德之厚者也知者不言章第五十六知者不言河上公曰知者貴行不貴言也成玄英曰知道之人達於妙理理無言說所以不言顧歡曰明道則忘言存言則失道道可默契不可口說故莊云道無問問無應言者不知纂微曰知道者以心而不以辯貴行而不貴言談道者以辯而不以心喪道而不喪說道不可言言而非也知道者不言故孔聖欲無言孟子豈好辯正容以悟物者有之目擊而道存者有之四問而四不知三問而三不答是皆知道不可言也且識音者口不能傳斲輪者口不能言彼進乎技者尚爾況道深微妙安可言乎多言數窮離道遠矣塞其兊閉其門御註塗郄守神退藏於密纂微曰此與第五十二章文同而㫖異也彼則約道清靜以塞嗜欲愛悦之端此則宗道無言故興損聰棄明之說夫道無形故不可以目視又不可以口傳夫至人塞兊閉門而善能收眡歛聽鉗口結舌故曰塞其兊閉其門也陸佃曰兊者所以說物也門者所以通物也塞其所悦閉其所通然後可以挫其鋭挫其鋭解其紛和其光同其塵裴處恩曰和其光令光不耀同其塵令塵不染挫鋭而内不出解紛而外不入和光而不耀同塵而不染眞知者其處己如此是謂玄同蘇子由曰道非言說亦不離言說然能知者未必言能言者未必知唯塞兊閉門以杜其外挫鋭解紛和光同塵以治其内者默言不言而與道同矣玄升而入道至於玄則小而與物辯唯塞兊閉門挫鋭解紛和光同塵默而不言而與道同矣故不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故爲天下貴御註世之人愛惡相攻而有親疏之態情偽相感而有利害之見用捨相權而有貴賤之分反復更代未始有極奚足爲天下貴知道者忘言忘言者泯奸惡忘情偽離用捨而玄同於一性之内良貴至足天下兼忘故爲天下貴吕吉甫曰若然者萬物一府死生同狀無所甚親無所甚疏故不可得而親不可得而疏不就利不違害故不可得而利不可得而害不榮通不醜窮故不可得而貴不可得而賤夫可得而親疏利害貴賤者則貴在於物而物皆賤之不可得而親疏利害貴賤者貴在於我而物不能賤也其爲天下貴不亦宜乎不可得而親疏者若列禦寇居鄭圃人無識者是也不可得而利害者若列子辭鄭子陽之粟是也不可得而貴賤者若曾子居衛是也此章貴忘言而體道下文皆默而成之之道也又孰得而親疏利害貴賤者哉良貴在我物莫能賤故爲天下貴以政治國章第五十七以政治國體道之常之謂正正止於一而不變道之常也治國之道以常爲貴孟子曰一正君而國定矣以奇用兵顧歡曰奇者變詐也臨難制變兵不厭詐三略九奇九攻百勝此上將軍師靜難息寇武之功也劉仲平曰雜而不純者天下之常心也流而不制者天下之常情也正之爲道異於是矣故一而不雜者正之體也止而不流者正之用也一而不雜則不純者之所宗也止而不流則流而不制者之所主也是以治國者不可以他求以正爲守而已若夫用兵則不然操凶器臨危事有萬之衆决勝負於頃刻之間有可以制敵則乘權適變宜無不可爲者故其容與治國常異故用奇而不以正也以無事取天下御註正者道之常奇者道之變無事者道之眞國以正治兵以奇勝道之眞無容私焉順物自然而天下治矣雜說曰正可以治一國而已奇可以用五兵而已唯其無事者然後可以取天下故曰取天下常以無事及其有事不足以取天下然而湯放武伐亦可以無事乎曰然則湯武者順乎天應乎人其放伐也猶放伐一夫爾未聞有事也吾何以知天下其然哉以此唐明皇曰以此下文知之天下多忌諱而民彌貧纂微曰忌諱謂禁令也人君不能無爲而以政教治國禁網繁密民慮其扺犯無所措其手足避諱不暇弗敢云爲舉動失業日至貧窮王元澤曰事爲之禁則民擾而失業故貧也此亂之所始人多利器國家滋昏王弼曰利器凡所以利己之器民强則國家弱王元澤曰有利器則必有機心機心生則下難知故國家昏也人多伎巧奇物滋起御註伎巧勝則人趨末而異服奇器出以亂俗王弼曰民多智慧則巧偽生巧偽生則邪事起纂微曰伎巧謂工伎巧妙也法令滋彰盜賊多有唐明皇曰無爲既失法令益明竊法爲姦盡成盜賊則豈非多有乎舒王曰法令者禁天下之非因其禁非所以起偽蓋法出姦生令下詐起故曰法令滋彰盜賊多有故聖人云河上公曰謂下文也我無爲而民自化御註天無爲以之清地無爲以之寧兩無爲相合萬物皆化聖人天地而已故民日遷善而不知爲之者堯舜淵默乎法宫之中垂拱而視天民之阜文武不識不知而順帝則垂衣拱手而天下治此帝王無爲而民自化莊子曰無爲而萬物化我無事而民自富河上公曰我無徭役徵召之事民安其業故皆自富也類解曰心既無爲迹又無事四民樂業百姓豐饒此反天下多忌諱而民彌貧上無事則不興力役豈奪農時而民自富此申上文彌貧之義我好靜而民自正王元澤曰好靜則復性上復性則民亦復性故自正申上文盜賊之義羊祜曰我動則民邪我靜則民正此反人多利器國家滋昏我無欲而民自樸唐明皇曰無爲則清靜故人自化無事則不擾故人自富好靜則得性故人自正無欲則全和故人自樸此無事取天下矣樸者性之全我性全而無欲民亦無欲而自樸也此申上文奇物之義此章主無事以取天下也自天下多忌諱至盜賊多有此有事以取天下之過也自我無爲而民自化至我無欲而民自樸此無事以取天下之證也其政悶悶章第五十八其政悶悶其民淳淳河上公曰其政教寬大悶悶昩昩似若不明故民淳淳富厚相親睦也唐明皇曰政教悶悶無爲寬大人則應之淳淳然而質樸矣吕吉甫曰淳淳者言其不於薄也其政察察其民缺缺唐明皇曰政教察察有爲苛急人則應之缺然而凋弊矣舒王曰悶悶者無所分别唯其無所分别則常使民無知無欲故其民淳淳察察者有所分别也有所分别則其民不能無知無欲而常缺缺矣吕吉甫曰缺缺者言其不全於樸禍兮福所倚河上公曰倚因也夫禍因福而生人遭禍而能悔過責己修善行道則禍去福來福兮禍所伏河上公曰禍伏匿於福中人得福而爲驕恣則福去禍來唐明皇曰倚因也伏藏也上言其政悶悶俗則以爲無政理之體人反淳淳然而質樸此則禍爲福所因也其政察察而俗則以爲有政理之術人乃缺缺然而凋弊此福爲禍之所藏也禍福倚伏在吉凶之域者將何處也蓋禍至不懼省躬自咎以免於禍而已將處乎禍與福之間也若是則禍亦不至福亦不來禍福無有惡有人灾莊子曰寧於禍福孰知其極河上公曰禍福更相生誰能知其窮極孫登曰孰誰也極盡也夫禍福相因倚伏無定禍因福至福假禍來孰知其盡也其無正邪王元澤曰大運不留當時者爲是欲定其正而不知正不可常則可謂智乎雖然以爲無正者是以無正爲正者也邪者疑辭亦不定乎無正也正復爲奇善復爲妖民之迷其日固乆御註通天下一氣爾今是而昨非先迕而後合神奇臭腐相爲終始則奇正之相生妖善之更化乃一氣之自爾天下之生乆矣小惑易方大惑易性自私之俗勝而不明乎禍福之所倚伏且復察察以治之民安得而反其眞乎陸佃曰其無正邪蓋有正者有正正者所謂正正者無正是也夫唯無正故能超乎吉凶之表而無禍無福以知其極也若夫未能致於無正之地而流於吉凶之域則一禍一福其運如輪其循如環終於迷而已矣故曰正復爲奇善復爲妖民之迷其日固乆是以聖人方而不割御註方者介於辨物大方無隅止而不流無辨物之迹顧歡曰方正其身妖奇自隔不以其方割彼從我也廉而不劌廉者矜於自潔大廉不嗛清而容物無刻制之行王弼曰廉清廉也劌傷也以清廉清民令去其邪令去其污不以清廉劌傷於物也直而不肆河上公曰肆申也聖人雖直曲己從人不自申也王弼曰以直導物令去其僻而不以直激拂於物所謂大直若屈也王元澤曰直而肆則有其直大直於理爲直而常委曲以從理書曰直而温温則不暴内直而外不暴以凌物所謂不肆也語曰質直而奸義光而不耀御註直而肆則凌物而態生光而耀則揚行之患至内直而外曲用其光而復歸其明其唯聖人乎民之迷也以方爲是者如子莫之執中以廉爲是者如仲子之操知伸而不知屈知彰而不知微以誇世末之弊俗而失聖人之大全豈足以正天下聖人所以正天下者何哉如斯而已王元澤曰光以爚物謂之耀和其光歸其明者豈耀以爚物哉此章言禍福正奇善妖相生而不可知民之迷此固以乆矣柰何復以察察之政始之則民安得全其樸乎是以聖人雖方廉直光以處己然未嘗顯迹以示人蓋取此悶去彼察察而寧於禍福也治人事天章第五十九治人事天莫若嗇御註保其精神而不以外耗内者嗇也精神四達並流而無所不極上際於天下蟠於地化育萬物其名爲同帝人之所以爲人天之所以爲天者也唯嗇也愛養精神然後俯治人仰事天故曰治人事天莫若嗇夫唯嗇是謂早復吕吉甫曰夫唯嗇其精神而不用則早復也苟唯不嗇而費之至於神敝精勞雖欲反其情性亦無由入矣其於復也不亦晩乎故曰夫唯嗇是謂旱復王元澤曰動極而靜則其復晩矣唯嗇者不侈於費已其去本也未嘗遠故復靜爲早早復謂之重積德吕吉甫曰人之生也固足於德矣誠能嗇而早復之則德日益以充故曰早復謂之重積德王元澤曰德不外耗則積於内而資納無窮則其爲積也積之又積者也重積德則無不克御註能勝之謂克宰制萬物役使羣動而無所不勝者惟德而已吕吉甫曰重積德則德之至也至德者火不能熱水不能溺寒暑不能害禽獸不能賊安往而不克哉故曰重積德則無不克無不克則莫知其極御註德至於無所不勝則汎應而不窮孰知其極也吕吉甫曰夫有所不克則其道有時而極也無所不克則孰知其極故曰無不克則莫知其極莫知其極可以有國御註體盡無窮則其於用天下也有餘裕矣況有國乎吕吉甫曰夫有土者有大物也有大物者不可以物物而不物故能物物莫知其極則不物而能物物者也雖有土者而無累矣故曰莫知其極可以有國有國之母可以長久御註道爲萬物母有道者萬世無弊舒王曰國者皆出於道也故以道爲母如此則没身不殆也故曰可以長乆是謂深根固蒂王元澤曰人以性命爲根外乎此者皆枝葉也失性之人盛枝葉以傷根根傷則精氣衰而蒂不固此所以早斃也夫唯嗇則不以外傷其根根深則蒂固蒂固則形連乎命而遲脱矣陸佃曰萬物莫足以測之之謂深萬物莫足以傾之之謂固長生乆視之道御註道者萬物之母物其子也性者形之根而形其柢也既知其子復守其母没身不殆故以長乆根深則柢固性復則形全與天地爲常故能長生與日月参光故能乆視人與物化而我獨存此之謂道吕吉甫曰嗇之爲道是謂深根固蒂長生久視之道也精神者生之根嗇而藏之則根深而生長生者視之蒂衛而保之則蒂固其視久矣此章首言治人事天莫若嗇終之以長生久視者蓋長久之道當嗇其精神精神者根也形者蒂也根深則蒂固蒂固而生長視久也昔黃帝問長久之道廣成告之以抱神以靜形將自正無摇汝精乃可長生内經稱眞人之道有曰呼吸精氣獨立守神故能壽比天地無有終時論至人則曰積精全神論聖人則曰精神不散歷觀自古上聖未有不嗇精神而成眞者也乃若今時之人以欲竭其精以耗散其眞不知持滿不時御神喪精失靈形衰早斃豈道也哉故曰道者聖人行之愚者背之道德眞經取善集卷之九
