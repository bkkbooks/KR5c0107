body:
  text: 宋饒陽居士李霖集治大國章第六十治大國若烹小鮮御注烹小鮮而數撓之則潰治大國而數變法則惑是以治道貴清靜而民自定王弼曰不擾也躁則多害靜則全真故其國彌大而其主彌靜然後乃能廣感衆心矣劉仲平曰國之大者治之若烹小鮮而已何也取其不煩擾爾魚小則易於潰爛民弱則易於煩擾烹小鮮者待其自熟治大國者任其自治經曰我無為而民自化我奸靜而民自正以道蒞天下其鬼不神陸佃曰蓋鬼神者無以休止安定則出而為祟古之人以道蒞天下者則鳥獸魚鱉至於咸若山川鬼神亦莫不寧是以無靈響也王元澤曰民不擾則得盡其性民盡其性則天地之和應而萬物無不遂矣故鬼亦安其處而不能為神也人鬼殊道而每至於相干者陰陽之氣有戾而交失其所故靈物得乘釁矣天下雖大治之在道道常無為而任自然治大國若烹小鮮所謂以道蒞天下也故陰陽之氣無戾人鬼各安其處所以其鬼不神也非其鬼不神其神不傷民唐明皇曰上言其鬼不神非謂鬼歇滅而無神但有其神而不見怪以傷人也非其神不傷民聖人亦不傷民劉進喜曰神者效驗靈也非此鬼無靈效但人君用道鬼乃福祐於人不能傷害於物治大國若烹小鮮所謂聖人不傷民也唯聖人不傷民故天地之和應人鬼各遂兩不相傷也夫兩不相傷故德交歸焉御注以道蒞天下者莫之為而常自然無攻戰之禍無殺戮之刑是之謂不傷民當是時也神與民兩不相傷而德交歸焉神無所出其靈響也詒爾多福而已故曰其神不傷民民無所施其智巧也日用飲食而已夫何傷之有此章欲人君以道治天下莫之為而任自然故幽明各安其位人神不相雜𢭦而德交歸焉帝堯之時絶地天通罔有降格夏后之世山川鬼神亦莫不寧此帝王無為而治天下也大國者下流章第六十一大國者下流河上公曰治大國者當如江海居下流不逆細微也王弼曰江海居大而處下則百川流之大國居大而處下則天下歸之故曰大國下流也吕吉甫曰知以道治其國固不傷其人矣而不知所以交天下者則己雖不傷人而有傷其人者矣大國者下流天下之交天下之交牝牝常以靜勝牡以靜為下乃所以交天下而保其人之道也天下之交王弼曰天下所歸會也唐明皇曰下流者謙德也大國當下流開納則天下之人交至矣天下之交牝王弼曰靜而不求物自歸之也王元澤曰當以雌靜受物牝常以靜勝牡河上公曰陰勝陽者以安靜不先求也以靜為下王弼曰以其靜故能為下也牝雌也雄躁動貪欲雌常以靜故能勝雄也以其靜復能為下故物歸之也舒王曰交者衆人之會能處衆人之所惡則天下之動莫不歸之矣故曰天下之交牝者蓋天下之交交於牝而已蓋牝常以靜勝牡以靜為下故靜為君而常處於下則足以勝牡矣故曰以靜勝牡以靜為下吕吉甫曰蓋天下之交牝而牝常以靜勝牡而所以勝者由以靜為下故也故大國以下小國則取小國王弼曰大國以下猶云以大國下小國小國則附之顧歡曰夫大國謙以虛則小國悅以服服之是為取彼小國也小國以下大國則取大國河上公曰此言國無大小能執謙畜人則無過失也王弼曰大國納之也盧裕曰取其容己也唐明皇曰大取小以為臣妾小取大以為援助故或下以取或下而取唐明皇曰以者大取小而者小取大吕吉甫曰故大國以下小國則取小國則所謂或下以取之也下以取之者言大之於小宜若可以無下而下之者以取之故也小國以下大國則取大國則所謂或下而取之者也下而取之者言小之於大不得不下而取之故也齊宣王問曰交鄰國有道乎孟子對曰有惟仁者為能以大事小是故湯事葛文王事昆夷惟智者為能以小事大故太王事獯鬻句踐事吳以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者保其國大國不過欲兼畜人河上公曰大國不失下則兼并小國而牧畜之成玄英曰大國所以用謙者更無餘意故不過欲兼愛畜養小國小國不過欲入事人劉進喜曰小國用柔者更無餘心不過欲入大國之中慕德接事唐明皇曰大國執謙德而下小國者不過欲兼畜小國為臣妾小國贄貢賦以下大國者不過入事大國為援助兩者各得其所欲故大者宜為下劉仁會曰恃大恐自高故特以為戒也舒王曰蓋以小事大者人之易以大事小者人之難唯其人之所難故老子以大者宜為下吕吉甫曰今大者下小小復下大兩者各得其所欲則其有不取之者乎取之者言得其心而不失之之謂也然則大者小者莫不宜為下而獨曰大者宜為下何也小而不能下大非徒不能取大國而亦禍灾及之矣則不嫌於不宜故曰大者宜為下而已大者奄有四海君臨萬方其勢崇高其位尊極失於盈滿尤宜謙下劉子曰天道下濟而光明江海善下而為王故山在地中為謙王侯以孤寡為損此章言交鄰國之道以謙下為本故國無大小皆當用謙然大者恐恃以自高尤當謙下故特戒云道者萬物之奧章第六十二道者萬物之奧劉仲平曰奧者至深之居徼者一隙之邊以言乎道之妙則喻以奧以言乎道之粗則喻以徼言妙則知徼之為粗言徼則知妙之為奧善人之寶唐明皇曰善人知守道者昌故常寶貴之以為用也王元澤曰善人之所寶聖人則體之矣天下莫不貴者道也知道之可貴者善人也寶者貴重之意道之為寶者精氣神是也夫精者身之本保其精而不蕩則形全專其氣而不暴則體充守其神而不散則真全三者混而為一此道所以為善人之寶也不善人之所保唐明皇曰保任也不善之人不能寶貴至道及其患難即欲以身保任於道自求免爾莫非道也善人求之足以至於善不善人之所保倚也謂遭患逢急能自悔卑下則足以免於罪美言可以市尊行可以加人人之不善何棄之有孫登曰夫言之可以奪衆貨之價尊行之可以加衆人之上夫道之出口淡乎無味聖人居無為之事行不言之教豈華辭以悅百姓之耳飾行以曜萬物之目哉陸佃曰言風波也行實喪也然而美之尚可以市尊行之尚可以加人又況道者萬物之奧乎此古之人所以用斯道覺斯民也而一民覺焉則雖以至寶充滿法界以用施者其功莫之勝也故曰美言可以市尊行可以加人人之不善何棄之有故立天子置三公顧歡曰樹君立輔論道經邦欲以率道天下教化不善人也杜光庭曰四海之大萬有之富厥初生民不可無主故立天子以牧之天子者尊事上帝父事於天母事於地謂之天子一人不可以廣治置百官之長有三公焉書云其惟三公論道經邦三公謂太師太傅太保溫公曰立君以司牧其民置輔以師保其君雖有拱璧以先駟馬不如坐進此道御注君子之守修身而天下平天子三公有璧馬以招賢而不務進道以修身則捨己而徇人失自治之道矣不如坐進此道者求諸己而已道之所在聖人尊之故民從者如歸市舒王曰立天子置三公雖有合拱之璧先乘駟馬足以迎賢者之來而不如坐進此道而已王元澤曰天子三公以化民為己任有道則天下將自賔璧馬所以招賢為政之大者也雖得賢而已不能進道則民猶不服故未若不求乎外而進道之要也此三家說璧馬以招賢吕吉甫曰故立天子置三公雖拱璧以先駟馬所以享於上者禮之恭幣之重者也然不如坐進此道以道之為天下貴雖坐而進之過於恭禮重幣也天子三公所以坐而論道者不過此而已此說璧馬所以享上古之所以貴此道者何顧歡曰古之所以貴寶此道者其意何耶問其所由也不曰求以得有罪已免邪故為天下貴御注求則得之求在我者也古之人所以求之陰陽度數而未得者求在外故也惡者遷善愚者為哲此有罪所以免歟道之善救者如此故為天下貴傳曰天下莫不貴者道也吕吉甫曰求以得則所謂善人之寶有罪以免則所謂不善人之所保也唯其如此此所以為天下貴而古之人所以不得不貴也此章言物皆出於道道為天下貴利而行之者善人也故曰求以得保而任之者衆人也故曰有罪以免以道無所不用故為天下貴為無為章第六十三為無為事無事味無味御注道之體無作故無為無相故無事無欲故無味聖人應物之有而體道之無於斯三者槩可見矣劉進喜曰為無為修道業也事無事見道相味無味達道理無為者道之常無事者道之真無味者道之淡此三者皆道也大小多少報怨以德御注大小言形多少言數物量無窮不可為倪大而不多小而不少則怨恩之報孰睹其辨聖人所以同萬有於一無能成其大王元澤曰以直報怨者事也以德報怨者德也事則吉凶與民同患故種種諸法一不可廢若夫德則不見有物安得怨乎如上三事體道者也方其體道故當如此爾舉怨而以德則知無所不用德曹道沖曰報怨以德仇讎便絶報怨以怨相報無盡圖難於其易為大於其細纂微曰此重誡也難易大細者則上之大小多少也夫是非美惡怨怒恩德皆生於微漸無不始於易而終成難初於細而後成大今使圖度其始易之時則於終無難矣營為初細之日則於後無大矣若乃謀難於已難為大於已大則怨怒深而禍亂積將欲釋難解紛不亦難乎禍患之機藏於細微發於常人之所忽及其著也雖知者不能善其後是以怨之作也必於易細而圖為之則無怨矣書曰怨豈在明不見是圖天下難事必作於易天下大事必作於細御注千丈之堤以螻蟻之穴潰百尺之室以突隙之煙焚白圭之行堤也塞其穴是以無水難丈人之慎火也塗其隙是以無火患天下之事常起於甚微而及其末則不可勝圖故聖人蚤從事焉疏曰作起也此叠上文原禍難之所起難事必起於易欲令於易而圖之大事必起於細欲令於細而去之其類實繁不可具舉故以天下總之爾杜光庭曰防禍於未兆絶患於未萌慎之至也是以聖人終不為大故能成其大御注為之於小故能成其大亂已成而後治之不亦晚乎唐明皇曰前明凡人常為難大之事故令圖而去之此明聖人不為難大之事故能成其尊大夫輕諾必寡信成玄英曰此起喻也諾然許也寡少也夫輕易許諾於人者必少有信實也杜光庭曰解楊無二命仲由無宿諾古人美之記曰與其有諾責寧有己怨多易必多難唐明皇曰輕諾許人必寡於信動作多易後必多難成玄英曰此答喻也夫輕易為罪必招重大之殃羅什曰輕而不修報之必重也是以聖人猶難之故終無難御注禍固多藏於微而發於人之所忽聖人之應世常慎微而不忽故初無輕易之行而終絶難圖之患凡一體無故也王弼曰以聖人之才猶尚難於細易況非聖人之才而欲忽於此乎故曰猶難之也惟其難於細易故終無難大之事劉仁會曰慮而後動終無悔吝聖人猶爾況非聖乎此章上三事體道也故報怨以德是圖為於易細之時終無難大之事非體道聖人孰能如是其安易持章第六十四其安易持杜光庭曰夫生性安靜嗜欲未萌就而守之執持為易其未兆易謀唐明皇曰言人正性安靜之時將欲執持令不散亂次雖欲起心尚未有形兆謀度絶之使令不起並甚易爾王元澤曰戒在事物之先其脆易破其微易散唐明皇曰欲心初染尚自危脆能絶之者脆則易破禍患初起形兆尚微將欲防之微則易散爾吕吉甫曰其脆易破則不可使至於堅其微易散則不可使至於著物皆然心為甚通諸其心則天下國家無難矣王元澤曰救於已然之始所謂治之於未亂也為之於未有治之於未亂嚴遵曰未疾之人易為醫也未危之國易為謀也萌芽之患易事也小弱之禍易憂也何以效之曰任車未虧童子行之及其傾覆也顛高墮谷千人不能安卵之未剖也一指摩之及其為飛鴻也奮翼凌雲罾繳不能連合抱之木生於毫末九層之臺起於纍土千里之行始於足下御注有形之類大必滋於小高必基於下遠必自於近其作始也簡其將畢也必巨聖人見端而思未睹指而知歸故不為福先不為禍始躊躇以興事以每成功唐明皇曰此言患生於微而成於著喻如合抱之木始生如毫毛之末此明自性而生也九層之臺起於一簣之土此明積習而成也千里之遠行始於舉足之下此明遠行不止也則天下之事誠以細微為始而人多忽之遂成患本故舉三喻以證上文杜光庭曰人之所以不防患國之所以不慎微禍形而務除亂成而務理此皆失之遠矣毫毛至於合抱自小而成大也纍土成於層臺自下而為高也千里始於舉足自近而及遠也世之人但見合抱之木層臺之高千里之遠方欲以執柯以伐之聚鍤以壞之馳騖以追之勞亦云甚禍不可救亦猶倚市門而長嘯終亂晋朝萌沙鹿以貽祅幾傾漢室默識遠鑒所宜留神為者敗之執者失之唐明皇曰為謂營為也執謂執著也言人不能為之於未有治之於未亂而更有所營為於性分之外執著於塵境之中故必禍敗而失亡也吕吉甫曰為之於未有則是不為為之也治之於未亂則是不治治之也已有而為之欲成而反敗之已亂而治之則執之欲固而反失之也是以聖人無為故無敗無執故無失御注聖人不從事於務故無敗不以故自持故無失勝者規度而固守之去道愈遠矣能無敗失乎吕吉甫曰是以聖人為之於未有則我因無為也故無敗治之於未亂則我固無執也故無失民之從事常於幾成而敗之御注中道而止半塗而廢始勤而終怠者凡民之情蓋莫不然故事常幾成而至於敗吕吉甫曰民之從事常在既有之後故至於幾成而敗之以不知其本故也凡民從事至於幾成而敗者以不慎厥終也書曰為山九仞功虧一簣慎終如始則無敗事御注靡不有初鮮克有終終始惟一時乃日新施之於事何為而不成唐明皇曰慎其終末常如始從善之心則必無禍敗之事吕吉甫曰使知大生於小高起於下遠始於近慎終如始豈有敗事哉是以聖人欲不欲不貴難得之貨學不學復衆人之所過御注欲利者以物易己務學者以博溺心夫豈足以造乎無為聖人不以利纍形欲在於不欲人我之養畢足而止故不貴難得之貨不以人滅天學在於不學緝熙於光明而已故以復衆人之所過道之不明也賢者過之況衆人乎復其過而反之性此絶學者所以無憂而樂陸佃曰損金於山投珠於淵棄極真之寶絶窮巧之伎夫是之謂欲不欲忘其仁義遺其禮樂棄已陳之糟粕投既腐之土梗夫是之謂學不學王元澤曰不欲之欲非無欲也欲在於不欲爾故不貴難得之貨而已民飽食暖衣性所不免欲此而已不為有欲而離性之後更貴難得之貨此乃愚民迷妄失本已遠故也故聖人欲不欲以救其迷而反之性不學之學非無學也所學在於不學爾以復衆人之所過故也衆人逐末多事聖人以不學之學救其過而反之道以輔萬物之自然而不敢為盧裕曰輔佐也人生而靜物之性也以無欲無學輔佐萬物之自然使各遂其性而不敢為杜光庭曰俗學曼衍難復於無為多欲紛綸必迷於正性聖人令學不學以敦素欲不欲以恬愈漸窺正道之光用輔自然之性不貪難得之貨不務過分之能自敗而反成慎終其若始察微防害復於易持之安國所以晏寧身所以貞固然後可擬古之善為道爾陸佃曰欲不欲至於無欲學不學至於無學則可以祐神而相天故曰輔萬物之自然而不敢為祐神者以已之神祐萬物之神相天者以已之天相萬物之天鳥獸固有羣矣草木固有立矣自生自化自形自色萬物既已自然聖人於此輔之夫何為哉非亂其經也非逆其情也因其有生輔之以全其生因其有形輔之以全其形有虞之命官以上下草木鳥獸有夏之懋德鳥獸魚鱉咸若此章言聖人圖難於其易故持於安靜之時所謂為之於未有制於脆微之際所謂治之於未亂舉三事以為喻欲早良圖以杜後艱無為而無敗無執而無失始終皆慎豈有敗事乎聖人不欲以靜絶學無憂輔物自然之性以體無為之道然後復易持之安終無難圖之患矣古之善為道章第六十五古之善為道者非以明民將以愚之御注民可使由之不可使知之古之善為道者使由之而已反其常然道可載而與之俱無所施智巧焉故曰愚三代而下釋夫恬惔無為而悅夫啍啍之意屈折禮樂以正天下之形吁俞仁義以慰天下之心將以明民名曰治之而亂孰甚焉王弼曰明謂多見巧詐散其朴也愚謂無知守真順自然也溫公曰去華務實還淳反朴曹道沖曰民智則生姦民愚則反朴明者明民以其智也非以明民所謂不以智治國也愚者智之反也將以愚之使民去智反朴忘是非絶美惡同乎無知無欲矣民之難治以其智多舒王曰夫聖智者國家之利器也言古之善為道者不以聖智示人欲使人無知無欲而愚之也故莊子曰上誠好智而無道則天下大亂矣何以知其然夫弓弩畢弋機變之智多則鳥亂於上鈎餌罔罟罾笱之智多則魚亂於水矣削格羅落罝罘之智多則獸亂於澤矣智詐漸毒頡滑堅白解垢同異之變多則俗惑於辨矣故天下每每大亂罪在於好智愚則無知智則多詐民多智詐巧僞滋生所以難治故以智治國國之賊盧裕曰捨道任智大僞生焉僞生於下智出於上上下相蒙為害大矣唐明皇曰以用也賊害也人君任用多智之臣使令理國智多必作法法出則姦生令下則詐起國家所以滋昏而為國之賊也曹參守法而漢以之安商君變法而秦以之弊故上經云智慧出有大僞是也蘇子由曰吾以智御人人亦以智應之而上下交相賊矣不以智治國國之福唐明皇曰若不用巧智之臣但取淳德之士使偃息蕃魏弄丸解難自然智詐日薄淳朴日興人和則年豐故國之福也劉仲平曰不以智治國者開天者也以智治國者開人者也開天則順順則行其所無事其政所以不嚴而治開人則鑿鑿則失於太察其民所以不淳而缺故曰以智治國國之賊不以智治國國之福新說曰堯舜之智在於不遍物禹之智在於行其所無事不遍物則不察物以為明行所無事則不鑿物以為利則可謂善用智者也若夫老子所謂不以智治國者則在於存之然後民利百倍知此兩者亦楷式河上公曰兩者謂智與不智也常能知智者為賊不智者為福是治身治國之法式唐明皇曰任智詐則害於人任純德則福於國人君知此兩者委任純德之臣是以為君楷模法式吕吉甫曰知此兩者非特施之於治國而已而於身亦楷式而未嘗違也常知楷式是謂玄德河上公曰玄天也能知治身治國之法式是謂與天同德也唐明皇曰玄深也妙也人君常知所委任是謂深遠玄妙至德也玄德深矣遠矣與物反矣御注玄者天之色常知楷式而不用其智則與天合德深不可測遠不可窮獨立于萬物之上物無得而耦之者故曰與物反矣劉仁會曰玄德難測故曰深無往不備故曰遠棄智任愚故曰與物反也玄升而入小而與物辨故與物反矣然後乃至大順御注順者天之理乃至大順者去智與故循天之理而已莊子曰與天地為合其合緡緡若愚若昏是謂玄德同乎大順惟若愚若昏所以去智顧歡曰雖於俗為反而於道為順此章言密用其道使民由之而不知無巧詐之智還朴素之純能知此以為法是深遠玄妙之德去智而循天之理矣道德真經取善集卷之十
