body:
  text: 宋饒陽居士李霖集知其雄章第二十八知其雄守其雌杜光庭曰上清有雌一之道又有三奔五雌之法皆柔弱其志和靜其神以致長生也為天下溪王元澤曰溪以下資納流通守雌則能以虛靜受一切法而不滯於物故曰為天下溪雄動雌靜至人知其動而不逐於動常守靜而不離於真則以靜為下道來歸己如水流入深溪故為天下溪為天下溪常德不離吕吉甫曰溪之為物受於谷而輸於江海受之而不拒輸之而不積物之能通而無忤者也能通則常德不離矣王元澤曰常德分定而不遷道之在我者也不離者一於性分內而不外復歸於嬰兒王元澤曰嬰兒含和守一欲慮不萌性之本真渾而未散德厚之至乃同於初若然者可名於大矣孟子曰大人不失其赤子之心雌主柔靜嬰兒骨弱筋柔其氣不暴欲慮未萌其德不遷所謂含德之厚比於赤子也知其白守其黑王元澤曰黑者北方之色靜不足以言之聖人建一切法非守黑則無以為本相彼春夏發於玄冬此其驗也為天下式吕吉甫曰白於色為受采於物為明於行為金於數為四黑於色為不受染於物為晦於行為水於數為一知白守黑不受萬物之染若晦若水終之於抱一抱一則能曲能枉能窪能弊故可以為天下式白者明白也於物不染黑者默默也於數為一至人知其明白而默默守一天下是則是效故為天下法式為天下式常德不忒吕吉甫曰為天下式無往而非一則常德不忒矣不離者不離其故處而已而未必能不忒不忒則不差矣復歸於無極吕吉甫曰嬰兒之為物專氣致柔不失其一體之和而已復歸於無極則嬰兒不足以言之也羅什曰忒謂爽失也若能去智守愚動與機合德行相應為物楷式顯則成行隱復歸道道本不窮故成無極一是智慧無極二是慧命無極知其榮守其辱杜光庭曰榮尊榮也辱卑辱也人君富有八極君臨九圍是尊榮也自稱孤寡不穀是卑辱也為天下谷舒王曰知其榮守其辱則守之以謙虛而善應故為天下谷為天下谷常德乃足劉仲平曰谷者能虛能應能容能受故常德乃足復歸於朴蘇子由曰不知而不為不若知而不為之至也知雄守雌知性者也知白守黑見性者也知榮守辱復性者也諸妄已盡處辱而無憾曠兮如谷之虛物來而應之德足於此純性而無雜故曰復歸於朴松靈仙曰足充足也復者反歸也朴者真本也始自知雄終乎守辱三行既備為道之要又如虛谷罄無所容所以常道上德於是乃足故得反歸真空與道合體故云復歸於朴草木之蕃也為榮其謝也為辱人之所以為榮辱者亦若是而已至人知榮而不居去華而歸根常守卑辱處衆人之所惡不能纍亦虛而已故為天下谷谷虛而受應而不藏德至於此則至矣盡矣不可以有加矣故曰常德乃足朴者道之全體復歸於朴乃能備道夫孤寡不穀而王公以為稱故抱朴而天下賔復歸於朴則無極不足以言之所謂無名之朴也朴雖小天下莫能臣然則守雌守黑守辱足矣安用知雄與白與榮哉蓋守之以為母知之以為子守之以為經知之以為變也朴散則為器御注形而上者謂之道形而下者謂之器器者道之散也有形名焉有分守焉隨其器而用之鍾會曰朴道也守則為質朴之道散則為養人之器聖人用之則為官長御注道之全聖人以治身道之散聖人以用天下有形之可名有分之可守故分職率屬而天下理此之謂官長易曰知微知彰知柔知剛萬夫之望與此同義唐明皇曰含德內融則復歸於朴常德應用則散而為器既涉形器必有精粗故聖人用之則為羣村之官長矣故大制不割蘇子由曰聖人既歸於朴復散朴為器以應萬物譬如人君分政以立官長亦因其勢之自然雖制而非有所割裂也曹道沖曰制度之大者無裁割之迹原此章之義以常德為本若守其常必以知之為變也故知雄守雌而其德不遷知白守黑而其德不差知榮守辱而其德乃全至是則非特復歸於嬰兒也無有窮極與道同體夫道亘古今而常存德與道同斯可謂之常矣此道之真以治身也其餘以用天下則各因其村而使焉故曰大制不割將欲章第二十九將欲取天下而為之吾見其不得已臧玄靜曰將是方將欲是輒欲謂人方將輒欲力取天下有為治之王元澤曰取者取物是其有我為者造作是其有為有己有為之人方且存乎憂患之間而何暇治人乎蘇子由曰聖人之有天下非取之也萬物歸之不得已而受之其治天下非為之也因萬物之自然而除其害耳取而為之則不可得矣舜避堯之子非所謂力取天下也無為而治非所謂有為治天下也天下神器不可為也御注制於形數囿於方體而域於覆載之兩間器也立乎不測行乎無方為之者敗執之者失故謂神器宰制萬物役使羣動必有不器者焉然後天下治故曰上必無為而用天下莊子曰天根遊於殷陽至蓼水之上適遭無名人而問焉曰請問為天下無名人曰去汝鄙人何問之不豫也為者敗之執者失之溫公曰為之則傷自然執之則乖變通天下神明之器不可以力為而固執之萬物以自然為性故可因而不可為也可通而不可執也物有常性而造為之故必敗也物有往來而執之故必失矣故物或行或隨或煦或吹或強或羸或載或隳御注萬物之理或行或隨若日月之往來或煦或吹若四時之相代或強或羸若五行之王廢或載或隳若草木之開落役于時而制于數固未免乎纍惟聖人為能不纍於物而獨立于萬物之上獨往獨來是謂獨有獨有之人是謂至貴故運神器而有餘裕物態不齊而吾心常一欲明為則敗執則失故物或行之於前必隨之於後如形影之不舍或煦之使溫而不知吹之者已至如寒暑之相生知強而已則羸弱有時而來知載而成則隳廢應手而去此皆造化之大情朝暮之常態事勢之相生不得不然也則安可以為而執之哉是以聖人去甚去奢去泰河上公曰甚謂貪淫聲色奢謂服飾飲食泰謂宫室臺榭去此三者處中和行無為則天下自化矣陸佃曰聖人之於天下因之而不為任之而不執是以去甚慈也去奢儉也去泰不敢為天下先也此三者所以取天下也此章言天下不可以力取不可以有為若容力取又豈知聖人不得已而臨蒞天下乎治以有為又豈知聖人無為而治天下之道乎故為之者必敗執之者必失是以聖人知八法之反復去三事之過分治國則歷祚延長修身則長生久視以道佐人主章第三十以道佐人主者不以兵強天下其事好還蘇子由曰聖人用兵皆出於不得已非不得已而欲以強勝天下雖或能勝其禍必還報之楚靈齊泯秦始皇漢孝武或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也大臣者以道事君也若以兵強天下是佐主以非其道也以道佐人主者尚不以兵強天下況人主躬於道者乎所以然者以其事好還報而已以道服天下則天下莫敢不服若抗兵加彼則殺人之父者人亦殺其父殺人之兄者人亦殺其兄所謂出乎爾反乎爾者也師之所處荆棘生焉大軍之後必有凶年御注下奪民力故荆棘生焉上違天時故有凶年詩曰綏萬邦屢豐年綏萬邦則人和矣人和則天地之和應農事廢田不修故荆棘生焉殺戮多傷和氣故必有天災農廢於前災隨於後必有凶荒之年故善者果而已不敢以取強吕吉甫曰果者尅敵者也敵而尅之造攻自鳴條朕哉自亳尅敵之謂也出於不得已非特以取強也果者勝之辭也成湯勝夏而有慙德之言歸亳而有臨淵之懼果而勿矜果而勿伐果而勿驕果而不得已是果而勿強吕吉甫曰果而勿矜其能果而勿伐其功果而勿驕其勢果常出於不得已是乃果而勿強之道也如果而矜其能果而伐其功果而驕其勢則是果於強非果於不得已者也物壯則老王元澤曰盛極則衰物理必然古有當此禍者秦是也物之用壯由兵之恃強物壯則衰兵強則敗是謂不道御注道無終始不與物化王元澤曰體道者兼萬變而不居一物故無壯老之意不道早已吕吉甫曰凡少則壯壯則老物之情也道也者貴於守柔以為強乃所以久而不殆者也若以兵強天下則是棄柔而用壯壯而必老則物而已豈道之所以物物哉故曰物壯則老是謂不道不道早已道者長於上古而不為老得道者能却老而全形老則不道也亦猶兵強則敗豈合道乎既不合道豈能久存故曰早已此章戒人臣以道佐主不可以兵強天下也道貴柔服不用兵強若以兵強取勝猶物壯則衰老豈道也哉夫佳兵章第三十一夫佳兵者不祥之器溫公曰兵愈佳則害人愈多纂微曰夫好飾戈矛鎧甲以為服玩者是尚不善之器佳飾也祥善也佳兵者堅甲利兵也兵凶器也所以為不善之器不當修飾也物或惡之故有道者不處御注吉事有祥兵凶器也故曰不祥兵戢而時動有道者耀德不觀兵故不處舒王曰佳兵者堅甲利兵也兵凶器也所以為不祥之器前篇言之已詳萬物無有不被其凶害者故惡之有道者以慈為心故不處兵者凶器動則萬物尚惡故有道者必無處此君子居則貴左用兵則貴右顧歡曰左陽也陽道主生故平居則貴之右陰也陰道主殺故用兵則貴之兵者不祥之器非君子之器御注左為陽而主生右為陰而司殺陽為德陰為刑君子貴德而畏刑故曰非君子之器王元澤曰君國以無為子民以慈惠故不尚兵不得已而用之纂微曰不敢為主而為客不敢進寸而退尺皆不得已者也善用兵者感而後應迫而後動常出於不得已也恬惔為上勝而不美御注禁暴救亂逼而後動故不得已無心於勝物故曰恬惔為上無心於勝物則兵非所樂也故不美成玄英曰恬惔無為也君子心尚無為故雖用兵而不以為美張君相曰不亂曰恬夷心曰惔恬惔者道也以道為上豈以用兵為美乎而美之者是樂殺人王元澤曰兵器主於殺伐而過為之飾使美而可覿是以殺人為美也若以用兵為美是以用兵為樂也用兵為樂則樂致人於死地矣夫樂殺人者不可得志於天下纂微曰凶暴好殺之士不可使得志於天下苟得其忘必逆天之德縱行誅戮視民如草芥天豈祐哉天既不祐豈得忘者也以殺人為樂者則不可使得志於天下為人主者無以妄行誅戮孟子所謂不嗜殺人者能一之是也吉事尚左凶事尚右成玄英曰吉謂朝禮凶謂喪禮河上公曰左陽主生右陰主殺偏將軍處左上將軍處右河上公曰偏將軍卑而居陽位以其不專殺也上將軍尊而居陰位以其專主殺也言以喪禮處之用兵之勢以右為上是以喪禮處之殺人衆多以悲哀泣之曹道沖曰天下之民皆王者之民以其逆順則異殺多則泣而傷之羊祜曰明非所樂也戰勝則以喪禮處之御注易以師為毒天下雖戰而勝必有被其毒者故居上勢與戰勝者以喪禮處之河上公曰古者戰勝將軍居喪主禮之位素服而哭之明君子貴德而賤兵不得已而誅不祥心不樂之比於喪也吕吉甫曰戰勝以喪禮處之則是不祥之器而不美之可知已以悲哀泣之則是不樂殺人可知也李畋曰此章言君子當以道德為材器勿以戰伐為功名若好彼兵強是樂其殺害矣儻非喪禮無以處之道常無名章第三十二道常無名王弼曰道無形故不可名以無名為常故曰道常無名劉仲平曰常者萬世不變之稱也天之高也地之厚也日月之明也雖生物大而歷世之非終可變者也其成象在上吾得以謂之乾效法在下吾得以謂之坤故垂象著明者吾得以謂之日月此三者皆不出吾之所謂則非不可名者也至於道則物之消息盈虛杳然而無所與古今相代於無窮之中若湛然自知如非陰非陽非柔非剛非小非大非圓非方非白非黑非宫非商視之而莫之見聽之而莫之聞搏之而不可得此所謂常無名也朴雖小天下不敢臣河上公曰道朴雖小微妙無形天下不敢有臣使道者朴者道之全體未始有物也其朴可謂小矣雖小足以為萬物之君侯王若能守萬物將自賔吕吉甫曰夫何故人物資之以始萬物恃之以生則天下孰有敢臣其所自始與其所自生哉夫是之謂真君萬物莫不有真君焉此之謂也侯王若能守則是以真君萬物萬物孰有得真君而不賔者乎道者萬物之主侯王守之則不假威武勸賞物不知其然而自賔矣天地相合以降甘露人莫之令而自均御注純素之道守而勿失匪特物將自賔上際於天下蟠於地與天地同流則交通成和而萬物咸被其澤甘露者天地之和氣傳曰帝王之德上及太清下及太寧中及萬靈則甘露降王元澤曰守無名之朴以為治則陰陽之升降各由其敘而和氣應矣甘露者陰陽交和所生自然均被無使之者蓋道之所感無所不周故也孟子曰上下與天地同流豈曰小補之哉此之謂也此二解説侯王守道則天降甘露以為瑞應也王弼曰天地相合則甘露不求而自降我守其真性無為則民不令而自均也溫公曰侯王守道則物服氣和民化吕吉甫曰至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉或謂之紀而莫見其形天地相合以降甘露則成和之至也侯王執道而萬物賔之也亦若是而已孰得見其形哉故人莫之令而自均蘇子由曰沖氣升降相合為一而降甘露吻然被於萬物無不均遍聖人體至道以應諸有亦如甘露之無不及者此所以能萬物也此四解説聖人體道而萬物賔亦如甘露之無不及始制有名名亦既有夫亦將知止知止所以不殆蔡子晃曰若能知止有名之末復歸無名之本此則不死不生所以不危殆也有名者道之散也初制有名之時即當知止而復歸無名之朴則不隨物遷淡然自足無復危殆譬道之在天下由川谷之與江海御注天下一性也道之在天下以性而合由川谷之與江海以水而聚同焉者得類焉者應聖人之臨蒞何為哉因性而已矣盧裕曰川谷歸海海亦不召百姓歸道道本不謀王元澤曰江海不求水而歸之者由鍾水之多則性同者往矣道民之性也聖人能集其純全則有生之類從而賔之亦性然也蘇子由曰江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗此章言侯王守道物將自賔如天降甘露不令自均夫道者人之所共由性之所同得侯王先得人性之所同則天下弗賔而焉往猶水歸海自然而已知人者智章第三十三知人者智御注傳曰智如目也能見百步之外而不能自見其睫察人之邪正若辨白黑是智之事知人而已自知者明御注易曰復以自知傳曰內視之謂明智以知人則與接為構日以心鬬復以自知者靜而反本自見而已天地之鑑也萬物之鏡也溫公曰自知自勝尤難河上公曰人能自知賢與不肖是謂反聽聲內視無形故為明也成玄英曰照達前境鑒人機性大小淺深無不悉知為智自知己身宿命善惡三世報應無不明了為明經言見小曰明小者性之微又知常曰明常者命之正人自知性命歸根復命不為物蔽可謂明矣人徒知天地萬物而不自知其所由生反命歸本是大不知也勝人者有力王元澤曰力可以勝人而不可以勝己也語曰羿善射奡蕩舟皆以力勝人者也勝之字從力在下力不足尚也自勝者強王元澤曰自勝者克己從道能專氣者也孔子曰棖也欲焉得剛不能自勝者也楊子言勝己之私之謂克人能克己勝利欲之私此所以為強也非強梁之強乃守柔之強知足者富唐明皇曰知止足者無貪求可謂富矣王元澤曰性分之內萬物皆足窮居不損大行不加而愚者或舍至貴而徇腐餘故知有萬之富則輕天下而不顧矣此真富也孟子曰萬物皆備於我矣豈非富乎此上一説知止足之分為富次一説取於一性而足強行者有志舒王曰上士聞道強而行之故強行者有志也或志於高名或志於厚利非所謂志也惟強行於道斯可謂有志之士不失其所者久河上公曰人能自節養不失其所受天之精氣則可長久王元澤曰性不為物遷則久矣此盡性也河公説養精元澤説養神二説合而為一則妙矣易恆久也君子以立不易方不易方者不失其所也故能久死而不亡者壽王弼曰雖死而以為生之道不亡乃得全其壽身沒而道猶存況身存而道不卒乎陸希聲曰身死而道不亡故謂之壽王元澤曰賢人死曰鬼盡其道以反真者也聖人死曰神未嘗死未嘗生也愚人死曰物雖生猶死爾盡道養神之人雖形體萬變而真性湛然無所終極可謂壽矣此至於命也陸佃曰列子之不化莊子之不死佛氏之不滅與此同意是以聖人之生也與死同謂之神聖人之死也與生同謂之壽言其生死之未始有異也夫惟生死同狀而萬物一府故夫身如蜩甲蛇蛻寓之而已矣蓋蜩之甲已死而其蜩未嘗亡如蛇之蛻已腐而其蛇未嘗喪何則其真者雖死不滅也曰夫至人不焚於火不溺於水虎不能搏兕不能觸乘虛不墜觸石不礙而未嘗有死則又曰死而不亡何也蓋聖人之於時隨之而已時之所當行聖人不強避時之所當止聖人不強為視其天而已故有能之而能不為之是以有生而不死有死而不亡者也嚴遵曰夫立身經世興利除害接物通變莫廣乎知人攝聰畜明建國於民達道之意知天之心莫大乎自知柄政履民建法立儀設化施令正海內臣諸侯莫貴乎勝人奉道德順神明承天地和陰陽動靜進退曲得人心莫崇乎自勝治家守國使民佚樂虔順恭謹慈孝畏法莫高乎知足遊神明於昭昭之間恬惔安寧尊顯榮華莫善乎得志任官奉職事上臨下成人之業繼人之後施之萬民莫急乎久天地所貴羣生所恃居之不厭樂之不止萬福並興靡與爭寵莫美乎壽功用備成不名己有蘇子由曰世有生物而不辭者必將名之以為己有世有避物而不有者必將辭物而不生生而不辭成而不有者唯道而已愛養萬物而不為主一本作衣被河上公曰道雖愛養萬物非如人君有所收取蔡子晃曰作衣被衣被者覆育也雖覆育萬物故不為主似若微小常無欲可名於小吕吉甫曰凡物之大者則不可名於小小則不可名於大是道也以其可以左右也故萬物恃之以生而不辭功成不居衣被萬物而不為主夫惟不居不為主故常無欲常無欲則妙之至者也故可名於小王元澤曰此所謂小乃真大也且以體道者譬之欲慮不萌怕然內一豈非小乎易曰復小而辨於物萬物歸之不為主可名於大王元澤曰有意於主則反與物對唯其主萬物而未嘗有意乃所以充塞無外而莫能離道復於至幽則小而與物辨顯於至變則大而與物交與物辨故覆萬物而不示其宰制之功而不為主故常無欲可名於小所謂復小而辨於物也與物交故包容萬物而莫窺其歸往之迹而不知主可名於大夫道非小大之可名也云可名者道之及乎物者爾是以聖人終不為大故能成其大成玄英曰明體道聖人忘我存物靜退謙恭終不為大只為先物後己忘於功大故為衆聖之長獨居三界之尊而成其大杜光庭曰聖人愛民恤物巨細申恩若可名於小矣任物隨性歸於天又可名於大矣法道施化布德及人鼓以淳和之風被以清靜之政忘功不有不自尊高故其盛業可大聖德可久以其不為大故能成此尊大矣修身之士泛然無著若雲之無心水之任器可左可右隨方隨圓不滯於常物來斯應鑒物斯廣不均應用之心利物雖多不矜兼濟之德仁逮蠢動未始為私衆善歸宗不為之主是能彰非小非大之德無自專自伐之稱可以契全真之大道矣朴雖小天下莫能臣聖人抱朴常無欲可名於小所謂終不為大也至於天下莫能臣獨成其尊大故能成其大也此章言道用無方生成所賴辨於物而為小交於物而為大是以聖人法道朴而為小成至尊而為大執大象章第三十五執大象天下往吕吉甫曰道之在天下獨川谷之與江海萬物歸焉而不知主是無形也無形者大象也則孰保我而不往哉故曰執大象而天下往執守也大象道也大象無形道之全體聖人守之以御世則天下萬民移心歸往也帝舜至鄧墟來之者十萬家太王居岐山從之者如歸市往而不害安平泰盧裕曰以虛受人何害之有無害於物則泰然安平吕吉甫曰失道而天下往則去之而已則其往也不能無害執道而天下往則雖相忘於道術而未嘗相離也故往而不害車惠弼曰若往於生死有纍憂悲斯則有害若往大道無為安樂此則無害而言安平泰者不為死生所遷名為安諸法不二名為平無為安樂名為泰既往於道則國安民豐欣樂太平何害之有安平泰所謂不害也安則無危亡之憂平則無險詖之患泰者通而治也樂與餌過客止唐明皇曰樂以聲聚餌以味聚過客悅而少留非久長也吕吉甫曰有樂之可樂有餌之可嗜則止者過客而已道之出口淡乎其無味視之不足見聽之不足聞用之不可既御注味之所味者嘗矣而味味者未嘗呈故淡乎其無味色之所色者彰矣而色色者未嘗顯故視之不足見聲之所聲者聞矣而聲聲者未嘗發故聽之不足聞若是者能苦能甘能玄能黃能宫能商無知也而無不知也無能也而無不能也故用之不可既此章言聖人守道以御世天下歸往而無虞道淡無味非若餌之可嗜聽之無聲非若樂之可樂用之無盡豈若過客暫止而已將欲歙之章第三十六將欲歙之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之是謂微明御注陰陽相照相蓋相治四時相代相生相殺萬物之理人倫之傳其斂散也其盛衰也其僨超也其虧盈也幾常發於至微而莫睹其眹惟研幾之聖人得先見之吉賢者殆庶幾而已陽盛於夏而陰生於午陰凝於冬而陽生於子句踐欲弊吳而勸之伐齊智伯欲襲仇由而遺之廣車此聖人所以履霜而知堅冰之至消息盈虛不位乎其形故勇者不能弱智者不能奪嚴遵曰道德所經神明所紀天地所化陰陽所理實者反虛明者反晦盛者反衰張者反弛有者反亡生者反死此物之性自然之理也故反覆之便屈伸之利道以制天天以制人君人君以制臣臣以制民含氣之類皆以活身虎豹欲據反匿其爪豺狼欲食不見其齒聖人去意以順道智者反世以順民忠言逆耳以含其正邪臣將起務順其君知此而用之則天地之間六合之內皆福也不知此而用之則闔門之內骨肉之間皆賊也故子之與弟時為虎狼仇之與讎時為父兄然中有否否中有然一否一然或亡或存故非忠雖親不可信非善雖近不可親此賢人之所嗟嘆聖智之所留心也陸佃曰此天地之至權也非特聖人而已夫權藏之以幽渺而行之以巽順之物淵者幽渺之所易曰巽以行權又曰巽德而隱巽者柔弱之謂也隱者微眀之謂也老子有曰是謂襲明又曰是謂微明襲者密用其明微者密隱其明蓋明者微之則神所謂微顯同意陸希聲曰夫聖人之淵奧莫妙於權實實以順常為體權以反經為用權所以濟實實所以行權權實雖殊其歸一揆老氏既以實導人立知常之教又以權濟物明若反之言易所謂曲成萬物而不遺範圍天地而不過者也鴻烈曰齊桓公好味而易牙烹其子而餌之虞君好寶而晉獻公以璧馬而釣之胡王好音秦穆公以女樂而誘之是皆以利見制於人也柔弱勝剛強御注經曰天下莫柔弱於水而攻堅強者莫之能先莊子外篇論夔蛇風目之相憐曰指我則勝我趥我則勝我而折大木蜚大屋者惟我能也鍾會曰欲制剛強示乎柔弱先張後歙勝負可知唐明皇曰巽順可以行權權行則能制物故知柔弱者必勝於剛強矣近取諸身齒以堅而先弊舌以柔而自存遠取諸物山以高而殺勢澤以下而增肥魚不可脫於淵國之利器不可以示人御注淵者魚之所藏其身利器者國之所以制人吞舟之魚碭而失水則蟻能苦之故不可脫於淵君見賞則人臣用其勢君見罰則人臣乘其威賞罰治之具且不可示況治之道乎聖人所以操利器而不示非用其強也蓋有妙道焉能窮海內而無智名威服萬物而無勇功不蘄於勝物而得常勝之道陽開陰閉變化無窮馭羣臣運天下而莫之測故制人而不制於人本在於上要在於主而天下治吕吉甫曰人之不可離柔弱猶魚之不可脫於淵魚脫於淵則獲人離柔弱則死之徒而已矣天下之至柔馳騁天下之至堅無有入於無間則器之利者也操利器以馭天下國家則其所以圖回運動者常在於無形之際安可使知其所自來哉故曰國之利器不可以示人王元澤曰魚巽伏柔弱而自藏於深渺之中以活身者也聖人退處幽密而操至權以獨運斡萬物於不測故力旋天地而世莫睹其健威服海內而人不名以武豈暴露神靈而使衆得而議之哉嘗竊論之聖人之所以異於人者知幾也夫以剛強遇物則物之剛強不可勝敵矣天下皆以剛強勝物也吾獨寓於柔弱不爭之地則發而用之其敦能禦之者觀夫天道則秋冬之為春夏亦一驗矣彼聖人者自藏於深渺之中而託柔弱以為表故行萬物於術內而神莫能知其所自此所謂密用獨化者易曰巽以行權莊子曰於魚得計義協於此此章言巽以行權柔弱勝剛強之義先張後歙柔弱勝剛強可知人不可離柔弱猶魚不可脫於淵聖人操利器不示人非用剛強也亦體柔弱而已所以為常勝之道也道常無為章第三十七道常無為而無不為舒王曰前言道常無名言道之主此章言道常無為言道之變凌遘曰無體之體獨立不改而體常寓於至虛無用之用周行不殆而用咸該於萬有惟其獨立故寂然不動而體固渾全惟其周行故感而遂通而用皆周遍道也者在體而非體在用而非用雖無為也而感而遂通者不廢雖無不為也而寂然不動者與俱自其偶而應之所以每見其無不為究其所歸宿以無為為常而已道以無為為常以其無為故能無所不為無為者寂然不動道之真體所謂無體之體也無不為者感而遂通道之真用所謂無用之用也故曰道常無為而無不為侯王若能守王元澤曰君人者體道以治則因時乘理而無意於為故雖無為而不廢天下之為雖不廢天下之為而吾實未嘗為也天何言哉四時行焉百物生焉侯王之道天其盡之矣萬物將自化御注侯王守道御世出無為之境而為出於無為化貸萬物而萬物化之若性之自為而不知為之者故曰自化舒王曰言道之主故曰萬物將自賔言道之變故曰萬物將自化侯王守道則無為也萬物將自化於道故無不為也莊子曰無為而萬物化化而欲作舒王曰化而裁之謂之變言化欲作作則動而已王元澤曰化而日進則如嬰兒之長必至於智慮充起天和漸衰觀夫三代末流物情雕弊則可知也吾將鎮之以無名之朴纂微曰聖人之德化常善救人假有不從其化而修之身為真而以修之天下為普使王侯者知而守之則修之天下不亦普乎夫不嗇其道而欲與天下同之仁也欲同之天下而先之侯王義也而學者顧見其言有絶棄仁義則曰老君槌提吾仁義而小之也吾所不取嗚呼彼不見其所以絶棄之意宜其不取焉爾陸希聲曰首篇以常道為體常名為用而極之以又玄此篇以無為為體無不為為用而統之以兼忘始末相貫而盡其體用也人生而靜天之性也感物而動性之欲也雖無名之朴亦將不欲則性靜而先自正也故天下不期正而自正矣李畋曰大道以虛靜為真常以應用為妙有俾其侯王守其真常寂然不動法其妙用感而遂通則萬物化淳天下正此章首言道常無為而無不為終之以不欲無名之朴者若存欲朴之心非所謂無為也無名之朴兼忘則所謂道常無為也天下將自正所謂無不為也道德真經取善集卷之五
