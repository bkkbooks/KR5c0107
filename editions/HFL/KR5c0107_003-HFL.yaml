front:
  text: 道德眞經取善集卷之三墨八
  hash: sha256:6cb3bc2f1fbe4d70949d10918bfc2a83f8efa9080963b4679ecf364cfa587001
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0107_HFL_003-001a, image: hfl/0425/0425-042.png}
body:
  text: 宋饒陽居士李霖集視之不見章第十四視之不見名曰夷御註目主視視以辯物夷則平而無辯非視所及故名曰夷太易未見氣是已王元澤曰道至於萬物平等無有高下之處非目所視此明道也夷平易也道非色故視之不見雖不見也然能玄能黃不可名之無色也曰夷而已聽之不聞名曰希御註耳主聽聽以察物希則穊而有聞非聽所聞故名曰希大音希聲是已莊子曰聽而可聞者名與聲道無聲非耳所聞故曰希也雖不聞也然能宫能商不可名之無聲曰希而已搏之不得名曰微御註微乎微乎至於無形敦得而摶之大象無形是已無形曰微摶執持也道無形故執持不得雖不得也然能陰能陽能柔能剛能短能長能圓能方能暑能凉能浮能沉能苦能甘於無形之中而能形焉故名曰微此三者不可致詰故復混而爲一御註太易未判孰分高下大音希聲孰辯清濁大象無形孰爲巨細目無所用其明耳無所施其聰形無所竭其力道之全體於是乎在窮之不可究探之不可得也氣形質具而未相離故混而爲一雖然既已爲一矣且得無言乎三者謂夷希微也不可致詰者謂無色無聲無形口不能言書不能傳當受之以靜求之以神不可詰問而得之混合也三名合而爲一三者本一體而人之所以求者或視或聽或摶故隨事强名耳其上不皦其下不昧王元澤曰凡物有質則具陰陽上皦下昩理必然也唯道無物故混然而成此言道之定體莊子曰失吾道者上見光而下爲土繩繩不可名復歸於無物吕吉甫曰繩繩兮調直而有信雖有信也而不可名故復歸於無物是謂無狀之狀無物之象是謂惚恍纂微曰夫復歸於無物者非空寂之謂也謂於無形狀之中而能造一切形狀於無物象之中而能化一切物象欲言有邪而不見其形是即有而無也欲言無邪而物由以成是即無而有也恍者有之疑於無惚者無之疑於有道之爲物非有非無不可定名故曰惚恍迎之不見其首隨之不見其後御註其始無首其卒無尾故迎之隨之有不得而見焉蘇子由曰道無所不在故無前後可見執古之道以御今之有王弼曰古今雖異其道常存執之者方能御物吕吉甫曰無前無後則不古不今雖不古不今而未嘗無古今也則吾得之以日用矣故曰執古之道以御今之有能知古始是謂道紀吕吉甫曰所謂古者非異於今也以知古之所自始也所謂今者非異於古也以知今之所從來也誠知古之所自始則知今之所從來矣始無所自來無所從所謂無端之紀也無端之紀道紀也道不可執也得此可以執之以爲德矣執德之謂紀王元澤曰推而上之至於無物之初乃知物無所從來道之情得矣道之紀要古今不變者是莊子所謂無端之紀也李畋曰此章言妙本應用何所不無也若以視聽求之了勿可得以皦昩察之湛勿可分物象不能名始終不可睹其用難測以御有爲古之善爲士章第十五古之善爲士者微妙玄通深不可識舒王曰士者事道之名始乎爲士則未離乎事道者也終乎爲聖人則與道爲一事道不足以言之與道爲一則所謂微妙玄通深不可識是已靈仙曰道無不通名善事無不達爲士前章執古御今此則御今引古前章論道之全體此章言士之體道微者彰之反也妙者危之反也玄則深遠不測通則變化無窮古之善爲士者有此道而退藏於密不可測究敦得而識之哉故曰深不可識夫惟不可識故强爲之容御注天之高不可俄而度也地之厚不可俄而測也曰圓以覆曰方以載者擬諸其容而已强爲之容豈能眞索其至謂下文也夫惟道大難識强爲之容而已豫若冬涉川猶若畏四鄰吕吉甫曰庖丁解牛休然爲戒視爲止行爲遲動刀甚微則豫若冬涉川者也豫則圖之於事之始也謋然已解如土委地提刀而立爲之四顧爲之躊躇滿志善刀而藏之猶若畏四鄰者也猶則慎之於事之終也豫者圖患於未然猶者致疑於已是由膝以上爲涉集衆流爲川涉川者犯難也冬者至寒之時徒涉巨川以見至人不好從事於務出於不得已常迫而後動臨事而懼也故曰豫若冬涉川既涉則無慮矣而猶戒曰猶至人靜密幽深不出性宅常若畏鄰歛而不縱閑邪存誠非物採之其心不出故曰猶若畏四鄰儼若客王元澤曰不以事爲己任故其容寂纂微曰言有道之士儼然端謹而心無散亂如賔對主曷敢造次此作容字說若東郭順子正容悟物使人之意也消故田子方師仰之此作客字說若李含光居於暗室如對君父故司馬子微激賞之涣若冰將釋御註水凝而爲冰冰釋而爲水其實一體蔽於執一者如水之凝同於大通者如冰之釋易曰涣離也離人而無所繫輆所以爲涣字說曰奂而散爲涣夫水本無冰遇寒則凝性本無礙有物則結有道之士豁然大悟萬事銷亡如春冰頓釋敦兮其若樸御註敦者厚之至性本至厚如木之樸未散爲器此言性之全也經曰復歸於樸曠兮其若谷御註曠者廣之極性原無際如谷之虚受而能應此言性之虚也經曰上德若谷渾兮其若濁王弼曰藏精匿炤外不異物混同波塵故曰若濁楊子曰合則渾離則散渾者與世合而不離故若濁莊子所謂與物委蛇而同其波也與刻意尚行離世異俗者異矣夫善爲士者冬涉不好從事畏鄰防患於後若客之不爲主如冰釋不凝滯樸而能全谷而能虚濁不殊俗此所謂深不可識而强爲之容也孰能濁以澄靜之徐清王元澤曰澄性者與澄水同加工則動而彌濁唯靜以俟之則徐自清矣有道之士所以物莫能濁者以其靜之徐清耳曹道冲曰豈隨流而忘反聊澄靜以徐清孰能安以乆動之徐生御註有道之士即動而靜時騁而要其宿定而能應至無而供其求故靜之徐清而物莫能濁動之徐生而物莫能安易曰來徐徐徐者安行而自適之意至人之用心非以靜止爲善而有意於靜非以生出爲功而有爲於生也因其固然付之自爾而無休迫之情遑遽之勞焉故曰徐靜之徐清萬物無足以撓其心故孰能濁動之徐生萬物無足以係其慮故孰能安安有止之意爲物所係則止矣豈能應物而不傷保此道者不欲盈馬巨濟曰保不欲盈者道集虚故也盈而有有則淺可識矣夫惟不盈吕吉甫曰然不曰虚而每曰盈者恐人之累於虚也虚而累於虚則不虚矣故曰或不盈不欲盈而已故能弊不新成王元澤曰得道者未嘗盈則成道者未嘗新也道之爲用通萬世而不弊以其無弊無新不成不敗故也弊生於新敗生於成士雖成道而常若弊則終無弊敗矣此章言士之體道深不可識終之以不欲盈者虚也虚則空洞無一物世豈得而識之哉古之保此道者若大禹不自滿假孔子不居其聖已獨取虚者老子也實若虚者顔子也惟道集虚於此可見致虛極章第十六致虚極守靜篤御註莫貴乎虚莫善乎靜虚靜者萬物之本也虚故足以受群實靜故足以應群動極者衆會而有所至篤者立行而有所至致虚而要其極守靜而至於篤則萬態雖雜而吾心常徹萬變雖殊而吾心常寂此之謂天樂非體道者不足以與此鍾會曰致至也除情慮至虚極也心常寂守靜篤也致虚則若谷能受群實無一塵之積可謂極矣守靜則若水能應群動無一毫之攖可謂篤矣萬物並作吾以觀其復嚴遵曰天地反覆故能乆長人復寢寐故能聰明龍蛇復蟄故能章章草木復本故能青青化復則神明得位與虚無通魂休魄靜各得其所安志寧氣順血脉和平此皆蹔爾復靜猶能精神況乆歸至道者乎吾者命物之我也我以虚靜之至觀萬物之作命物而不與物俱化故曰吾以觀其復夫物芸芸各復歸其根温公曰物出於無復入於無王元澤曰從性起用復還性根動植雖殊理歸一致歸根曰靜蘇子由曰苟未能自復於性雖止動息念以求靜非靜也故惟歸根然後爲靜人生而靜天之性也復性則靜靜曰復命陸佃曰言根則知有所謂本言命則知有所謂性故言歸根曰靜則復者本也靜曰復命則歸根者性也莊子曰自本自根未有天地自古以固存自根者歸根曰靜是也自本者靜曰復命是也自古者復命曰常是也自本者無所因於本自根者無所出於根自古者無所歷於古雖然歸根曰靜靜曰復命復命曰常其本一也其言先根而後本先性而後命而於根則謂之歸於命則謂之復者辭之序爾歸未至也復則至矣根未至也命則至矣復之所入深矣復命曰常王元澤曰出生則入有入有則系數然則密移之變頃刻不停惟復命則湛然常寂物莫能遷從道受生之謂命復命則反其所自生與道爲一則亘古今而常存知常曰明舒王曰常者乃無始已來不變之稱也知其常則謂之明也自道之外皆非常也道雖眞常無形無名非有自知之明鮮有不爲物蔽者矣不知常妄作凶御註聖人知道之常故作則契理每與吉會不知常者隨物轉徙觸途自患且不足以固其命故凶孫登曰不能歸根守靜則夭命失常是其凶也夫衆人不知道之眞常以妄爲常故歡樂用生動而失之壽命竭矣所謂妄作凶也知常容蘇子由曰方迷於妄則自是而非彼物皆吾敵吾何以容之苟知其皆妄則雖仇讎猶將哀而憐之夫何所不容哉容乃公河上公曰無所不包容則公正無私衆邪莫當禮記曰大道之行天下爲公人不獨親其親子其子公乃王舒王曰背私則爲公盡制則爲王公者德也王者業也以德則隱而内以業則顯而外公與王合内外之道也成玄英曰王往也公則物皆歸往王乃天王元澤曰王者人道之至極極人之道乃通於天天乃道御註通天地人而位乎天地之中者王也一而大在上而無不覆者天也天地人莫不由之者道也盡人則同乎天體天則同乎道道乃乆盧裕曰乆長乆也謂量等太虚無來無去心㝠至極不生不滅冥混自然不可分别既與此理契㑹義說爲乆没身不殆新說曰天之所法者道也故曰天乃道道則無古無今故曰道乃乆夫道至於乆而可以没身不殆其孰能致於此哉此章以歸根復命爲義故首言虚靜終之以道乃乆者道以虚靜爲先若捨此而入道譬若捨舟航而濟乎瀆者末矣太上章第十七太上下知有之王元澤曰三皇之世無爲而治使民各遂而不知其然豈得而親譽乎馬巨濟曰知有君而不知有其君此三皇之世莊子所謂有泰氏其卧徐徐其覺于于一以已爲馬一以已爲牛太上者謂太古無名號之君也太者極大之名上者至高之稱無爲之治至大至高後世無以尚之故曰太上也下知有之者知有君而不臣事也其次親之譽之馬巨濟曰惠愛仁也故親賞罰義也故譽然親之固已疏譽之固已毁矣何者未能出於非人故也此二帝之世莊子曰有虞氏不及泰氏堯仁如天就之者如日舜至鄧墟來之者十萬家親之也康衢譽堯謳歌與舜譽之也其次畏之侮之纂微曰仁義失則刑法立而民畏之馬巨濟曰此三王之世莊子曰施及三王而天下大駭好智而百姓竭於是椎鑿决焉智慧極大偽生巧役其下愚侮其上而刑罰不足以威懲此五霸之世孟子曰五霸假之也王元澤曰失德無政則民侮之信不足有不信御註附離不以膠漆約束不以纏索此至信也商人作誓而民始畔周人作㑹而民始疑信不足故也太上下知有之則當不知以爲信其次畏之侮之則知詐頡滑機變之巧生而有不信者矣唐明皇曰畏之侮之者皆由君信不足故令下有不信之人猶其貴言唐明皇曰親之譽之由君有德教之言故貴其言而親譽之馬巨濟曰言不足貴而猶貴之故曰猶蓋太上不言而化自兹以降帝有典謨王有誓誥也功成事遂百姓謂我自然御註帝王之功聖人之餘事也使人甘其食美其服安其居樂其業而餘事足以成帝王之功然謂我自然而已曰帝力何有於我哉此謂太上之治唐明皇曰功成而不執事遂而無爲百姓謂我自如然也上力何與焉此章言三五殊化下民風靡道降爲德德衰用刑刑不能制必至於欺侮此信不足於上而民有不信也大道廢章第十八大道廢有仁義御註失道而後德失德而後仁失仁而後義仁以立人義以立我而去道也遠矣韓愈不原聖人道德之意乃以謂仁與義爲定名道與德爲虚位老子之小仁義其所見者小也莊子所謂蔽蒙之民大道者即太古無爲之道也仁義不顯猶日中盛明衆星失光也廢猶隱也三皇之後人心不淳厚大道隱而不見仁義立而道衰魚失江湖之游則濡沫之恩斯重人失大道之適則仁義之惠斯隆三皇當大道二帝爲仁義莊子曰道隱於小成智慧出有大僞唐明皇曰用智慧者將立法也法出而姦生則有大偽矣慧以智爲體智以慧爲用智慧有大小也莊子曰去小智而大智明孔子曰好行小慧是智慧有大小也太上云此者爲其以鑿爲智以察爲慧作聰明制法令所謂小智慧也智慧既出民之姦偽滋生也若夫遠近並觀閑閑無事因其自然無益損乎其眞淳風大行爲有大偽者哉六親不和有孝慈鍾會曰若九族皆睦則愛敬無施六親不和則孝慈斯著瞽瞍頑而舜稱大孝曾晳嚴而參稱能養國家昏亂有忠臣舒王曰道隱於無形名生於不足道隱於無形則無小大之分名生於不足則有仁義智慧差等之别仁者有所愛也義者有所别也以其有愛有别此大道所以廢也智者知也慧者察也以其有知有察此大偽所以生也孝者各親其親慈者各子其子此六親所以不和也忠者忠於己之君謂之忠於他人謂之叛不明謂之昏不治謂之亂昏亂之世乃有忠臣匡救其君傳曰亂世見誠臣若龍逄名芳於夏桀比干譽美於殷紂此章言道隱於小成名生於不足故也絕聖棄智章第十九絶聖棄智民利百倍鍾會曰絶制作之聖棄謀慮之智人當反樸還淳故其利百倍作者之謂聖創物之謂智聖智之人制作法度創立政令欲禁姦止暴豈知法出姦生令下詐起民失性命之眞日趨𣻏競之域若絶棄法令則民反常復樸其利豈止百倍而已莊子曰掊擊聖人縱舍盜賊而天下始治矣絶仁棄義民復孝慈王元澤曰至德之世父子相親而足今更生仁義則名實交紏得失紛然民性亂矣蓋盛於末者本必衰天之道也孝慈仁義之本也或曰孔孟明堯舜之道專以仁義而子以老氏爲正何如曰夏以出生爲功而秋以收歛爲德一則使之榮華而去本一則使之彫悴而反根道歲也聖人時也明乎道則孔老相爲終始絶巧棄利盜賊無有王元澤曰巧利勝則民欲侈而本業衰必至於爲盜上三事皆以末傷本者巧機巧也巧者善偽利貨利也見利忘義絶機變之巧而民有恥棄欲利之心而民知義此盜賊所以無有也若不絶棄巧利徒滋法令禁之此盜賊所以多有也莊子曰攦工倕之指而天下始人有其巧矣又曰擿玉毁珠小盜不起此三者以爲文不足故令有所屬馬巨濟曰質則有餘文則不足三者去本已遠爲文而已此其所以不足也令屬其性於下四事見素抱樸舒王曰不言守素而言見素不言反樸而言抱樸不言無私而言少私不言無欲而言寡欲蓋見素然後可以守素抱樸然後可以反樸少私然後可以無私寡欲則致於不見所欲者也見素則見性之質而物不能雜抱撲則抱性之全而物不能虧少私寡欲御註自營爲私而養心莫善乎寡欲少私寡欲則定乎内外之分辨乎眞偽之歸德全而復性馬巨濟曰見素此聖智所屬也於無所與雜謂之素見素則見道見道則不爲不爲則無聖無智矣抱樸此仁義所屬也全材之謂樸抱樸則抱性抱性則不器不器則無仁義矣少私寡欲此巧利所屬也自有之謂私有物之謂欲而巧利由以生私欲少且寡則巧利衰矣莊子胠篋篇正以明聖智仁義巧利之害與此章同意私者吾之身也少私則不以巧利累其身欲者性之動也寡欲則不以巧利亂其心李畋曰此章言去滋蔓在乎拔本抑橫流在乎塞源也若制作不興則眞素見仁義不飾則淳樸存巧利不施則私欲絶然後天和自暢日用不知絕學無憂章第二十絶學無憂御註學以窮理方其務學以窮理思慮善否參稽治亂能勿憂乎學以致道見道而絶學損之又損之以至於無爲而無不爲則任其性命之情無適而不樂故無憂温公曰學之所以不可已者爲求道也若棄本而逐末則勞而無功不若不學而無憂也絶學者體道也體道則窮亦樂通亦樂以窮通爲寒暑之序不悦生不惡死以死生爲夜旦之常天地樂而萬事銷亡何憂之有且絶者非謂絶滅不學也老子恐人溺於學而以文滅質以博溺心不能體道故以絶學爲言若人不學何以入道子夏曰君子學以致其道致道者忘心此學所以絶也乃若不學之人空空如也安所用絶彼楊子雲不原聖人深意以謂人而不學雖無憂如禽何豈知聖人絶之之意邪唯之與阿相去幾何善之與惡相去何若御註唯阿同聲善惡一性小智自私離而爲二達人大觀本實非異唯阿雖異同出於聲善惡雖殊皆離於道以喻學者如唯如善不學如阿如惡學則爲智不學則爲愚智者過之愚者不及其於失道均也人之所畏不可不畏御註鼓萬物而不與聖人同憂者道也吉凶與民同患者事也體道者無憂涉事者有畏人之所畏而不知爲之戒能無患者鮮矣故君子以恐懼修省詩曰畏天之威唐明皇曰凡人所畏者慢與惡也善士所畏者俗學與有爲也皆當絶之故不可不畏衆人務學不能㑹會事物畢召反撓其心此人之所畏而亦不可不畏者若不絶學無以體道故也荒兮其未央哉河上公曰言世俗荒亂欲進學爲文未有央止也荒不治也若不絶學則正性荒廢不治之憂未有央止之時衆人熙熙如享太牢如春登臺王元澤曰造化無極事物日生唯聖人能一古今而無變衆人則隨化而遷妄見美惡樂得其生自以爲美春者萬物奮張離靜而動去本逐末之時臺者可以遠覽諸境之地物不明乎至理皆逐物生情其狀如此凡物以陽熙以陰凝陽主動陰主靜熙熙者性動而悦樂之象也太牢者牛也其味至厚春者時物之華臺者遠覽諸境之地以喻衆人因學致偽逐境失眞其狀如此夫道淡乎無味實而不華絶學者所樂也務學則失道離性之靜外游是務其志熙熙然得其義理如悦厚味以養口腹博其見聞如睹高華以娱心志耽樂之徒去道彌遠我獨怕兮其未兆如嬰兒之未孩御註經曰復歸於嬰兒嬰兒欲慮未萌疏戚一視怕兮靜止和順積中而英華不兆于外故若嬰兒之未孩怕者靜止不流之義靜止則得無味之味復乎一性之初與嬰兒奚異乘乘兮若無所歸御註時乘六龍以御天乘乘者因時任理而不倚于一偏故若無所歸乘乘者運動貌至人靜則與嬰兒同動則乘萬物之變而唯變所適無所嚮著故也衆人皆有餘馬巨濟曰性無餘欠所謂有餘皆分外也享太牢登春臺則所得皆分外矣故次以有餘衆人務學日益見聞故有餘也而我獨若遺馬巨濟曰若遺非誠遺也以不足愛吝爲懷而已不學者所謂誠遺也至人非不學蓋縁俗學滋蔓特可以絶救爾絶學體道損其見聞所謂爲道日損也我愚人之心也哉純純兮馬巨濟曰此屬我獨若遺爲義衆人務學作智我獨絶焉則愚人而已純純則雖愚不愚莊子曰純也者謂其不虧其神愚不智也純不雜也學不厭智也絶學則去智而如愚所謂大智若愚俗人昭昭我獨若昏俗人察察我獨悶悶纂微曰察察嚴明也悶悶寬裕也夫世俗因學爲政制度嚴明立法苛急矜持有爲者故民不聊生矣是以至人體天法道因循任物在宥天下寬裕昩昩者故民乃全其眞矣莊子曰至道之極昏昏默默此之謂也小明爲昭不明爲昏察察苛細也悶悶寬大也流俗之人務學作智察見細微智料隱匿以爲昭昭之明昭者非大明也絶學之人體道去智物我兼忘不生分别故若昏也昏者非性昏也若之而已推昭昭之意以從政則察察然苛細矣所謂人太察則無徒也推若昏之意以從政則悶悶然寬大矣所謂常寬容於物不削於人也忽若晦寂兮似無所止御註淵靜而性定道之全體變動而不失道之利用衆人皆有以我獨頑似鄙御註桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用衆人皆有以是謂有用之用我獨頑似鄙是謂無用之用傳曰心不則德義之經爲頑古者謂都爲美謂野爲鄙頑則不飾智鄙則不見美神人以此不材馬巨濟曰以用也衆人之學求用於世所謂有用之用也亦安知絶學之無用爲眞有用哉頑似鄙是也蓋昭昭察察則本末的然非於無用者也故次之以有以頑無用也鄙野也似野人不學無用故也我獨異於人而貴求食於母馬巨濟曰此結成上文嬰兒未孩之義嬰兒以母爲本未孩則食其本既孩則食其末夫道本也學末也人食末我食本此其所以異也然聖人不尚異而獨異者此篇主絶學爲辭方俗學之溺如此則非異俗無以救俗故也此章主絶學爲言篇中句句皆有絶學之意若不絶學則聞見之多以博溺心於道爲塵故篇終又言貴食於母蓋母者道也惟絶學則養道此有道者所以異於俗也道德眞經取善集卷之三
