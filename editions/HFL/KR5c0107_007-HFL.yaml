body:
  text: 宋饒陽居士李霖集反者道之動章第四十反者道之動王元澤曰反本則靜靜乃能動譬如秋冬能起春夏也蘇子由曰反者復也復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也仰觀乎天四時之行斂藏於冬而蕃鮮於春俯察乎地五行有水反流全一而動善時天地之道以反爲動故能長乆人一受其成形馳其形性潜之萬物終身不反悲夫弱者道之用舒王曰道之用所以在於弱者以虚而已即在天者而觀之指我亦勝我䠓我亦勝我則風之行乎太虚可謂弱矣然無一物不在所鼓舞無一形不在所披拂則風之用在乎弱也即在地者而觀之决諸東方則東流决諸西方則西流則水之託於淵虚可謂弱矣然處衆人之所惡而攻堅强有莫之能先則水之用在乎弱也又曰反非所以爲動然有所謂動者動於反也弱非所以爲强然有所謂强者蓋弱則能强也雖然言反而不言靜言弱而不言强言動則知反之爲靜言弱則知用之爲强天下之物生於有有生於無亦若此而已矣弱之勝强道之妙用如水至弱能攻堅强天下之物生於有有生於無河上公曰萬物皆從天地生天地有形位故言生於有也天地神明皆從道生道無形故言生於無吕吉甫曰唯有爲能生天下之物而無又能生天下之有則道之動在於反而其用在於弱可知已然則欲反而弱者無他致一以極乎無而已矣此章之意反本而靜則動不失已莊子所謂靜則動動則得矣是也用無不利則不爭而善勝經所謂弱勝强是也然則欲反弱者無他致一以極乎無而已上士聞道章第四十一上士聞道勤而行之御註士志於道者也上士聞道眞積力乆至誠不息李榮曰信道彌篤强行有志寒暑變而不革其心金石銷而不移其操始終常堅確乎不拔上士勤行也上者至高之稱士者以道爲事上士了悟聞斯妙道信道彌篤强行有志行與實相相應若出若處若行若住常依實相不離眞際念念增修心心不懈故曰勤行也問曰道不可聞聞而非也上士何以聞之答曰耳聞其言心行其道眞聞之也孔子曰朝聞道夕死可矣中士聞道若存若亡舒王曰中士者知道之爲美而不知所以爲道也知道之爲美故若存大音不入俚耳李榮曰素絲不恒逐玄黃而改色中士不定隨奸惡而異心聞眞道存身以安國則存道而忘俗見財色悦性以娱情則存俗而忘道也中士可上可下則有疑心焉疑心生則用志分故聞道治身以長存治國以太平欣然而存之退見財色榮譽或於情欲而復忘之也則不能勤而行之一出焉一入焉耳若子夏出見紛華盛麗而悦入聞夫子之道而樂是也下士聞道大笑之王元澤曰道大似不肖淺見者所不識故笑誠如下文云豈流俗所能睹乎志琮曰下士聞於妙道無相無名不來不去非生非滅既不信從翻生違背所以拊掌大笑謂爲虚誕下士受性下愚恣情多欲智不足與明識不足與知目欲視色耳欲聽聲口欲察味志氣欲盈若不得則大憂以懼夫道無聲色滋味之可得則其去耳目鼻口之所嗜也遠矣聞恬惔寂漠虚無無爲之道則大笑而非之不笑不足以爲道羊祜曰下愚昏昩貴華賤實上道深奥虚無清遠不爲淺識所笑不足爲深遠之至蘇子由曰道非形不可見非聲不可聞不先知萬物之妄廓然無蔽卓然有見未免於不信也故下士聞道以爲荒唐謬悠而笑之中士聞道與之存亡出没而疑之惟了然見之者然後勤行服膺而不怠孔子曰語之而不情者其回也與斯所謂上士也哉與俗同時與道乖經曰知我者希則我貴矣建言有之纂微曰建立也將立行道之言謂下文也舒王曰孔子嘗曰述而不作竊比於我老彭蓋老子稱古之建言者古之人嘗有此三者之言故老子述之而已明道若昧御註若日明之光照臨下土者明也豐智源而不示襲其光而不耀故若昩王元澤曰大明若晦志琮曰内有智慧爲明外無炫耀爲昩進道若退李榮曰聞道勤行是進大成若缺是退吕吉甫曰爲道日損損之又損以至於無爲是之謂進道若退夷道若類李榮曰緬平一等夷道也和光同塵若纇也唐明皇曰夷平也類絲之不匀者夫識心清靜塵欲不生坦然平易與物無際而外若絲之有纇杜光庭曰達士治身内則夷坦外示同塵履苦遇樂隨時應跡若絲之有纇也道則一致物有萬殊體道之士内則平夷一定而不易外應萬殊隨物變動故若纇上德若谷御註谷虚而受受而不積谷虚而應應而不竭陸佃曰至無以供其求至虚而應其感故曰上德若谷大白若辱李榮曰廉而不穢大白也混同於濁若辱也陸佃曰知其白守其黑知其榮守其辱故曰大白若辱大潔白之人内懷清靜明白入素滌除玄覧而無疵大白也韜光晦迹混俗同塵處衆入之所惡若辱也廣德若不足孫登曰其德深廣則通疏見遠遺略小節如智識不足故良賈深藏若虚君子盛德容貌若愚志琮曰夫上德功濟十方莊嚴萬物德化無窮名之爲廣雖云有德恒自若無德即無德故云不足建德若偷唐明皇曰建立也偷盜也言建立陰德潜修密行如彼盜竊常畏人知故曰若偷車惠弼曰聖人建立衆德濟度羣生妙用潜流玄功密被不令人覺故云若偷此二說偷竊之偷蘇子由曰因物之自然而無所立者外若偷惰而實建也王元澤曰偷苟且也區區欲速務有所建豈足以爲德唯因時任理視若偷惰者其建大矣莊子曰不得已而後起此二說偷情之偷質眞若渝王元澤曰體性抱神以遊乎世俗之間者萬變從俗而其道常眞故物莫知其眞彼漢陰丈人孑孑然以眞爲己任而别乎世俗乃子貢之徒所驚而聖人以爲假修渾沌者豈所謂質眞乎蘇子由曰體性抱神隨物變化而不失其眞者外若渝也質性質也眞淳一也渝色變也言道德行人質眞淳而無假飾若可渝變與物同波而和光大方無隅御註大方者無方之方也方而不割故無隅李榮曰震宇有象故有方也至道無形故無隅也吕吉甫曰大方體之無南無北爽然四解淪於不測無東無西始於玄冥反於大通此大方之無隅也王元澤曰大方道之體也若有四隅則形盡於所見其小乆矣大器晩成御註大器者不器之器也不益生不助長故晚成陶弘景曰積德道成謂之大器非日可就故曰晩成陸佃曰其行身也徐而不廢故曰大器晩成大器者法身之器也法身大器積功而證非一朝一夕故曰晚成莊子曰美成在乆大音希聲御註動之無方而感之斯應故希聲王弼曰聽之不聞名曰希不可得聞之音也有聲則有分有分則不宫而商矣分則不能統衆故有聲者非大音也志琮曰希聲者猶無聲也夫聖人一音說法遍滿十方發蟄開蒙導凡誘俗雖復教滿十方即言恒寂教即無教言即無言以此之義名曰希聲䟽曰道能應衆音大音也聽之無聲希聲也大象無形鍾會曰無象不應謂之大象既無體狀豈有形容大象者無象之象也象既無象豈有形狀道隱無名纂微曰道本無名而强名曰道今道又隱焉而名何有此眞所謂滅跡匿端也吕吉甫曰凡此者皆道也然謂之明而若昩謂之夷而若類謂之進而若退以至音而希聲象而無形名與實常相反者以道隱於無名而以名名之則常若相反故也夫唯道善貸且成顧歡曰先與後得謂之貸物得成道謂之成成之則歸道道得之也志琮曰今凡夫之生是道以生貸汝汝應悟生復歸於道何乃執生爲生而不反本邪舒王曰善貸者萬物資而不匱是也然復歸於所自生故曰且成此章言道深微妙隱奥難見自明道至於大象皆道也道之妙不可以智索不可以形求可謂隱矣道之體隱乎無名而用乃善貸且成上士悟之特然勤行下士聞之所以大笑誠如篇中所云豈流俗所能識乎道生一章第四十二道生一一生二二生三三生萬物陸佃曰道生一太極也一生二陰陽也二生三沖氣也有陰有陽而陰陽之中又有沖氣則萬物於是乎生矣故曰三生萬物李榮曰一生二清濁分陰陽著二生三運二氣構三才三生萬物圓天覆於上方地載於下人主統於中何物不生也谷神子曰大道自然變而生神神動而成和和散而氣結氣結而成形故曰道生一一生二二生三三生萬物一者形變之始也清輕爲天濁重爲地沖和之氣爲人故天地含精萬物化生萬物負陰而抱陽河上公曰萬物無不負陰而向陽回心而就日沖氣以爲和陸佃曰道家謂之沖氣醫家謂之胃氣有陰有陽然後胃氣生於其中負背也抱向也沖中也凡幽而不測者陰也明而可見者陽也有生者莫不背於幽而向於明然萬物獨陽不生獨陰不成必有陰陽之中以和之然後物生莊子至陽赫赫至陰肅肅肅肅出乎天赫赫發乎地兩者交通成和而物生焉人之所惡唯孤寡不穀而王公以爲稱纂微曰夫孤寡不穀者柔弱謙卑之稱乃流俗之所惡嫌也獨大人君子之所以自謂者乃所以有王公之貴耳是法沖氣之爲和也損心志之强梁而求益於道德者也孤寡不穀者不祥之名也王公居尊極之位取人之所惡以自名者處謙卑法柔弱以適陰陽之和也故下文云故物或損之而益益之而損李榮曰有道以富貴而稱孤寡損也謙光日新益也無德處貴爲自益也才下位高必至傾覆損也疏曰故者仍上之辭也言王公稱孤寡以自毁損則爲百姓樂推尊敬而事之而致益也或益之而損者若王公貴寵其身居上而驕則爲下人離散而致損也易曰滿招損謙受益斯之謂也舒王曰天道虧盈而益謙唯其益謙故能損者乃所以爲益唯其虧盈故其益者乃所以爲損然則王公所稱乃所以致益而處貴高之道人之所教亦我義教之河上公曰衆人所教去弱爲强去柔爲剛言我教衆人去强爲弱去剛爲柔人之所以教人者當以我柔弱之義教之强梁者不得其死河上公曰强梁者謂不信玄妙背叛道德不從經教尚勢任力也不得其死者爲天所絶兵刃所伐王法所殺不得以壽命而死也嚴仙曰强秦以專制而失大漢以和順而昌强梁者失道剛武者失神生主已退安得長存字說曰屋梁兩端乘實如之物之强者莫如梁所謂强梁者如梁之强人之强者死之徒也子路好勇不得其死羿善射奡盪舟俱不得其死然是皆失柔弱之義也吾將以爲教父李榮曰不從君父之命不順聖人之教貪榮以守勝尊己以凌人强梁也違科犯法不盡天年中道而夭不得其死也物皆合道聖人無不設教凡情失理化主所以興言由仁義之華彰道德之實因强梁之性演柔弱之法也此章言道生一氣一氣生陰陽陰陽生冲氣物得冲氣以爲和冲和之氣柔弱之義王公法柔弱以孤寡爲稱是損之而益也衆人好强梁而不得其死是益之而損也大聖辯此以爲教父信其然矣天下之至柔章第四十三天下之至柔馳騁天下之至堅李榮曰有象之至柔者水也無形之至柔者道也水至柔而能銷金穿石破彼堅强道至柔而能遺彼忘我破兹固執言人若鑒之於水體之於道足能洞於人我經於丘山微妙玄通都無滯礙此謂馳騁至堅至柔者水也至堅者金石也水能貫堅入剛無所不通水至柔故幾於道而況無形至柔之道包裏天地貫穿萬物此柔之所以勝剛也馳騁猶貫穿縱任也經曰天下莫柔弱於水而攻堅强者莫之能先無有入於無間河上公曰無有者道也道無形質故能出入無間通於神明濟於羣生嚴遵曰有形銛利不入無理神明在身出無間入無竅俯仰之頃經數千里無有者神也神之所爲利用出入莫見其迹透金貫石入於無間神舍於心心藏乎神虚心以存神存神以索至直而推之曲而任之四方上下隨其所寓往來無窮周流乎太虚上際下蟠六通四闢無入而不自得也吾是以知無爲之有益御註柔之胜剛無之攝有道之妙用實寓于此棄事則形不勞遺生則精不虧兹所以爲有益也王弼曰柔弱虚無無所不通至柔不可折無有不可窮以此推之故知無爲之道有益也李榮曰道無形物得生聖無爲人得化此乃無爲之益也柔者道之本無者道之用至柔無有者道也道無爲而萬物自化是以知無爲之道有益也不言之教無爲之益天下希及之御註不言之教設之以神無爲之益不虧其眞聖人以此抱樸而天下賔無爲而萬物化故及之者希顧歡曰法道不言而風俗自移故言不言之教法道無爲而人物自化故言無爲之益此章言法道之柔弱虚無以不言行教無爲化民天下及此道者不亦希乎名與身章第四十四名與身孰親身與貨孰多御註夫兩臂重於天下則名與身孰親生者豈特隋珠之重哉則身與貨孰多至願在我名非所親也至富在我貨非所多也惟不知親疏多寡之辨而殘生損性以身爲殉若伯夷死名于首陽之下盜跖死利于東陵之上豈不惑哉李榮曰身形是成道之本故爲親名聞是虚假之法故爲疏世人不能爲身以損名只爲名以損身王弼曰尚名好高其身必疏貪貨無厭其身必少吕吉甫曰烈士之所徇者名也而至於殘生傷性則不知身之親於名也故曰名與身孰親貪夫之所徇者貨也而至於殘生傷性則不知身之多於貸也故曰身與貨孰多名虚名也貨財貨也身爲成道之本豈不親於名而多於貨乎名顯身危蒙莊固辭楚相寧爲曳尾之龜天師不就大夫願學軒轅之道是知身親而名疏也得與亡孰病纂微曰此釋上兩句也夫虚名浮利得之乎輕羽性命形神亡之若太山達人校量孰者爲病李榮曰名者外之稱譽貨者俗之財帛身爲忠孝及爲修至道而弱喪者不返逐欲者失眞爲名以煞身因財而害己迷淪者衆聖人詳問爲得名貨與亡身者誰爲病矣吕吉甫曰所徇者名則世謂之君子所徇者貨則世謂之小人君子小人之所徇雖或不同而亡其所存則一也然則得名與貨而亡其存則不知亡之病於得也故曰得與亡孰病是故甚愛必大費多藏必厚亡唐明皇曰甚愛名者必勞神非大費乎多藏貨者必累身非厚亡乎劉進喜曰貪欲無厭謂之甚愛欲甚喪身故云大費吕吉甫曰愛名欲以富貴其身也以甚愛之故並其良貴而失之是大費也蓄貨欲以富其身也以多藏之故並其至富而害之是厚亡也知足不辱知止不殆可以長乆唐明皇曰辱損累也殆危亡也夫不邇聲名知足也不殖貨財知止也知足故名當其實而無過分之累知止故貨不多藏而無貪求之害既不辱不殆乃可長存而乆壽也李榮曰不分外以求名遠恥辱也不非理以䂓財無危殆也外之於名利遠之於危殆治國可以長存修身可以長乆吕吉甫曰夫唯有德者知至貴之在己而無待於名也故知足而不辱知至富之在己而無待於貨也故知止而不殆不辱不殆則可以長乆此章之意欲學長生乆視當先絶利忘名若名利不除身心俱役不唯有妨於道乆必於身爲患是以古之得道者不邇聲名不殖貨利雖三旌之位萬鍾之禄棄之若弊屣視之如浮雲或樂簞瓢或居圜堵國卿不能識天子不得臣林宿巖居松飡澗飲豈以蝸蠅之浮幻害性命之至眞此最爲學道之至戒修身之要務故引古爲證欲修眞之士脱此韁鎖而已大成若缺章第四十五大成若缺其用不弊御註域中有四大道居一焉體道之全故可名於大無成與虧是謂大成不有其成故若缺知化合變而不以故自持故其用不弊此孔子所以集大成而爲聖之時河上公曰謂道德大成之君若缺者滅名藏譽如毁缺不備也其用心如是則無弊盡之時纂微曰缺破也弊困敗也大成謂全德之君子也夫德充於内者故能包荒含穢支離其形若器之缺玷罕見其用故得保其完全而無困敗之弊也功成者虧功成不居是以不去名成者隳無爲名尸其名不去至人睹成壞之相因去功與名還與衆人其道大成而常若缺也唐堯有成功而自視缺然爲五帝之盛孔子集大成而不居其聖爲萬世之師其用愈乆愈新豈有弊耶大盈若沖其用不窮御註充塞無外瞻足萬有大盈也虚以應物沖而用之故施之不竭其用不窮良賈深藏若虚盛德容貌若愚吕吉甫曰萬物酌焉而不竭是盈也然益之而不加益故若沖唯若沖故其用日給而不窮羅什曰智無不積爲滿空而能正曰沖言大滿之人能忘其滿雖滿若虚虚則不竭用能如此則無窮極月盈則虧志滿則損至人知盈虚之有數雖盈而常若沖也大直若屈王弼曰隨物而直直不在己故若屈羅什曰理正無邪曰直隨物曲成爲屈身可屈也道不可屈也大直者屈身以伸道也柳下惠直道三黜而不去大巧若拙蘇子由曰巧而不拙其巧必勞付物之自然雖拙而巧劉進喜曰匠成萬物鑪錘羣生有大功巧而忘功用晦迹同凡故曰拙也大巧在所不爲因自然以成器不造作無巧功賦物之形方圓曲直不睹其妙故若拙刻彫衆形而不爲巧非其驗乎有如梓慶之削鐻非若宋人之刻楮大辯若訥御註不言之辯是謂大辯惠施多方其辯小矣羅什曰智無不周爲大辯非法不說故稱訥蘇子由曰辯而不訥其辯必窮因理而言雖訥而辯躁勝寒靜勝熱清靜爲天下正吕吉甫曰夫寒熱者天地之所爲有形之所不能免也而一躁焉可以勝寒一靜焉可以勝熱一時之躁靜猶可勝天地之所行況夫體無爲之清靜以爲天下正安往而不勝哉此章之義先言諸大終之以清靜爲天下正老君言得悟道者常清靜矣悟道之人必靜必清唯見於空乃能如上諸大天下有道章第四十六天下有道却走馬以糞御註以道治天下者民各樂其業而無所爭糞其田疇而已有道者謂人主有道也却者去也走馬者馳走之馬也糞者糞田也言有道之君臨莅天下少欲知足無求於外兵甲不用偃武修文無戰逐之事唯本業之修故却去馳走之馬以治農田治身者意馬不馳丹田自實天下無道戎馬生於郊温公曰貪欲無厭舍内競外天下無道之君縱欲攻取戰伐不止故兵戎之馬寄生於郊境之上乆不得還也邑外曰郊躁競之夫不能少欲知足遂使坐騁走馬奔馳聲色之郊罪莫大於可欲御註不見可欲使心不亂人之有欲至於决性命之情以爭之罪之所起也唐明皇曰心見可欲爲罪大矣張君相曰前境美麗稱可欲心故言可欲然境能適心是起罪之縁縁境不止必獲大罪禍莫大於不知足御註平爲福有餘爲禍知足不辱何禍之有王元澤曰外求無厭失性生禍不知性分之至足而貪求外物則使遭濁辱流浪生死常沉苦海永失眞道禍莫大於兹矣咎莫大於欲得大孟曰得中求取而又得又不厭得中故更欲得心既無涯必招大咎此言無道之徒縱性任情殃咎斯至積惡不已存亡俱累罰止一身罪也下及子孫禍也上誤祖先咎也纂微曰咎殃咎也夫物之經目猶有限也天下之物見與不見咸欲得之使盡在己而摩有孑遺者此無道之甚也豈唯禍及一身抑亦殃咎來世夫罪者言人違於禁令初犯其非名之爲罪道家悔過經曰初犯爲罪亦名爲過過言誤也犯過一千八百爲禍禍重於罪矣犯過二千一百六十爲咎咎又重於禍矣此三者皆無道君子之所爲也天下之物見與不見所欲必令皆得欲而得之人所咎也自取戾曰罪違神而爲禍違人而爲咎由可欲至於不知足不知足則欲得也有罪則有禍有禍則有咎咎則獲戾於衆人也罪莫大於禍禍莫大於咎此次序之然也故知足之足常足矣御註人見可欲則不知足不知足則欲得欲得則爭端起而禍亂作泰至則戎馬生於郊然則知足而各安其性命之分無所施其智巧也日用飲食而已何爭亂之有舒王曰墨子曰非無安居也我無足心也非無足財也我無足心也萬物常至於足而有所謂不足者以其無足心也得道者知其足心足財故曰知足之足常足矣王元澤曰各盡其性分則何不足之有此章言以道莅天下者内自知足外無貪求故絶爭戰之事無殃咎之禍修身者少欲知足意馬不馳丹田自守乃爲有道之士矣道德眞經取善集卷之七
