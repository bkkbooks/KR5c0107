  text: 道德眞經取善集卷之十一悲六
  hash: sha256:4e294b340358b98a63594140cd69916692896e0114db7be0b2b52a52fd878b4f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0107_SJB_011-130926a, image: sjb/13/130926a.png}
body:
  text: 宋饒陽居士李霖集江海爲百谷王章第六十六江海所以能爲百谷王者以其善下之顧歡曰江海處下故百谷宗之王者居謙則萬物歸之故能爲百谷王唐明皇曰言江海所以能令百川朝宗而爲王者以其善居下流之所致也故易云地道變盈而流謙此舉喻也故地道用謙則百川委輸而歸往聖人用謙則庶民子來而不厭爾直以卑下故能爲百谷王王者歸往之義能下下則民歸之如水之就下是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害河上公曰欲在人之上法江海處謙虚欲在人之前先人而後己也聖人在民上爲王不以尊貴虐下故民戴仰而不以爲重聖人在民前不以光明蔽後民親之若父母無有欲害之心也是以天下樂推而不厭吕吉甫曰聖人之有天下也以言其位則固欲上人也然以孤寡不穀爲稱而受國之垢與不祥則以其言下之也以言其序則固欲先人也然迫而後動感而後應不得已而後起則以其身後之也夫唯以其言下之則處上而人不重不重則以戴之爲輕矣以其身後之則處前而人不害不害則以從之爲利矣不重不害此天下樂推而不厭也以其不爭故天下莫能與之爭羅什曰心形既空孰能與無物者爭吕吉甫曰夫以其言下之以其身後之則不爭者也樂推而不厭則天下莫能與之爭也非體玄德者其能若是乎故曰以其不爭故天下莫能與之爭此章以謙下爲主江海善下故爲百谷王聖人言下身後故天下樂推而不厭夫孰能與謙下者爭哉天下皆謂章第六十七天下皆謂我道大似不肖杜弼曰肖似也不與物同故曰不肖夫唯大故似不肖蘇子由曰夫道曠然無形頽然無名充遍萬物而與物無一相似此其所以爲大也若似於物則亦一物矣而何足大哉若肖乆矣其細也夫御註肖物者小爲物所肖者大道覆載萬物者也洋洋乎大哉故似不肖若肖則道外有物豈得爲大乎王弼曰乆矣其細猶曰其細乆矣肖則失其所以爲大矣故曰若肖乆矣其細也夫吕吉甫曰天下徒見我道之大而謂其似不肖而不知其所以大固似不肖也何以言之大道汎兮其可左右無乎不在者也彼其無乎不在無可疑者謂之似不肖而不知其無不在而似不肖乃道之所以爲大也蓋萬物莫非道也則道外無物則無所肖者此其所以爲大也若有所肖則道外有物矣道外有物則道有所不在其尚得爲大乎王元澤曰肖者有所似道爲萬物祖故體道者物當似我我豈似物乎蓋有所似則是象彼者也象彼則彼必大而我小矣我有三寳保而持之唐明皇曰我道雖大無所象似然有此三行甚可珍貴能常保倚執持可以治身治國也王元澤曰凡此三寳皆俗情所謂小而乃至人之所以爲大也一曰慈王元澤曰慈主於愛愛物仁也而獨稱慈者仁則廣德以覆下於末爲盛矣老子方語其本故不曰仁而曰慈慈者父道仁之本而不假爲者也唐耜曰慈愛也禮記曰爲人父者止於慈兹益也慈者人之本父子之道天性也人之慈孝自得於所性之中無待於外矣仁者人也以兼愛爲心去性遠矣老子方明道德之要故以慈爲寳宣聖五常以仁爲首釋迦十戒以殺爲先三聖雖殊以慈爲本則一也二曰儉顧歡曰寳精愛氣不爲奢費吕吉甫曰其行身也徐而不費以約爲紀非儉乎儉德之共也大禹修身以克儉爲費文王爲治以節儉爲化儉之爲德大矣哉書曰恭儉惟德三曰不敢爲天下先顧歡曰履謙居後不爲物先吕吉甫曰未嘗先人而常隨人人皆取先己獨取後非不敢爲天下先乎王元澤曰於易則謙是也天地人神皆以謙爲貴故聖人寳之孔聖以仁道爲本以儉讓爲德亦寳此三者而已夫慈故能勇王弼曰夫慈以陳則勝以守則固故能勇也吕吉甫曰夫慈爲柔弱矣而能勝剛强是能勇也孟子曰仁者無敵帝舜性仁形爲四罪之誅成湯克仁能勝夏桀之虐文王視民如傷可謂慈矣一怒而安天下之民豈非勇乎儉故能廣顧歡曰治身愛氣則性命自延治國愛人則德化自廣儉以修身則精神不費儉以治國則財用有餘書曰慎乃儉德惟懷永圖不敢爲天下先故能成器長御註不爭而善勝者天之道道之尊故爲器之長河上公曰不爲天下首先成器長謂得道人也我能爲道人之長也舒王曰不敢爲天下先則物莫爲之先故能成其器長今舍其慈且勇舍其儉且廣舍其後且先死矣御註世之人知勇之足以勝人而不知慈乃能勇知廣之足以夸衆而不知儉乃能廣知器長之足尚而不知自後之爲要則剛强之徒而已有死之道焉顧歡曰棄捨慈悲且爲勇敢謂負氣輕死以不懼爲勇不寳其氣而捨散其精不愛其人而廣用其力舍其後己但爲人先所行如此動入死地夫慈以戰則勝以守則固御註仁人無敵於天下故以戰則勝民愛其上若手足之捍頭目子弟之衛父兄效死而弗去故以守則固唐明皇曰用慈以戰利在全衆用慈以守利在安人各保安全故能勝固爾天將救之以慈衛之御註志於仁者其衷爲天所誘志於不仁者其鑒爲天所奪則天所以救之衛之者以慈而已此三寳所以慈爲先河上公曰天將救助善人必與慈仁之性使能自營助也王元澤曰三寳皆以慈爲心言天救衛之者以其慈故也此章言道大而爲寳者三三寳之中以慈爲本故篇終言天將救之以慈衛之善爲士章第六十人善爲士者不武盧裕曰士者將帥不武謂不以武凌人吕吉甫曰士之爲言事道而以將人爲任也事道則不爭勝將人則用人之力何所事武若市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵善戰者不怒御註上兵伐謀而怒實勝思河上公曰善以道戰者禁邪於心胸絶禍於未萌無所誅怒也舒王曰不怒則善戰吕吉甫曰爲士而無所事武則善戰者不怒善勝敵者不爭善用人者爲之下固其宜也戰危事也善戰者弔民伐罪而已豈有私怒以用危事而害民者哉若湯放桀武王伐紂是也善勝敵者不爭御註爭逆德也爭地以戰殺人盈野爭城以戰殺人盈城勝敗特未定也不武所以成其武不怒所以濟其怒不爭所以彌其爭三者皆出于德故曰善河上公曰善以道勝敵者附近以仁來遠以德不與敵爭而敵自服劉仁會曰德感物賔故曰勝敵兵刃不交故曰不爭爭逆德也不爭而勝乃爲善也兵貴伐謀不重交刃百戰百勝非用兵之善也善用兵者不戰而勝善之善也善用人者爲之下御註智雖落天地不自慮也故智者爲之謀能雖窮海内不自爲也故能者爲之役辯雖彫萬物不自說也故辯者爲之使河上公曰善用人自輔佐者當爲人執謙下也纂微曰善用人者以謙不以力故用輔弼之臣則比之股肱心膂用將帥之臣則跪而受鉞行而推轂是謂不爭之德吕吉甫曰體道者不爭不爭則天下莫能與之爭則善爲士者不武善戰者不怒善勝敵者不爭是謂不爭之德也是謂用人之力御註聰明者竭其視聽智力者盡其謀能而位之者無智也吕吉甫曰體道者能下人能下人者人樂爲之用而不自用則善用人者爲之下是謂用人之力是謂配天古之極也御註無爲爲之之謂天不爭而用人故可以配天則至矣不可以有加矣故曰古之極極至也木之至者屋極是也此章言善爲士者不武夫不怒不爭用人之力是不武也德則不爭力則用人故可以配天無爲而無以加矣用兵有言章第六十九用兵有言吾不敢爲主而爲客御註感之者爲主應之者爲客迫而後動不得已而後起謂之應兵應兵爲客者也顧歡曰在國先舉在陣先動爲主和而不唱迫而後動爲客先舉先動驕盈必危今欲順天應人以自全保既不先舉是不爲主不得已而用是故爲客不敢進寸而退尺御註不嗜殺人故難進而易退吕吉甫曰主逆而客順主勞而客逸進驕而退卑進躁而退靜以順待逆以逸待勞以卑待驕以靜待躁皆非所敵也王元澤曰不勇於殺伐是謂行無行御註善爲士者不武行而無迹唐明皇曰爲客退尺不與物爭雖行應敵與無行同矣張君相曰兵由彼起我實不行應物而動雖行無行王元澤曰至仁之兵有征無戰與無行同攘無臂唐明皇曰攘臂所以表怒善戰者不怒若無臂可攘仍無敵御註善勝敵者不爭顧歡曰仍引也人既服德則班師振旅雖欲引敵無敵可引執無兵御註用人之力故無事於執兵唐明皇曰執兵所以表殺今已慈和爲主故雖執兵與無兵同王元澤曰雖有戰之名前無敵者故與不戰同禍莫大於輕敵成玄英曰内明敵前境也輕染諸塵則致三塗之禍輕敵則幾喪吾寳成玄英曰幾盡也輕敵則好勇而不慈廣貪而失儉好進而不退盡失前三寳吕吉甫曰苟爲不能出於無爲知主而不知客知進而不知退是之謂輕敵輕敵則喪吾之慈而失仁民愛物之心矣故抗兵相加哀者勝矣唐明皇曰抗舉也兩國舉兵以相加則慈哀於人者勝王元澤曰哀憐之心慈也慈故能勇所以勝一本作相若亦通若之言兵刃相敵也此章言用兵出於不得已故爲客退尺不敢輕敵恐喪其寳故舉兵相加慈哀於人者勝吾言甚易知章第七十吾言甚易知甚易行天下莫能知莫能行御註道炳而易見故載之言則甚易知要而易守也故見之事則甚易行孟子曰道若大路然豈難知哉故道無難而天下無難不能者不知反求諸己爾蘇子由曰道之大復性而足性之妙用見於起居飲食之間爾聖人指此以示人豈不易知乎人能體此以應物豈不易行乎然世常患日用而不知知且不能而況行之乎易則易知近則易行以其至易也非思慮擬議之所能喻所謂不慮而知也以其至近也非步驟遲速之所能至所謂不行而至也用智以知之則淺矣故天下莫能知用力以行之則莫能至故天下莫能行言有宗事有君御註言不勝窮也而理爲之本事不勝應也而道爲之主順理而索循道而行天下無難矣言以無言爲宗事以無事爲君得其宗而易知識其君而易行天下不能知不能行者不知其宗與君而已夫唯無知是以不我知蘇子由曰言者道之筌也事者道之迹也使道可以言盡則聽言而足矣可以事見則考事而足矣惟言不能盡事不能見非舍言而求其宗遺事而求其君不可得也蓋古之聖人無思無爲而有漠然不自知者存焉此則思慮之所不及是以終莫吾知也知我者希則我者貴河上公曰希少也唯達道者乃能知我故爲貴也纂微曰至道之言有宗有君惟明者知之故希少矣惟知者少此所以爲貴也使淺識以知聖人則豈足貴邪是以聖人被褐懷玉河上公曰被褐者薄外懷玉者厚内匿寳藏德不以示人也王弼曰被褐者同其塵懷玉者寳其眞也聖人之所以難知以其同塵而不殊懷玉而不顯故難知而爲貴也褐者麤淺之服玉者精貴之寳被褐者顯麤於外和光同塵若愚若昏不殊於俗懷玉者藏寳於内懷道抱德匿名藏譽不示於人與珉中玉表者異矣莊子曰聖人懷之衆人辯以相示也此章言道易知易行然天下莫能知莫能行者以言有宗事有君也夫惟有宗與君是以知者少也聖人所以難知者寳此道而被褐故爾知不知上章第七十一知不知上不知知病吕吉甫曰道之爲體不知而能知者也知其不知而以不知知之至者也故曰知不知上矣雖知其不知而以知知之則其心庸詎而寧乎故曰不知知病矣温公曰知之如不知則遠怨不知而强知則招患夫惟病病是以不病唐明皇曰夫惟能病强知之病是以不爲强知所病聖人不病以其病病是以不病吕吉甫曰夫惟知知之爲病而病之則反乎無知而知不足以病之矣故曰夫惟病病是以不病聖人不病以此而已故曰以其病病是以不病南伯子綦曰我悲人之自喪者吾又悲夫悲人者吾又悲夫悲人之悲者其後而日遠矣若子綦者可謂病病者乎王元澤曰病而不自知病者終莫悟矣此章言道本無知知其不知爲上不知而用知以知之則爲病聖人之不病者知知之爲病而反乎無知是以不病民不畏威章第七十二民不畏威則大威至河上公曰威害也人不畏小害則大害至謂死亡也畏之者當愛精養神承天順地也成玄英曰内明威刑也所謂經戒科律大威即三塗惡趣北都羅酆之刑法也言一切衆生未解眞理愛樂世法輕而行之則𡨋中大刑必將至矣劉仲平曰詩云畏天之威于時保之蓋衆人不知畏天之威故大威至矣有威可畏謂之威衆人不知畏天之威則無所不爲此天之大降其威虐而禍罰所加也故曰大威至矣書曰罔不惟畏弗畏入畏無狹其所居御註居者性之宅人之性至大不可圍而曲士不以語於道者狹其所居故也擴而充之則充滿天地包裹六極無自而不可孟子曰居天下之廣居唐明皇曰神所居者心也無狹者除情去欲使虚而生白無厭其所生御註生者氣之聚人之生通乎物之所造而厭其所生者旦晝之所爲有梏亡之矣梏之反復則夜氣不足以存彼保合大和而無中道夭者無厭其所生故也河上公曰人所以生者以有精神精神託空虚喜清靜飲食不節忽道念色邪辟滿腹爲伐命散神也劉仲平曰無狹其所居德之地也無厭其所生德之本也德之地盡性也德之本至命也故聖人不以人滅天不以故滅命王元澤曰民性本自廣大流通而世教下衰不能使之復樸乃蹙其居之廣而使狹厭其生之通而使塞夫唯狹其居故民不淳而偽唯厭其生故民不厚而薄彼聖人不然使民逍遥乎天下之廣居而各遂其浩然之性則其有干威者乎莊子曰狶韋氏之圃黃帝之囿堯舜之宫湯武之室此明世世下衰漸狹其居也彼聖人豈有優劣乎而居乃漸狹者所遭之時則然也夫唯不厭是以不厭河上公曰夫唯獨不厭精神之人洗心垢濁恬淡無欲則精神居之而不厭也顧歡曰人不厭生生不厭人人不棄道道不棄人故曰生與人相保人與道相得西昇經曰神常愛人人不愛神若人不厭其精神則精神居之而不去也是以聖人自知不自見自愛不自貴河上公曰自知己之得失不自顯見德美於外而藏之於内自愛其身以保精氣不自貴高榮名於世吕吉甫曰聖人自知以常而不自見以外其身知常而外其身乃所以不狹其所居也自愛以嗇而不自貴以遺其生嗇而遺生乃所以不厭其所生也劉進喜曰保養眞性不輕染欲自愛也謙卑靜退先物後己不自貴也明以自知而不自見以矜能則其性廣而物不能蔽所謂無狹其所居也仁以自愛而不自貴以賤物則其生全而物莫能傷所謂無厭其所生也夫然則豈至於干天之威乎故去彼取此顧歡曰去彼見貴則威罰外消取此知愛則生道内足此章言上失其大道之化民亡其性命之眞故雖有可畏之威而弗畏也唯無狹其居以盡性無厭其生以至命豈有干威者乎是以去彼見貴取此知愛亦使民廣其居而不狹保其生而不厭也聖人去取灼可見矣勇於敢章第七十三勇於敢則殺顧歡曰不懼曰勇必果曰敢謂見威不懼必果無回强梁使氣殺身之術成玄英曰勇謂猛進也敢謂果决也殺謂死滅也言進必果决貪於世事則死滅也羅什曰心定所行果而望得眞去邪來遂獲其罪故言殺勇於不敢則活羅什曰行柔弱唯善是與則獲其利言活活長生也若進心虚淡不敢貪染則長生顧歡曰謂獨立不懼不敢有爲守柔盡順活身之道舒王曰莊子曰聖人以必不必故無兵衆人以不必必之故多兵勇於敢以不必必之故多兵而殺勇於不敢以必不必故無兵而活吕吉甫曰用其剛强而必於外物者勇於敢者也則死之徒是也故曰勇於敢則殺致其柔弱而無所必者勇於不敢者也則生之徒是已故曰勇於不敢則活此兩者或利或害河上公曰兩者謂敢與不敢也活身爲利殺身爲害王弼曰俱勇而所施者異利害不同故曰或利或害也吕吉甫曰勇於敢者人以爲利而害或在其中矣勇於不敢者人以爲害而利或在其中矣天之所惡孰知其故御註畸於人者侔於天人之所利天之所惡孰從而知之是以聖人猶難之御註順天者存逆天者亡雖聖人不敢易也天之道不爭而善勝御註萬物之出與之出而不辭萬物之歸與之歸而不迕是謂不爭消息滿虚物之與俱而萬物之多皆所受命是謂不爭而善勝唐明皇曰此下言天道謙虚以戒人事勇敢天不與物爭四時盈虚物無違者故善於勝不言而善應王元澤曰天何言哉四時行焉百物生焉福善禍淫酬酢萬變無一不生劉仁會曰寂寞無聲故曰不言有感則報故言善應不召而自來御註有所受命則出命者能召之矣萬物之紛錯而天有以制其命孰得而召之健行不息任一氣之自運而己繟然而善謀蔡子晃曰雖坦蕩平夷善能謀圖善惡毫分不差王元澤曰常易故坦然知險故善謀天網恢恢疏而不失御註密而有間人所爲也天則雖疏而無間積善積惡殃慶各以其類至所以爲不失且爭而後勝言而後應者人也天則不爭而善勝不言而善應召之則至難於知天者人也天則不召而自來坦然而善謀惟聖人爲能體此故不就利不違害常利而無害所以與天合德異夫勇於敢者曹道冲曰物不能逃者天網也恢大疏略物無漏者包羅上下六合萬物不能逃其内者天網也恢恢甚大雖則疏略賞善禍淫毫分不失此章言勇於敢與不敢夫勇敢者天之所惡雖聖人猶難於勇敢下文言天道謙虚當視以爲法民常不畏死章第七十四民常不畏死奈何以死懼之顧歡曰奈何猶如何也道德陵夷刑罰深酷則生不足懷死不足畏人不畏死本由刑政之苛如不慕大德以生人更設嚴刑以懼物民將抵冒而終不化修已奢淫則精窮氣竭萬神交落動之死地不能制情遣欲更爲險行驚神上失其道民無常心以抵冒法禁何死之畏上猶以死懼之釿鋸制焉繩墨殺焉而亂終不止則秦以下是也若使民常畏死而爲奇者吾得執而殺之孰敢御註天下樂其生而重犯法矣然後奇言者有誅異行者有禁荀卿所謂犯治之罪固重也河上公曰以道教化而民不從反爲奇巧乃應以王法執而殺之誰敢有犯者老子傷時王不先以道德化人而先刑罰王弼曰詭異亂眞謂之奇也常有司殺者殺唐明皇曰如此奇詐之人天網不失是常有司殺者殺之杜光庭曰司主也天之養人也厚矣愛人也至矣南宫丹籙賞善而司生北宫黑簿紀過而主死天地萬神司察善惡以懲以勸俾其革惡而遷善也故有功者延年有罪者奪筭毫分無失如陽宫之考較焉天有司命四司之星在虚危之間人星之側以司於人此四司星者三元經所謂天之司殺也夫代司殺者殺是謂代大匠斲河上公曰人君欲代殺之是猶拙夫代大匠斲木乃勞而無功也夫代大匠斲希有不傷其手矣河上公曰人君行刑罰猶拙夫代大匠斲木也必方圓不得其理還自傷其手代天殺者失其紀綱不得其紀綱則反受其殃也吕吉甫曰聖人以道治天下者宜如何哉常有司殺者殺勿代之而已矣何謂常有司殺者殺天網恢恢疏而不失天討有罪五刑五用則司殺者天之謂也刑戮者有出於好惡而不用於天討則是代司殺者殺也代司殺者殺是代大匠斲希有不傷其手者則代司殺者殺其傷可知此章言民無常心而不畏死當先化之以道不可威之以刑若民畏死而爲奇者誅之孰敢有犯然不可以自殺而有天之司殺者若代殺之是猶代大匠斲未有不傷其手矣道德眞經取善集卷之十一
