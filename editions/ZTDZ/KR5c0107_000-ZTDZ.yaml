body:
  text: 道德眞經取善集序墨六老氏當商之季憫其世道衰微由乎文弊於是思復太古之純載暢玄風以激其流俗至於輕蔑仁義屏斥禮學蓋非過直無以矯枉仲尼所以欽服既見則歎其猶龍惟聖知聖始云其然也關尹睹紫氣之瑞識其眞人度關虔誠叩請方垂至言議者咸謂五經浩浩不如二篇之約良有以也莊周列禦寇羽翼其教亦猶鼓大浪於滄溟聳奇峻於喬嶽此尚擬其迹而未盡其意要在忘言而後識其指歸也漢文景間治尚清靜世治隆平率自曹參宗蓋公之訓足知道德範世之驗果不虚云惜乎晋朝流爲浮誕王衍清談反壞淳風阮籍猖狂又隳名教失其本而循其末可不哀哉賴隋之王仲淹深識其故以謂虚玄長而晋室削非老莊之罪以其用之不善也唐韓愈猶譏其小仁義如坐井觀天嗚呼愈負其才而昧於道是亦聾盲於心而不知太山雷霆可以驚其耳而駭其視也一言以爲不智每貽君子之歎息焉篤信之士代不乏人各隨其意爲之註解殆數十家不惟觀覽之煩抑掊集之不易饒陽李霖字宗傅性善恬淡自幼至老終身確然研精於五千之文所謂知堅高之可慕忘鑽仰之爲勞會聚諸家之長並叙己見成六卷譬若八音不同均適於耳五味各異皆可於口庶廣其見而博其知以斯而資同道爲功豈小補哉王賔迺先生之舊友也賞其勤而成其志命工鏤板俾好事者免繕寫之勞推而用心可不謂之仁乎時大定壬辰重午日河間劉允升序物之其由者道也道之在我者德也道妙無形變化不測德顯有體同焉皆德自其異者視之則有兩名自有同者視之其實一致末學之人言道者每不及德言德者同及於道此道德所以分裂不見其純全也猶龍上聖當商末世嘆性命之爛漫憫道德之衰微著書九九篇以明玄玄之妙言不踰於五千義實貫於三教内則修心養命外則治國安民爲羣言之首萬物之宗大無不該細無不徧其辭簡其義豐洋洋乎大哉自有書籍已來未有如斯經之妙也後之解者甚多得其全者至寡各隨所見互有得失通性者造全神之妙道於命或有未至達命者得養生之要訣於性或有未盡殊不知性命兼全道德一致爾霖自幼及壯謾誦玄言以待有司之問今已老矣欲討深義以修自己之眞自度耄荒難測聖意今取諸家之善斷以一己之善非以啓迪後學切要便於檢閲目之曰取善集覽者幸勿誚焉饒陽居士李霖序
