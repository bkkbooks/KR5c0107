body:
  text: 宋饒陽居士李霖集民之飢章第七十五民之飢以其上食税之多是以飢御註賦重則田萊多荒民不足於食吕吉甫曰一夫耕足以食數口則奚至於飢哉而至於飢者非以其上食税之多故耶王元澤曰張官賦禄制禮用則將以富民也而費多增税末盛本衰適使之飢而已幽王賦重而楚茨之詩刺魏君重斂而碩鼠之詩作民之難治以其上之有爲是以難治御註政煩則姦偽滋起民失其樸劉進喜曰有爲則政煩無爲則事簡簡則易從煩則難治六情難制由一心之有爲吕吉甫曰織而衣耕而食是謂同德奚難治哉而至於難治者非以其上之有爲故難耶王元澤曰任察生事將以治民而人困俗彫巧偽彌出愈難治矣觀上古與後世即其驗也無爲而治者舜之所以爲帝垂拱而治者武之所以爲王帝王興成皆原於此經曰爲無爲則無不治矣人之輕死以其求生之厚是以輕死纂微曰賦重政煩民亡本業則競求寳貨而觸法犯禁輕就死地以其求養生之具太厚致有蹈水火而不懼逆白刃而不驚者故曰是以輕死吕吉甫曰甘其食美其服安其居樂其俗則奚至於輕死哉而至於輕死者非以其生生之厚故輕死耶温公曰求利所以養生也而民常以利喪其生矜生太厚欲利甚勤獨刑蹈險視死輕矣夫唯無以生爲者是賢於貴生御註莊子曰達生之情者不務生之所無以爲無以生爲者不務生之所無以爲棄事而遺生故也棄事則形不勞遺生則精不虧形全精復與天爲一所以賢於貴生貴生則異於輕死遺生則賢於貴生推所以善吾生者而施之於民則薄税斂簡刑罰家給人足畫衣冠異章服而民不犯帝王之極功也此章言賦重政煩民亡本業是以輕死此三事皆以末傷本者也貴生則異於輕死無以生爲則賢於貴生人之生章第七十六人之生也柔弱其死也堅强河上公曰人生含和氣抱精神故柔弱人死和氣竭精神亡故堅强萬物草木生也柔脆河上公曰和氣存也其死也枯槁河上公曰和氣散也嚴遵曰陽氣之所居木可卷而草可結也陽氣之所去水可凝而冰可折也故堅强者死之徒柔弱者生之徒河上公曰以其上二事觀之則知堅强者死柔弱者生唐明皇曰欲明守柔弱者全生保年爲强梁者亡身失性也吕吉甫曰道之爲物無形而不爭則天下之至柔弱而人莫之喻也故以有形喻之人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁則雖有形者亦以堅强而死柔弱而生而況體無形之道而不致於柔弱其可得乎是以兵强則不勝御註抗兵相加哀者勝矣王眞曰夏商之裔以百萬之師而傾四海始皇之末以一統之業而喪九州項羽忽霸而遽亡王莽既篡而旋滅符堅狼狽於淮上隋煬分崩於楚宫此數家兵皆多至數兆少猶數億無不自恃其成以取其敗此皆兵强則不勝之驗也兵恃其强則必驕矜驕矜者敗亡之道也秦皇至强不二世而亡項氏暴强不旋踵而滅木强則共御註拱把之桐梓人皆知養之强則伐而共之矣林木茂而斧斤至木强則伐而共之强大處下柔弱處上御註柔之勝剛弱之勝强老氏之道術有在於是莊子以濡弱謙下爲表仰觀乎天天積氣而在上地積形而在下遠取諸物木條柔而在上幹堅强而在下以此推之則堅强居下柔弱處上可知矣是篇泛論人物皆以柔弱者生堅强者死欲全生道者可不鑒兹天之道章第七十七天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者與之御註天之道以中爲至故高者抑之不至於有餘下者舉之不至於不足將來者進成功者退四時運行各得其叙嚴遵曰夫工人之爲弓也無殺無生無噏無張制以規矩督以準繩絃高急者寬而緩之弦弛下者攝而上之其有餘者削而損之其不足者補而益之弦質相任上下相權平正爲主調和爲常故弓可抨而矢可行夫按高舉下損大益小天地之道張君相曰用弓之道高者恐過故抑之令不高下者不及故舉之令不下不下不高中前期也爲行之道亦務中平太高則衆所不容傷下則非議所聚抑高舉下合理源也唐明皇曰張弓如此乃能命中是猶天道虧盈益謙欲令人君法天字人故示抑高舉下之道天之道損有餘補不足御注滿招損謙受益時乃天道人之道則不然損不足以奉有餘御註人心排下而進上虐煢獨而畏高明王元澤曰人道任情故不均河上公曰人道與天道反也世俗之人損貧益富奪弱與强孰能以有餘奉天下唯有道者御註不虐煢獨而罄者與之不畏高明而饒者損之非有道者不能河上公曰誰能居有餘之位自省爵禄以奉天下不足者乎唯有道之君能行也王元澤曰有道者與天合道是以聖人爲而不恃功成不居其不欲見賢羅什曰得此虚通而無思無慮豈有心智而欲貴己之賢能不恃其爲無自伐之心不居其功無自滿之志恃爲處功則見賢見賢則是以有餘自奉招損之道也此章言天之道以中爲至故抑高舉下損有餘補不足聖人法天不恃爲處功以示其賢故受益而無損非知天者不能與此天下柔弱章第七十八天下柔弱莫過於水而攻堅强者莫之能勝其無以易之吕吉甫曰天下之物唯水能因物之曲直方圓而從之則是柔弱莫過於水者也而流大物轉大石穿突陵谷浮載天地唯水爲能則是攻堅强者無以先之也所以然者以其雖曲折萬變而終不失其所以爲水是其無以易之也水隨物萬變而不易己者以其柔弱故也人能體此雖應萬殊之變而吾心常一故能勝物而不傷故柔勝剛弱勝强天下莫不知莫能行河上公曰舌柔齒剛齒先舌亡水能滅火陰能消陽知柔弱者乆長剛强者折傷恥謙卑好强梁是以聖人言謂下文也受國之垢是謂杜稷主受國不祥是謂天下王王元澤曰聖人所以能柔弱者體水以爲德也受國不祥其納汙守辱之義乎引萬方之罪歸己是受國之垢濁也故爲一國之君主稱孤寡不穀是受國之不祥也故天下之人歸往矣正言若反王元澤曰反於小知之近情而合於大道之至正蘇子由曰正言合道而反俗俗以受垢爲辱受不祥爲殃故也此章言柔弱勝剛强故先舉水以爲喻後引聖人言以信之和大怨章第七十九和大怨必有餘怨安可以爲善吕吉甫曰復讎者不折鏌干雖有忮心不怨飄瓦是以天下平均不由此道則怨之所生也而人欲和之不可勝解矣故曰和大怨者必有餘怨不善者吾亦善之乃所以爲德善和大怨而不免於有餘怨安可以爲善哉人君不能無爲無事謙卑柔弱而民乃多欲好爭怨惡並興人君立法以繩之其殺人者死傷人者刑而和報其怨奈何姦詐愈甚而怨惡益多則安可以爲善是以聖人執左契河上公曰古者聖人執左契合符信也無文書法律刻契合符以爲信也陸希聲曰古者結繩爲約而民不欺破木爲契而民不違何者聖人無常心以百姓心爲心也故聖人之心與百姓心猶左右契爾契來則合而不責於人故上下相親怨用不作李榮曰古者聖人刻木爲契君執於左臣執於右爲信合之於符契不復制之以法律於物無罰故曰不責於人是故不罰不責何怨何和王弼曰左契防怨之所由生也而不責於人吕吉甫曰是以聖人執左契而不責於人是乃使復讎者不折鏌干雖有忮心不怨飄瓦而天下平均之道也蓋古之獻牛馬者執右契右契所以取左契所以與則左契者常以與人而不爲物主者也聖人爲而不恃功成不居每以有餘奉天下至於殺人則有司殺者殺而未嘗尸之則是執左契以與人而不爲物主此其所以無怨而不責於人之道也夫豈以和之爲悦乎王元澤曰左契取於人右契取人左無事而右主權故古者分契之法如此也聖人執左契不從事於物而物自來合吾應其合者爾所謂感而遂通天下之故也然則聖人常受天下之責而無責人之心是以終無怨莊子曰以得爲在人以失爲在己湯曰萬方有罪罪在朕躬此之謂也記曰獻牛馬者操右券蓋獻者並券以進是知左券乃受責者之所執史記曰操右契以責事故有德司契王元澤曰不從事於物而應物之合者嚴仙曰求諸己有德之君司察契信不令怨生而後責於人也無德司徹河上公曰無德之君背其契信司人所失嚴仙曰求諸人舒王曰司徹通於事則不能無責於人不能無責於人則不能使人之無怨此其所以爲無德也徹通也無德者物物求通而有和怨之心焉慈徹也秪所以爲蔽歟故曰樂通物非聖人也天道無親常與善人御註善則與之何親之有吕吉甫曰無親而唯善人之與是亦執左契而不責於人之道也王元澤曰唯天無心但善則與明天與聖人同道也此章言有心和怨不若無心司契和怨則必有餘怨司契則不責於人天道無親唯善則與是亦執左契不責於人之道也小國寡民章第八十小國寡民河上公曰聖人雖治大國猶以爲小示儉約不奢泰民雖衆若寡少不敢勞也臧玄靜曰土地不多爲小國士卒不衆爲寡民王元澤曰小國寡民則民淳厚蓋國大民衆則利害相摩巧偽日生觀都邑與聚落之民質詐殊俗則其驗也小制國則事簡寡聚民則民淳事簡民淳可以復太古之治矣使有什伯之器而不用舒王曰夫民之寡則吾之用亦狹矣故小國之寡民雖有什伯之器不用矣王元澤曰十人所共謂之什器百人所共謂之伯器清靜之治務使民各遂其生理而不妄興作終無連羣聚衆之事故雖器有什伯而不用也使民重死而不遠徙河上公曰君能爲民興利除害各得其所則民重死而貪生也政令不煩則民安其業故不遠遷徙離其常處王元澤曰樂生遂性故重死安土無求故不遠徙重死者不輕生也與人之輕死以其生生之厚者異矣不遠徙者安其居也與萬民離散不安其居者異矣雖有舟輿無所乘之雖有甲兵無所陳之御註無絶險之迹故雖有舟輿無所乘之無攻戰之患故雖有甲兵無所陳之纂微曰刳木爲舟以濟於水斲輪爲輿以通於陸蓋適遠之用也無爲之世山無蹊隧澤無舟梁本絶往來何所乘用張君相曰兵以討逆武以靜亂上既行道下乃好德自然從化何事陳兵内明舟輿以喻小乘甲兵以喻小智行人心安實相廢而不用王元澤曰民自足於性分之内則無遠遊交戰之患曹道沖曰大國不侵小國守土介胄戈矛不戰安用使民復結繩而用之王元澤曰事簡民淳故無用文契唐明皇曰舟輿所以利遷徙甲兵所以徇攻戰兩者無欲故無所乘陳返樸還淳復歸於結繩之用矣疏曰古者書契未興結繩紀事故繫辭曰上古結繩而治後世聖人易之以書契欲明結繩之世人人淳樸文字既興詐偽日漸今將使人忘情去欲歸於淳古故曰使民復結繩而用之甘其食美其服安其居樂其俗御註耕而食織而衣含哺而嬉鼓腹而遊民能已此矣止分故甘去華故美不擾故安存生故樂唐明皇曰不貪滋味故所食常甘不事文繡故所服皆美不飾棟宇故所居則安不澆淳樸故其俗可樂鄰國相望雞犬之音相聞民至老死不相往來王元澤曰此盡性之治民亦盡其性竊嘗考論語與孟子之終篇皆稱堯舜禹湯聖人之事業蓋以爲舉是書而加之政則其效可以爲此也老子大聖也而所遇之變適當反本盡性之時故獨明道德之意以收歛事物之散而一之於樸誠舉其書以加之政則化民成俗此篇其效也故經之義終焉吕吉甫曰三代以來至於周衰其文弊甚矣民失其性命之情故老子之言救之以質以反太古之治然詩書之所言則止於堯舜三代而老子欲反太古之治何哉曰夫道與世交相喪乆矣非大道不足使人反性命之情言道而不及其世不足以知大道之已試此其所以必反太古之道也然則世去太古也乆矣遂可以盡復乎曰未可也然則其言之何也曰禮至於兼三王樂至於備六代其文極矣然而禮不以玄水大羹而措之醴酒和羹之下樂不以嘒管清磬而加之朱絃疏越之上者使人知禮樂之意所不得已者如彼而所欲反本復始如此也方斯時也孔子方求文武周公之墜緒而賡之老子論其道與世如此其意亦猶是而已矣譬之月建巳而火始王而金氣已生於其間矣此五材所以相繼而不絶也故聞古之治雖有什伯之器而不用有舟輿而不乘有甲兵而不陳則舉大事用大衆非得已也聞其民結繩而用之鄰國相望鷄犬相聞至老死不相往來則煩文倦令督稽趣留而足跡接乎諸侯之境車軌結乎千里之外非得已也則不得已者常在於此而所欲復者常在彼也則其肯煩事爲以深治人之過乎然則欲天下不安平泰不可得也即没而不言猶屏玄水徹疏越其孰知禮之寧儉而樂之節樂而反本復始之意乎夫聖人之言豈小補哉居相比也聲相聞也近而不交無求之至也是篇言小國寡民則事簡民淳可復太古之治自結繩而下皆太古之治也誠舉是書以化民其效可以如此信言不美章第八十一信言不美舒王曰信者性也言近於性則極天下之至順故言之信者不美夫治天下至於甘其食美其服安其居樂其俗老死而不相往來則治之極復收斂而歸於道故次之以信言不美王元澤曰信言要於道道之出口淡乎無味何美之有盜言孔甘甘者味之美者也貌言華也華者色之美者也巧言如簧簧者聲之美者也信言者以道而言也淡乎無味而非道也言無華綺而非貌也言無韻麗而非簧也此所以不美歟美言不信河上公曰美言者滋美之華辭不信者飾偽多空虚舒王曰言之美則不能近於性矣故美言不信王元澤曰離道而語事物雖足以美淺聞之聽而非至論也故不足於信善者不辯善行道者無辯說辯者不善唐明皇曰空滯辯說故不善王元澤曰言以明道而已道要不煩何用多說孔子曰辭達而已知者不博御註知道之微者反要而已經曰少則得纂微曰夫知者謂知其道也明於理而知根本得其要而已矣何必博乎所謂少則得博者不知御註聞見之多不如其約也莊子曰博之不必知辯之不必慧河上公曰博者多見聞不知者失要眞也蘇子由曰有一以貫之則無所用博而日益者未必知道也聖人不積王弼曰無私自有唯善是與任物而巳既以與人己愈有既以與人己愈多王元澤曰爲人者施於事業以治天下也因其勢而利之則吾道不虧而事業彌廣矣與人者授之以道也授之以道如天生物吾未嘗費而物日以夥既云無積故又明能贍足萬物蓋唯無積乃所以能足也曹道沖曰博施之富無盡不積之應無窮妙用日生求之不屈大施日與取之益豐有積也故不足無藏也故有餘聖人不積亦虚而已虚故足以應羣實而不屈所以與人己愈有既以與人己愈多也天之道利而不害御註乾始能以美利利天下不言所利而物實利之未始有害盧裕曰人道利於此者或害於彼天道均平故有利無害顧歡曰善者得道以成惡者得道以化同歸乎一利而不害天法道故春夏生之育之秋冬成之熟之是利而不害也聖人之道爲而不爭吕吉甫曰老子之言也内觀諸心外觀諸物仰觀諸天俯觀諸地無有不契是信也然而下士聞而笑之天下以爲似不肖是不美也言之至近其指至遠是善也然而非以言爲悦是不辯也其知至於無知是知也而其約不離吾心是不博也而學者以美與辯與博求之則疏矣老子之道也以有積爲不足雖聖智猶絶而棄之是無積也故至無而供萬物之求則是愈有而愈多也而學者於是不能刳心焉則不可得而至也凡物有所利有所不利者所不利則不能不害矣唯天之道無所利則無所不利無所不利則利而不害矣凡物之有爲者莫不有我有我故有爭唯聖人之道雖爲而無爲無爲故無我無我故不爭是天之道而已矣聖法天雖爲也而爲出於無爲化成事就不與物爭故能全其聖功也此章總叙作經之㫖體道而言也道淡無味故不美言以明道故不辯道要不煩故不博聖人體道故不積以至無供萬物之求故愈有愈多天法道故利而不害聖法天故爲而不爭誠欲體道德之說莫尚於利物而不爭故以此終焉道德一合論未形之先道與德俱冥既形之後道與德俱顯孰爲道乎物莫不由者是已孰爲德乎道之在我者是已自其異者視之道之與德雖有兩名自其同者視之道之與德不離一致道降爲德而德未始外乎道德出於道而道未始外乎德南華經云一之所起有一而未形物得以生之謂德自其有一未形而言謂之道自其物得以生而言謂之德又曰德總乎道之所一道德合則渾而爲一離則散而爲二今言道德經者是也言道經德經者非也後人見上經之首取其道可道因名爲道經也下經之首取其上德不德因名爲德經也兹道德之所以分裂歟上經止言其道何以言孔德之容唯道是從是道不離於德也若下經止言其德何以言道生之德畜之是德不離於道也以經考之道德相須不可偏舉嘗試論之夫道非德無以顯德非道無以明道無爲無形故居化物之先德有用有爲故在生化之後道居先故處於上德居後故處於下道德合而爲一不可分而爲二也西昇經云道德一合與道通也南華經云形非道不生生非德不明存形窮生立德明道以是推之道德相須而不相離也明矣司馬溫公述要太史公曰老子著書上下篇言道德之意後人因其篇首之文上篇曰道下篇曰德夫道德連體不可偏舉今從本名道德眞經取善集卷之十二
