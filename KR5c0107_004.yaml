body:
  text: 宋饒陽居士李霖集孔德之容章第二十一孔德之容唯道是從御注一陰一陽之謂道物得以生之謂德道常無名豈可形容所以神其德德有方有體同焉皆得所以顯道性修反德德至同於初故唯道是從纂微曰道常無名唯德以顯之至德無本順道而成之言大德之人容狀若於諸相豈可見邪唯有順道之容髣佛是其狀矣動容周旋中禮盛德之至也盛德容貌若愚豈可見邪唯從事於道之容略可見矣故目視耳聽鼻聞口言手持足行無非道也故唯道是從道之為物唯恍唯惚御注道體至無而用乃妙有所以為物然物無非道恍者有象之可況惚者有數之可推而所謂有者疑於無也故曰道之為物顧歡曰欲言定有而無色無聲言其定無而有信有精以其體不可定故曰唯恍唯惚如此觀察名為從順於道所以得馬巨濟曰無若有曰恍有若無曰惚此即道之物也道以恍惚無物則復歸於無物矣所謂不可容者也王元澤曰道兼陰陽陰陽之微若無若有謂之恍惚惚兮恍其中有象恍兮惚其中有物御注見乃謂之象形乃謂之物恍惚之中象物斯具猶如太空變為雷風猶如大塊化為水火以成變化以行鬼神是謂道妙杳兮冥其中有精御注杳者幽之極冥者明之藏杳冥之中至陰之原而天一所兆精實生焉其精甚真其中有信王元澤曰精者形生之始精無不真而更云甚真者由物有失理喪精沉於人偽故也杳冥之精萬物作類而物之生者各正性命度數法象一有儀則可以前知無或差舛此之謂信莊子曰未形有分精者天德之至真則不偽信則不差自古及今其名不去河上公曰自從也從古至今道常在不去王元澤曰常道常名未嘗變易馬巨濟曰萬物變化名號隨易昔日為是今日為非在古今以獨存者道而已以閲衆甫王弼曰衆甫物之始也以無名閲萬物始也閲披閲也甫本始也言道常住故能遍閲萬物之本始閲如閲人多矣之閲吾何以知衆甫之然哉以此蘇子由曰聖人所以知萬物之所以然者能體道而不去故也纂微曰閲度也又披閲也甫本始也夫道上自往古下及來今湛然常在何曾去爾形雖不見名且在焉以喻至人得道長年故能閲度萬物之本始知萬物皆始於道而披閲之以成其形質也然又設問我何以知萬物皆資稟於道生死終始之然哉答以道之恍惚杳冥常在不去故能應變為治清淨無為而已度閲萬物之遷移未有不資稟於道者以此也此章言盛德容貌若愚從道則容狀可見道之為物恍惚難名杳冥莫測體之者常存而不去故能閲衆甫之變以知其所以然曲則全章第二十二曲則全王弼曰不自見其明則全車惠弼曰此是行言能却曲柔和逶迤順物物無損害內保己身性命完全委曲從衆不自專故全其形生而不虧莊子曰外曲者與人為徒枉則直王弼曰不自是則其是彰也枉屈也受彼屈辱而伸人久久自得直也經云大直若屈如藺相如屈於廉頗是也枉曲不異何以再言蓋自屈為曲曲之自然也受屈為枉曲之使然也保生為全正曲為直自曲則其生可保受彼屈則被曲可正窪則盈河上公曰地窪下水流之人謙下德歸之王弼曰不自伐則其功有也弊則新王弼曰不自矜則其德長王元澤曰非秋冬之凋弊無春夏之榮華少則得蘇子由曰道一而已得一則無不得矣一者少之極也守一足以該萬事多則惑御注道要不煩聞見之多不如其約也以支為指則終身不解兹為大惑吕吉甫曰能知衆甫之然則能抱一致柔抱一致柔則能曲能枉能窪能弊矣曲者曲之自然者也枉者曲之使然者也天下之物唯水為幾於道一西一東而物莫之能傷是曲則全也避礙萬折而必東枉則直也善下而百谷歸之是窪則盈也受天下之垢莫清焉是弊則新也惟得一者為足以與此故曰少則得衆人所以不能然者以其不一故也故曰多則惑多數之不一也多則擾學多則惑性列子曰學者以多方喪生是以聖人抱一為天下式御注其為物不二則其生物不測惟天下之至精能為合天下之至神聖人抱一以守不搖其精故言而為天下道動而為天下則一者精也式者法也一者多之宗聖人以少得天下以多惑聖人抱一而不離於精天下棄多而歸一故為天下法式不自見故明御注不蔽于一己之見則無所不燭故明虞舜明四目以廣其所視可謂不自見也至於明於庶物察於人倫兹非明乎成王疏通開達無遏爾躬可謂不自見也至於介爾昭明而昭明有融兹非明乎不自是故彰御注不私于一己之是而惟是之從則功大名顯而天下服故彰吕吉甫曰因天下之所是而是之而我不自是也則所是莫之能盡故曰不自是故彰不自伐故有功御注書曰汝惟不伐天下莫與汝爭功舒王曰不自伐則善不喪故有功不自矜故長御注書曰汝惟不矜天下莫與汝爭能吕吉甫曰任萬物以能而我不自矜也故長夫惟不爭故天下莫能與之爭御注人皆取先己獨處後曰受天下之垢若是者常處於不爭之地敦能與之爭乎蘇子由曰忘我則不爭不自是不自見不自伐不自矜皆不爭之餘也故以不爭終之古之所謂曲則全者豈虛言哉河上公曰古者曲從則全身此言非虛誠全而歸之御注聖人其動若水以交物而不虧其全其應若繩以順理而不失其直知窪之為盈無亢滿之纍知弊之為新無夸耀之迹若性之自為而不知為之者致曲而已故全而歸之可以保身可以盡年而不知其盡也是謂全德之人豈虛言哉鍾會曰誠能守曲全必歸之此章之義養生之旨也其要在乎忘我惟忘我故委曲以應變而不自恃一己之見枉己而伸人而不私一己之道知窪之為盈無自伐之心知弊之為新無自矜之行若性之自為而不知為之者致曲以全其形生而已故終始以曲則全言之希言自然章第二十三希言自然顧歡曰希少也人能愛氣少言則行合自然纂微曰夫至人有問即應接物即言動靜以時故合於自然陸佃曰夫物莫能使之然亦莫能使之不然者謂之自然飄風不終朝驟雨不終日王元澤曰風雨者陰陽交感所為飄驟者交感之過所以不能久也飄風疾風也驟雨暴雨也從旦至晡為終朝自早及暮為終日飄風驟雨氣之暴戾非出於常然也故雖天地為之尚不能有終朝終日之久人之言不出於自然則多言數窮宜矣孰為此者天地天地尚不能久而況於人乎御注天地之造萬物風以散之委衆形之自化而雨以潤之任萬物之自滋故不益生不勸成而萬物自遂于天地之間所以長且久也飄驟則陰陽有繆戾之患必或使之而物被其害故不能久風雨者陰陽交感所為飄驟者交感之過天地之大猶不能久況人處天地之間眇乎小哉為於多言速滅可知故從事於道者王弼曰從事謂舉動從事於道者也道以無形無為成濟萬物從事於道者以無為為君不言為教綿綿若存而物得其真與道同體故曰同於道道者同於道河上公曰道者謂好道之人同於道所謂與道同德者同於德河上公曰德者謂有德之人同於德所謂與德同失者同於失蔡子晃曰有為躁競執教生迷名為失既為同失不能虛心冥會而言道失者獨失道也自然之謂道從事於道者悟道忘言所謂與道同得道之謂德德者希言所謂與德同失道之謂失失者多言所謂與失同同於道者道亦得之同於德者德亦得之同於失者失亦得之河上公曰與道同者道亦樂得之與德同者德亦樂得之與失同者失亦樂得之信不足有不信鍾會曰我信不足於道道亦不信應我所以兩相失只是同於道者道得之信於道者道信之同於失者道失之信不足有不信也此章以希言為主希言則以道而言也道偶而應故合自然故下文云同於道者道亦得之同於失者失亦得之觀其失得之本皆言之希與多爾多言之人外則招愆內則耗氣人欲長久希言內守跂者不立章第二十四跂者不立跨者不行御注跂而欲立跨而欲行違性之常而冀形之適難矣以德為循則有足者皆至跂者急於有立跨者急於有行皆非行立之常也則不能久故雖立不立雖行不行立身行道之人不可欲速順其常然則身立而道行自見者不明舒王曰自見者不明則前所謂不自見者乃能無所不見自是者不彰河上公曰自以為是而非人者衆共蔽之使不彰顯也自伐者無功顧歡曰興功濟物而自取其名名既屬己則功不在物自矜者不長郭象曰矜誇自恃不解忘功衆所不與故不長也其於道也曰餘食贅行御注自見則智不足以周物故不明自是則仁不足以同衆故不彰有其善喪厥善故無功矜其能喪厥功故不長道之所在以深為根以約為紀泰色淫志豈道也哉故於食為餘於行為贅道固無我無我則不爭夫自是自伐自矜者亦非其常也故其於道也為餘食贅行而已食飽則已有餘則病形完則已有贅則纍物或惡之故有道者不處御注侈於性則盈天之所虧地之所變人之所惡也故有道者不處此章言立身行道不適其常而急於行立故終不能行立其自見等行亦非其常也故於道為餘食贅行而已物或惡之故有道者不居有物混成章第二十五有物混成先天地生御注氣形質具而未相離曰渾淪合於渾淪則其成不虧易所謂太極者是也天地亦待是而後生故云先天地生然有生也而非不生之妙故謂之物羅什曰妙理常存名為有物萬道不能分故曰混成寂兮寥兮河上公曰寂者無音聲寥者空無形舒王曰寂者止也寥者遠也寂無遺響太空寥廓獨立而不改溫公曰無與之匹故曰獨立變化終不失其常故曰不改鍾會曰廓然無偶故云獨立古今常一是曰不改道之真體卓然獨立不與物偶歷萬世而無弊亘古今而常存周行而不殆御注利用出入往來不窮言道之用鍾會曰道無不在名曰周行所在皆通故無危殆道之妙用無乎不在靡不周遍未始有極易曰變動不居周流六虛可以為天下母御注萬物恃之以生車惠弼曰同化陰陽安立天地亭毒羣品子育含靈生之畜之可以為母吾不知其名字之曰道河上公曰我不見道之形容不知當何以名見萬物皆從道生故字之曰道強為之名曰大唐明皇曰吾見有物生成隱無名氏故以通生表其德字之曰道以包含無其體強名曰大吕吉甫曰道之為物用之則彌滿太虛而廢之莫知其所則大豈足以名之哉強為之名而已大曰逝御注運而不留故曰逝顧歡曰逝往也諸物雖大大有極住此道之大往行無際本無住盡之處舒王曰大者雖六合之外而不能逃其粗毫末之小不能遺其細故大曰逝逝曰遠御注應而不窮故曰遠孫登曰萬物逝行皆有停性之處此道逝行尋之彌遠莫究其源遠曰反舒王曰遠之極則反於朴矣故遠曰反反者反於本也和之彌滿六虛故曰遠近則不離己身故曰反遠者出於無極之外不窮也近在於己人不見之故道大天大地大王亦大御注道覆載天地者也天無不覆地無不載王者位天地之中而與天地參故亦大道覆萬物者也包裹天地至大無外故曰道大天地者形之大天至廣不可度地至大不可量故曰天大地大普天之下莫非王土率土之濱莫非王臣德配天地道通三才莫大於帝王故曰王亦大域中有四大而王居其一焉御注自道而降則有方體故云域中靜而聖動而王能貫三才而通之人道於是為至故與道同體天地同功而同謂之大王者人道之極也夫道未始有封而此言域中者謂雖域不域包裹無外也人法地地法天天法道道法自然舒王曰人法地王亦大是也地法天地大是也天法道天大是也道法自然道大是也蓋自然者猶免乎有因有緣矣非因非緣亦非自然然道之自然自學者觀之則所謂妙矣由老子觀之則未脫乎因緣矣然老子非不盡妙之妙要其言且以盡法為法故曰道法自然人謂王也人法地之安靜故無為而天下功地法天之無為故不長而萬物育天法道之自然故不産而萬物化道則自本自根未有天地自古以固存無所法也無法者自然而已故曰道法自然此章言混成之道先天地生其體則卓然獨立其用則周流六虛不可稱道強以大名雖二儀之高厚王者之至尊咸法於道夫道者自本自根無所因而自然也重為輕根章第二十六重為輕根靜為躁君河上公曰人君不重則不尊治身不重則失神草木花葉輕故零落根重故長存人君不靜則失威治身不靜則身危龍靜則能變化虎躁故乃夭虧吕吉甫曰輕者先感重者後應應者感之所自生則重為輕之根矣靜者役物躁者役於物躁常為靜之所役則靜為躁之君矣劉仲平曰輕生於重故重為輕根躁起於靜故靜為躁君是以君子終日行不離輜重雖有榮觀燕處超然御注榮觀在物燕處在身身安然後物可樂行以輕為速然不可以無輜重觀以躁為榮然不可以無燕處有輜重之物而不困於中道然後可以有行有燕處之宇而超然自得然後可以有觀夫何故重為輕根靜為躁君故也奈何萬乘之主而以身輕天下吕吉甫曰終日之行與其榮觀猶且如此況乎萬乘之主任重道遠以觀天下其可不靜且重乎蓋迫而後動感而後應不得已而後起則重矣無為焉則靜矣苟其動常在於得已之際而不能無為則是以身輕天下而不重不重則躁而不靜矣陸佃曰天下者人君之輜重而亦人君之燕處不可以離者故曰奈何萬乘之主而以身輕天下輕則失臣躁則失君御注不重則不威故失臣不唱而和則犯分故失君陸佃曰重者君之德靜者臣之道松靈仙曰心若動亂即損於妙神神即君也此章戒人君以重靜為本天下者人君之重靜也豈可以一身輕之修真之士亦以重靜為本重其身而不以物纍形靜其心而不以物亂神形全神定是道之全矣善行章第二十七善行無轍迹舒王曰善行不疾而速不行而至是也故無轍迹盧裕曰順道而行迹不殊物故無轍迹鍾會曰善行道者功名不顯蘇子由曰乘理而行無迹車行則有轍徒行則有迹則行固不能無轍迹也善行道者求之於身不出户庭行出於不行故無轍迹所謂不行而至也善言無瑕謫杜光庭曰善言者得意忘言也故無瑕疵之病謫責之過吕吉甫曰知者不言言者不知則言固不能無瑕謫者也知言之所以言則言出於不言故曰善言無瑕謫善計不用籌算御注通於一而萬事畢況非數者乎故不用籌算而萬殊之變若數一二善閉無關楗而不可開舒王曰善閉者萬物不得其門而入故無關楗而不可開溫公曰固國不以山溪之險九竅者精神之門也善閉者精神內守而不以外耗內雖無關楗其可開乎善結無繩約而不可解顧歡曰結之以道雖無繩而自固結之以物雖有約而不堅故以威約人雖三軍而可離以道結志雖匹夫而難奪溫公曰域民不以封疆之界杜光庭曰善修行之人萬慮都忘一念不二靜契於道與真合同萬緣不能侵諸見不能誘此之謂善結其可解乎是以聖人常善救人故無棄人蔡子晃曰利物為善弘濟曰救救羣生於十方即之本土運善常以冥被惠澤均平含生蒙益反流會道庶頑讒説帝舜教之而弗棄空空鄙夫宣聖叩兩端而竭常善救物故無棄物御注善者道之繼冥乎道則無善之可名善名立則道出而善世聖人體道以濟天下故有此五善而至於人物無棄然聖人所以愛人利物而物遂其生人樂其性者非意之也反一無迹因其常然而已世喪道矣天下舉失其恬惔寂常之性而日淪乎憂患之域非聖人其敦能救之新説曰萬物有成理固有拂其理而逆之者萬物有常性固有戾其性而梏之者萬物有正命固有違其命而絶之者聖人惻然於是惟其所寶之慈以濟之因其悖於理也發其塞而通之因其戾於性也除其害而若之因其違於命也繼其絶而復之是謂襲明御注襲者非表而出之襲明則光矣而不耀吕吉甫曰彼其五者性命之理所同然者也惟聖人以知常之眀而救之於所同然之際雖行之言之計之閉之約之而莫知其所以然則眀襲而不可得見故曰是謂襲明故善人不善人之師不善人善人之資御注資以言其利有不善人也然後知善之為利舒王曰善人教不善人者也故善人不善人之師無不善則不知善之為善故不善人善人之資不貴其師不愛其資蘇子由曰聖人無心於教故不愛其資天下無心於學故不貴其師聖人非獨吾忘天下亦使天下忘我故也列子師老商氏友伯高而得風仙九年之後亦不知夫子之為我師若人之為我友內外進矣此不貴其師也孔子見太公任然後辭其交遊去其弟子此不愛其資也雖知大迷是謂要妙御注道之要妙不睹衆善無所用智七聖皆迷無所問塗義協于此李畋曰此章言聖人密用惟微形眹莫睹雖云常善妙在兼忘故能言教所不詮巧曆無由算由是好師資為漸修之路絶貴愛入頓悟之門契彼襲明救其萬物道德真經取善集卷之四
